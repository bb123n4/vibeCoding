<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周易占卦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0806;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px 60px;font-family:'Noto Serif SC',serif;color:#e0d0b0}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(180,130,40,0.06) 0%,transparent 70%);pointer-events:none}
h1{font-size:28px;letter-spacing:.6em;text-indent:.6em;color:#c8a84e;text-shadow:0 0 20px rgba(200,168,78,.4);margin-bottom:6px}
.subtitle{font-size:10px;letter-spacing:.4em;color:rgba(255,255,255,.2);margin-bottom:40px}
.progress{display:flex;gap:8px;margin-bottom:32px}
.pdot{width:8px;height:8px;border-radius:50%;background:rgba(200,168,78,.12);border:1px solid rgba(200,168,78,.25);transition:all .3s}
.pdot.done{background:#c8a84e;box-shadow:0 0 6px rgba(200,168,78,.5)}
.pdot.cur{background:rgba(200,168,78,.4);border-color:#c8a84e;animation:pd 1s ease-in-out infinite}
@keyframes pd{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.hex-preview{display:flex;flex-direction:column-reverse;gap:9px;min-height:110px;margin-bottom:36px;align-items:center;justify-content:flex-end}
.hline{display:flex;gap:10px;align-items:center;animation:la .4s ease}
@keyframes la{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.yang-l{width:80px;height:6px;background:linear-gradient(90deg,#8a6820,#c8a84e,#8a6820);border-radius:3px;box-shadow:0 0 8px rgba(200,168,78,.3)}
.yin-ll,.yin-lr{width:33px;height:6px;background:linear-gradient(90deg,#8a6820,#c8a84e,#8a6820);border-radius:3px;box-shadow:0 0 8px rgba(200,168,78,.3)}
.coins-area{display:flex;gap:20px;margin-bottom:20px}
.coin-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.coin{width:58px;height:58px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e8d070,#9a7820,#6a5010);border:2px solid #c8a84e;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 12px rgba(0,0,0,.5),inset 0 1px rgba(255,255,255,.1)}
.coin.spin{animation:cs .65s ease-out forwards}
@keyframes cs{0%{transform:rotateY(0) scaleX(1)}25%{transform:rotateY(90deg) scaleX(0.08)}50%{transform:rotateY(180deg) scaleX(1)}75%{transform:rotateY(270deg) scaleX(0.08)}100%{transform:rotateY(360deg) scaleX(1)}}
.coin.yang{background:radial-gradient(circle at 35% 35%,#f0e090,#c8a84e,#8a6820)}
.coin.yin{background:radial-gradient(circle at 35% 35%,#806040,#604820,#402010)}
.clabel{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.25);opacity:0;transition:opacity .3s;font-family:'Noto Serif SC',serif}
.clabel.show{opacity:1}
#throw-btn{background:rgba(200,168,78,.1);border:1px solid rgba(200,168,78,.4);border-radius:8px;color:#c8a84e;font-family:'Noto Serif SC',serif;font-size:18px;letter-spacing:.3em;text-indent:.3em;padding:14px 40px;cursor:pointer;transition:all .2s;margin-top:8px}
#throw-btn:hover{background:rgba(200,168,78,.2);box-shadow:0 0 16px rgba(200,168,78,.2)}
#throw-btn:disabled{opacity:.35;cursor:default}
.line-res{font-size:12px;letter-spacing:.2em;color:rgba(200,168,78,.45);margin-top:10px;min-height:18px;text-align:center}
/* result */
#result-screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:400px;animation:fi .8s ease}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.r-hex{display:flex;flex-direction:column-reverse;gap:11px;align-items:center;margin-bottom:22px}
.r-hline{display:flex;gap:10px;align-items:center}
.r-yang{width:100px;height:8px;border-radius:4px;background:linear-gradient(90deg,#8a6820,#d4b460,#8a6820);box-shadow:0 0 10px rgba(200,168,78,.4)}
.r-yl,.r-yr{width:42px;height:8px;border-radius:4px;background:linear-gradient(90deg,#8a6820,#d4b460,#8a6820);box-shadow:0 0 10px rgba(200,168,78,.4)}
.r-num{font-size:11px;letter-spacing:.3em;color:rgba(200,168,78,.35);margin-bottom:4px}
.r-name{font-size:42px;letter-spacing:.6em;text-indent:.6em;color:#d4b460;text-shadow:0 0 22px rgba(212,180,96,.5);margin-bottom:6px}
.r-box{border:1px solid rgba(200,168,78,.22);border-radius:10px;padding:20px 24px;width:100%;margin:14px 0;background:rgba(255,255,255,.025);position:relative}
.r-box::before{content:'';position:absolute;inset:5px;border:1px solid rgba(200,168,78,.08);border-radius:7px;pointer-events:none}
.r-lbl{font-size:9px;letter-spacing:.25em;color:rgba(200,168,78,.3);text-align:center;margin-bottom:5px}
.r-guaci{font-size:14px;line-height:2;letter-spacing:.1em;color:rgba(255,255,255,.45);text-align:center}
.r-div{width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,78,.18),transparent);margin:12px auto}
.r-modern{font-size:16px;letter-spacing:.15em;line-height:1.8;color:rgba(200,168,78,.8);text-align:center;margin-top:4px}
#again-btn{margin-top:22px;background:transparent;border:1px solid rgba(200,168,78,.28);border-radius:6px;color:rgba(200,168,78,.45);font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:.3em;padding:10px 28px;cursor:pointer;transition:all .2s}
#again-btn:hover{border-color:#c8a84e;color:#c8a84e}
</style>
</head>
<body>
<h1>周易占卦</h1>
<p class="subtitle">I CHING ORACLE</p>

<div id="asking-screen">
  <div class="progress" id="progress"></div>
  <div class="hex-preview" id="hex-preview"></div>
  <div class="coins-area">
    <div class="coin-wrap"><div class="coin" id="c0">☯</div><div class="clabel" id="l0"></div></div>
    <div class="coin-wrap"><div class="coin" id="c1">☯</div><div class="clabel" id="l1"></div></div>
    <div class="coin-wrap"><div class="coin" id="c2">☯</div><div class="clabel" id="l2"></div></div>
  </div>
  <div class="line-res" id="line-res"></div>
  <button id="throw-btn">摇 卦</button>
</div>

<div id="result-screen"></div>

<script>
// HEX[i] = [kingWenNum, name, guaCi, modernMeaning]
// indexed by 6-bit binary: bit0=line1(bottom) … bit5=line6(top)
const HEX=[
  [2,'坤','元亨，利牝马之贞','厚德载物，顺势而为'],
  [24,'复','亨，出入无疾，朋来无咎','否极泰来，蓄力待发'],
  [7,'师','贞，丈人吉，无咎','众志成城，静待时机'],
  [46,'升','元亨，用见大人，勿恤','积累渐进，步步高升'],
  [15,'谦','亨，君子有终','谦逊致远，低调蓄势'],
  [36,'明夷','利艰贞','隐忍待时，韬光养晦'],
  [19,'临','元亨，利贞','主动出击，把握时机'],
  [11,'泰','小往大来，吉亨','天地交泰，万物通达'],
  [16,'豫','利建侯行师','豫则立之，顺势而动'],
  [51,'震','亨，震来虩虩，笑言哑哑','雷声震动，警醒奋起'],
  [40,'解','利西南，无所往','化解困局，轻装前行'],
  [32,'恒','亨，无咎，利贞','持之以恒，坚守正道'],
  [62,'小过','亨，利贞，可小事不可大事','小心谨慎，勿过其位'],
  [55,'丰','亨，王假之，宜日中','盛极而衰，居安思危'],
  [54,'归妹','征凶，无攸利','冒进必失，慎重为先'],
  [34,'大壮','利贞','刚健进取，行正有力'],
  [8,'比','吉，原筮，元永贞，无咎','亲比相辅，合则两利'],
  [3,'屯','元亨，利贞，勿用有攸往','初创艰难，守正待机'],
  [29,'坎','有孚，维心亨，行有尚','险中求胜，信守本心'],
  [48,'井','改邑不改井，无丧无得','滋养众生，修德自固'],
  [39,'蹇','利西南，不利东北','迂回前进，避险就利'],
  [63,'既济','亨，小利贞，初吉终乱','大功告成，戒骄防逸'],
  [60,'节','亨，苦节不可贞','节制有度，中道而行'],
  [5,'需','有孚，光亨，贞吉，利涉大川','静待时机，时至则行'],
  [20,'观','盥而不荐，有孚颙若','静观其变，洞察全局'],
  [42,'益','利有攸往，利涉大川','上施下益，广结善缘'],
  [59,'涣','亨，王假有庙，利涉大川','涣散重聚，疏通障碍'],
  [57,'巽','小亨，利有攸往，利见大人','顺势渗透，柔进有功'],
  [53,'渐','女归吉，利贞','循序渐进，稳扎稳打'],
  [37,'家人','利女贞','修身齐家，各守其位'],
  [61,'中孚','豚鱼吉，利涉大川，利贞','诚信为本，感化于人'],
  [9,'小畜','亨，密云不雨，自我西郊','蓄势待发，时机将至'],
  [23,'剥','不利有攸往','势弱宜守，静待时转'],
  [27,'颐','贞吉，观颐，自求口实','养正守节，慎言修身'],
  [4,'蒙','亨，匪我求童蒙，童蒙求我','启蒙学习，诚心问道'],
  [18,'蛊','元亨，利涉大川','改弊革新，振兴家业'],
  [52,'艮','艮其背，不获其身，无咎','知止而止，静以待动'],
  [22,'贲','亨，小利有攸往','文采斐然，修饰有道'],
  [41,'损','有孚，元吉，无咎，可贞','损之益之，减少以求'],
  [26,'大畜','利贞，不家食吉，利涉大川','积蓄力量，蓄德待用'],
  [35,'晋','康侯用锡马蕃庶，昼日三接','进德修业，光明磊落'],
  [21,'噬嗑','亨，利用狱','去除阻碍，明断是非'],
  [64,'未济','亨，小狐汔济，濡其尾，无攸利','差之毫厘，功亏一篑'],
  [50,'鼎','元吉，亨','革故鼎新，成就大业'],
  [56,'旅','小亨，旅贞吉','在外审慎，随遇而安'],
  [30,'离','利贞，亨，畜牝牛吉','光明附丽，相依为用'],
  [38,'睽','小事吉','求同存异，和而不同'],
  [14,'大有','元亨','大有所获，宏图大展'],
  [45,'萃','亨，王假有庙，利见大人','聚集众力，共谋大事'],
  [17,'随','元亨，利贞，无咎','顺时应变，随机而动'],
  [47,'困','亨，贞，大人吉，无咎','困境磨砺，守正待通'],
  [28,'大过','栋桡，利有攸往，亨','力挽狂澜，担当大任'],
  [31,'咸','亨，利贞，取女吉','感应相通，心有灵犀'],
  [49,'革','己日乃孚，元亨，利贞，悔亡','变革创新，顺天应人'],
  [58,'兑','亨，利贞','和悦通达，喜乐相交'],
  [43,'夬','扬于王庭，孚号，有厉','决断去邪，以正克邪'],
  [12,'否','否之匪人，不利君子贞，大往小来','闭塞不通，守正待时'],
  [25,'无妄','元亨，利贞，其匪正有眚','勿妄行事，遵循天道'],
  [6,'讼','有孚，窒，惕，中吉，终凶','争讼戒慎，和为贵上'],
  [44,'姤','女壮，勿用取女','邂逅谨慎，防微杜渐'],
  [33,'遁','亨，小利贞','退隐全身，以待时机'],
  [13,'同人','同人于野，亨，利涉大川','同心协力，携手共进'],
  [10,'履','履虎尾，不咥人，亨','步步为营，礼行天下'],
  [1,'乾','元亨，利贞','自强不息，乾行不止'],
];

let throwCount=0, lines=[], busy=false;

// init progress
const prog=document.getElementById('progress');
for(let i=0;i<6;i++){
  const d=document.createElement('div');
  d.className='pdot'+(i===0?' cur':'');
  d.id='p'+i; prog.appendChild(d);
}

function throwCoins(){
  if(busy||throwCount>=6) return;
  busy=true;
  document.getElementById('throw-btn').disabled=true;
  document.getElementById('line-res').textContent='';
  for(let i=0;i<3;i++){
    const c=document.getElementById('c'+i);
    c.className='coin'; c.textContent='☯';
    const l=document.getElementById('l'+i);
    l.className='clabel'; l.textContent='';
  }
  const vals=Array.from({length:3},()=>Math.random()<.5?1:0);
  const yang=vals.reduce((a,b)=>a+b,0)>=2;
  vals.forEach((v,i)=>{
    setTimeout(()=>{
      const c=document.getElementById('c'+i);
      c.classList.add('spin');
      setTimeout(()=>{
        c.classList.remove('spin');
        c.classList.add(v?'yang':'yin');
        c.textContent=v?'阳':'阴';
        const l=document.getElementById('l'+i);
        l.textContent=v?'正':'反'; l.classList.add('show');
      },660);
    },i*180);
  });
  setTimeout(()=>{
    const lineEl=document.createElement('div');
    lineEl.className='hline';
    lineEl.innerHTML=yang
      ?'<div class="yang-l"></div>'
      :'<div class="yin-ll"></div><div class="yin-lr"></div>';
    document.getElementById('hex-preview').appendChild(lineEl);
    lines.push(yang?1:0);
    document.getElementById('line-res').textContent=`第${throwCount+1}爻 · ${yang?'阳 ——':'阴 — —'}`;
    document.getElementById('p'+throwCount).className='pdot done';
    throwCount++;
    if(throwCount<6){
      document.getElementById('p'+throwCount).className='pdot cur';
      busy=false;
      document.getElementById('throw-btn').disabled=false;
    } else {
      setTimeout(showResult,900);
    }
  },1050);
}

function showResult(){
  const idx=lines.reduce((a,b,i)=>a|(b<<i),0);
  const [kw,name,guaci,modern]=HEX[idx];
  document.getElementById('asking-screen').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.style.display='flex';
  let hexHtml='<div class="r-hex">';
  for(let i=0;i<6;i++){
    hexHtml+='<div class="r-hline">';
    hexHtml+=lines[i]?'<div class="r-yang"></div>':'<div class="r-yl"></div><div class="r-yr"></div>';
    hexHtml+='</div>';
  }
  hexHtml+='</div>';
  rs.innerHTML=`${hexHtml}
    <div class="r-num">第 ${kw} 卦</div>
    <div class="r-name">${name}</div>
    <div class="r-box">
      <div class="r-lbl">卦  辞</div>
      <div class="r-guaci">${guaci}</div>
      <div class="r-div"></div>
      <div class="r-lbl" style="margin-top:0">解  读</div>
      <div class="r-modern">${modern}</div>
    </div>
    <button id="again-btn">再问一卦</button>`;
  document.getElementById('again-btn').addEventListener('click',reset);
}

function reset(){
  throwCount=0; lines=[]; busy=false;
  document.getElementById('hex-preview').innerHTML='';
  document.getElementById('line-res').textContent='';
  document.getElementById('throw-btn').disabled=false;
  for(let i=0;i<6;i++) document.getElementById('p'+i).className='pdot'+(i===0?' cur':'');
  for(let i=0;i<3;i++){
    const c=document.getElementById('c'+i); c.className='coin'; c.textContent='☯';
    const l=document.getElementById('l'+i); l.className='clabel'; l.textContent='';
  }
  document.getElementById('asking-screen').style.display='block';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('result-screen').innerHTML='';
}

document.getElementById('throw-btn').addEventListener('click',throwCoins);
</script>
</body>
</html>
