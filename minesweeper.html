<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 24px 16px 40px;
  font-family: monospace;
  color: #e0e0e0;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,200,120,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,120,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}

h1 {
  font-size: 22px;
  letter-spacing: 0.3em;
  color: #00dd88;
  text-shadow: 0 0 16px rgba(0,220,136,0.5);
  margin-bottom: 20px;
}

/* Difficulty selector */
.diff-row {
  display: flex; gap: 8px; margin-bottom: 18px;
}
.diff-btn {
  background: rgba(0,200,100,0.08);
  border: 1px solid rgba(0,200,100,0.25);
  color: rgba(255,255,255,0.5);
  font-family: monospace; font-size: 12px;
  letter-spacing: 0.1em;
  padding: 7px 16px; border-radius: 4px;
  cursor: pointer; transition: all 0.15s;
}
.diff-btn:hover { border-color: #00cc77; color: #00dd88; background: rgba(0,200,100,0.15); }
.diff-btn.active {
  background: rgba(0,200,100,0.2);
  border-color: #00cc77; color: #00dd88;
  box-shadow: 0 0 8px rgba(0,200,100,0.25);
}

/* Status bar */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 640px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 10px 18px;
  margin-bottom: 14px;
  font-size: 13px;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.stat-label { font-size: 9px; letter-spacing: 0.15em; color: rgba(255,255,255,0.3); }
.stat-val { font-size: 20px; letter-spacing: 0.05em; color: #00dd88; font-weight: bold; }
.stat-val.red { color: #ff4466; }
#face-btn {
  font-size: 24px; background: none; border: none; cursor: pointer;
  transition: transform 0.1s;
}
#face-btn:hover { transform: scale(1.15); }

/* Board wrapper */
#board-wrap {
  max-width: 100%;
  overflow: auto;
  border: 1px solid rgba(0,200,100,0.15);
  border-radius: 6px;
  background: rgba(0,0,0,0.3);
  padding: 3px;
}
#board {
  display: grid;
  gap: 2px;
  user-select: none;
}
.cell {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: bold; letter-spacing: 0;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.cell.hidden {
  background: rgba(0,200,100,0.1);
  border: 1px solid rgba(0,200,100,0.2);
}
.cell.hidden:hover { background: rgba(0,200,100,0.2); }
.cell.revealed {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  cursor: default;
}
.cell.flagged {
  background: rgba(255,180,0,0.12);
  border: 1px solid rgba(255,180,0,0.3);
}
.cell.mine-hit {
  background: rgba(255,40,80,0.35) !important;
  border: 1px solid #ff2255 !important;
}
.cell.mine-revealed {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
}
.cell.wrong-flag {
  background: rgba(255,40,80,0.15);
  border: 1px solid rgba(255,40,80,0.3);
}

/* Number colors */
.n1 { color: #44aaff; }
.n2 { color: #44dd88; }
.n3 { color: #ff6644; }
.n4 { color: #9966ff; }
.n5 { color: #ff3344; }
.n6 { color: #44ddcc; }
.n7 { color: #ff88cc; }
.n8 { color: #aaaaaa; }

/* Best times */
.best-times {
  margin-top: 18px;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.12em;
  text-align: center;
}
.best-times span { color: rgba(0,220,136,0.5); }

/* Overlay */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
#overlay.show { opacity: 1; pointer-events: all; }
#overlay-box {
  background: #0f1117;
  border: 1px solid rgba(0,200,100,0.3);
  border-radius: 12px;
  padding: 36px 48px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,200,100,0.15);
}
#overlay-title { font-size: 28px; margin-bottom: 12px; letter-spacing: 0.1em; }
#overlay-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
#overlay-best { font-size: 12px; color: #ffcc44; margin-bottom: 24px; min-height: 18px; }
#overlay-btn {
  background: rgba(0,200,100,0.15);
  border: 1px solid #00cc77;
  color: #00dd88;
  font-family: monospace; font-size: 13px;
  letter-spacing: 0.15em;
  padding: 10px 28px; border-radius: 6px;
  cursor: pointer; transition: all 0.15s;
}
#overlay-btn:hover { background: rgba(0,200,100,0.3); box-shadow: 0 0 12px rgba(0,200,100,0.3); }
</style>
</head>
<body>
<h1>扫 雷</h1>

<div class="diff-row">
  <button class="diff-btn active" data-diff="0">初级</button>
  <button class="diff-btn" data-diff="1">中级</button>
  <button class="diff-btn" data-diff="2">高级</button>
</div>

<div class="status-bar">
  <div class="stat">
    <div class="stat-label">MINES</div>
    <div class="stat-val red" id="mine-count">10</div>
  </div>
  <button id="face-btn" title="新游戏">🙂</button>
  <div class="stat">
    <div class="stat-label">TIME</div>
    <div class="stat-val" id="timer">0</div>
  </div>
</div>

<div id="board-wrap"><div id="board"></div></div>
<div class="best-times" id="best-times"></div>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title"></div>
    <div id="overlay-sub"></div>
    <div id="overlay-best"></div>
    <button id="overlay-btn">再来一局</button>
  </div>
</div>

<script>
const DIFFS = [
  { name:'初级', rows:9,  cols:9,  mines:10 },
  { name:'中级', rows:16, cols:16, mines:40 },
  { name:'高级', rows:16, cols:30, mines:99 },
];
const HS_KEY = d => `ms_best_${d}`;

let diff = 0, rows, cols, mines;
let grid, revealed, flagged, mineSet;
let gameState; // 'idle' | 'playing' | 'won' | 'lost'
let firstClick;
let timerVal, timerInterval;

const boardEl   = document.getElementById('board');
const mineCount = document.getElementById('mine-count');
const timerEl   = document.getElementById('timer');
const faceBtn   = document.getElementById('face-btn');
const overlay   = document.getElementById('overlay');
const oTitle    = document.getElementById('overlay-title');
const oSub      = document.getElementById('overlay-sub');
const oBest     = document.getElementById('overlay-best');
const bestEl    = document.getElementById('best-times');

function getBest(d) { return +localStorage.getItem(HS_KEY(d)) || 0; }
function setBest(d, t) { localStorage.setItem(HS_KEY(d), t); }

function updateBestDisplay() {
  const parts = DIFFS.map((d,i) => {
    const b = getBest(i);
    return `${d.name} <span>${b ? b+'s' : '--'}</span>`;
  });
  bestEl.innerHTML = 'BEST — ' + parts.join('  ·  ');
}

function initGame() {
  const d = DIFFS[diff];
  rows = d.rows; cols = d.cols; mines = d.mines;
  grid = Array.from({length:rows}, () => new Array(cols).fill(0));
  revealed = Array.from({length:rows}, () => new Array(cols).fill(false));
  flagged  = Array.from({length:rows}, () => new Array(cols).fill(false));
  mineSet  = new Set();
  gameState = 'idle';
  firstClick = true;
  clearInterval(timerInterval);
  timerVal = 0;
  timerEl.textContent = '0';
  mineCount.textContent = mines;
  faceBtn.textContent = '🙂';
  overlay.classList.remove('show');
  renderBoard();
  updateBestDisplay();
}

function placeMines(safeR, safeC) {
  const safe = new Set();
  for (let dr=-1; dr<=1; dr++)
    for (let dc=-1; dc<=1; dc++) {
      const nr=safeR+dr, nc=safeC+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols) safe.add(nr*cols+nc);
    }
  while (mineSet.size < mines) {
    const idx = Math.floor(Math.random() * rows * cols);
    if (!safe.has(idx)) mineSet.add(idx);
  }
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++)
      grid[r][c] = mineSet.has(r*cols+c) ? -1 : 0;
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++) {
      if (grid[r][c]===-1) continue;
      let cnt=0;
      for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
        const nr=r+dr, nc=c+dc;
        if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]===-1) cnt++;
      }
      grid[r][c]=cnt;
    }
}

function startTimer() {
  timerInterval = setInterval(() => {
    timerVal++;
    timerEl.textContent = Math.min(timerVal, 999);
  }, 1000);
}

function reveal(r, c) {
  if (r<0||r>=rows||c<0||c>=cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (grid[r][c] === 0) {
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++)
      if (dr||dc) reveal(r+dr, c+dc);
  }
}

function cellClick(r, c) {
  if (gameState==='won'||gameState==='lost') return;
  if (flagged[r][c]) return;
  if (revealed[r][c]) { chordReveal(r,c); return; }

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    gameState = 'playing';
    startTimer();
  }

  if (grid[r][c] === -1) {
    revealed[r][c] = true;
    lose(r, c);
    return;
  }

  reveal(r, c);
  checkWin();
  renderBoard();
}

function chordReveal(r, c) {
  if (!revealed[r][c] || grid[r][c] <= 0) return;
  let flagCount = 0;
  const neighbors = [];
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    if (!dr&&!dc) continue;
    const nr=r+dr, nc=c+dc;
    if (nr>=0&&nr<rows&&nc>=0&&nc<cols) {
      if (flagged[nr][nc]) flagCount++;
      else neighbors.push([nr,nc]);
    }
  }
  if (flagCount !== grid[r][c]) return;
  let hitMine = false;
  for (const [nr,nc] of neighbors) {
    if (!revealed[nr][nc]) {
      if (grid[nr][nc]===-1) { revealed[nr][nc]=true; hitMine=true; lose(nr,nc); return; }
      reveal(nr,nc);
    }
  }
  if (!hitMine) { checkWin(); renderBoard(); }
}

function rightClick(e, r, c) {
  e.preventDefault();
  if (gameState==='won'||gameState==='lost') return;
  if (revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  const flagCount = flagged.flat().filter(Boolean).length;
  mineCount.textContent = mines - flagCount;
  renderBoard();
}

function lose(hitR, hitC) {
  clearInterval(timerInterval);
  gameState = 'lost';
  faceBtn.textContent = '😵';
  renderBoard(hitR, hitC);
  setTimeout(() => {
    oTitle.innerHTML = '<span style="color:#ff4466">💥 踩雷了</span>';
    oSub.textContent = `用时 ${timerVal} 秒`;
    oBest.textContent = '';
    overlay.classList.add('show');
  }, 600);
}

function checkWin() {
  let unrevealedSafe = 0;
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++)
    if (!revealed[r][c] && grid[r][c]!==-1) unrevealedSafe++;
  if (unrevealedSafe === 0) {
    clearInterval(timerInterval);
    gameState = 'won';
    faceBtn.textContent = '😎';
    const best = getBest(diff);
    let bestMsg = '';
    if (!best || timerVal < best) {
      setBest(diff, timerVal);
      bestMsg = timerVal > 0 ? '🏆 新纪录！' : '';
    }
    updateBestDisplay();
    setTimeout(() => {
      oTitle.innerHTML = '<span style="color:#00dd88">✓ 扫雷成功</span>';
      oSub.textContent = `用时 ${timerVal} 秒`;
      oBest.textContent = bestMsg;
      overlay.classList.add('show');
    }, 400);
  }
}

function renderBoard(hitR=-1, hitC=-1) {
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 28px)`;
  boardEl.innerHTML = '';
  for (let r=0; r<rows; r++) {
    for (let c=0; c<cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const isMine = mineSet.has(r*cols+c);
      const isRev  = revealed[r][c];
      const isFlag = flagged[r][c];

      if (isRev) {
        if (isMine) {
          cell.className += r===hitR&&c===hitC ? ' mine-hit' : ' mine-revealed';
          cell.textContent = '💣';
        } else {
          cell.className += ' revealed';
          if (grid[r][c] > 0) {
            cell.textContent = grid[r][c];
            cell.className += ` n${grid[r][c]}`;
          }
        }
      } else if (gameState==='lost' && isMine && !isFlag) {
        cell.className += ' mine-revealed';
        cell.textContent = '💣';
      } else if (gameState==='lost' && isFlag && !isMine) {
        cell.className += ' wrong-flag';
        cell.textContent = '✕';
      } else if (isFlag) {
        cell.className += ' flagged';
        cell.textContent = '🚩';
      } else {
        cell.className += ' hidden';
      }

      cell.addEventListener('click', () => cellClick(r, c));
      cell.addEventListener('contextmenu', e => rightClick(e, r, c));
      boardEl.appendChild(cell);
    }
  }
}

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    diff = +btn.dataset.diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b===btn));
    initGame();
  });
});

faceBtn.addEventListener('click', initGame);
document.getElementById('overlay-btn').addEventListener('click', initGame);

initGame();
</script>
</body>
</html>
