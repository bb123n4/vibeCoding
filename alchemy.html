<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素炼成</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EDE8DE;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── Canvas & DPR ──
const W=1120, H=720;
const dpr=Math.min(window.devicePixelRatio||1,2);
const cv=document.getElementById('c');
cv.width=W*dpr; cv.height=H*dpr;
cv.style.width=W+'px'; cv.style.height=H+'px';
const ctx=cv.getContext('2d');
ctx.scale(dpr,dpr);

// ── Persist ──
const SAVE_KEY='alchemy_v2';
function loadDisc(){try{return new Set(JSON.parse(localStorage.getItem(SAVE_KEY))||[]);}catch(e){return new Set();}}
function saveDisc(){try{localStorage.setItem(SAVE_KEY,JSON.stringify([...discovered]));}catch(e){}}

// ── Element definitions ──
// {n:名称, e:emoji, c:color, d:description}
const E={
  fire:     {n:'火',   e:'🔥',c:'#D04828',d:'万物之源，燃烧与创造并存。'},
  water:    {n:'水',   e:'💧',c:'#3878B0',d:'生命的摇篮，柔弱而无坚不摧。'},
  earth:    {n:'土',   e:'🟫',c:'#806030',d:'大地承载万物，厚德载物。'},
  wind:     {n:'风',   e:'🌬',c:'#6888A0',d:'看不见却无处不在，带来变化与流动。'},
  steam:    {n:'蒸汽', e:'♨', c:'#7888A0',d:'火与水交融，化为无形的力量。'},

  wave:     {n:'浪',   e:'🌊',c:'#2068A0',d:'风推水涌，力量在水面奔腾。'},
  dust:     {n:'尘',   e:'🌫',c:'#A08858',d:'土随风而起，微小而无处不在。'},
  cloud:    {n:'云',   e:'☁', c:'#7888A0',d:'蒸汽随风升腾，悬于天际。'},
  stone:    {n:'石',   e:'🪨',c:'#586070',d:'熔岩冷却后凝固的记忆。'},
  volcano:  {n:'火山', e:'🗻',c:'#A02810',d:'大地的伤口，喷涌着原始力量。'},
  brick:    {n:'砖',   e:'🧱',c:'#B05828',d:'泥土经火淬炼，成为建造文明的基石。'},
  typhoon:  {n:'台风', e:'🌀',c:'#2860A0',d:'浪与风旋转激荡，形成巨大漩涡。'},
  fog:      {n:'雾',   e:'🌫',c:'#6878A0',d:'烟与水混合，朦胧遮蔽了世界。'},
  rain:     {n:'雨',   e:'🌧',c:'#2058A0',d:'云积水重，化作甘霖降落大地。'},
  lightning:{n:'闪电', e:'⚡',c:'#C8B818',d:'云与火碰撞，瞬间释放天地之力。'},
  sand:     {n:'沙',   e:'🏜',c:'#C0A058',d:'石被风磨碎，铺成无边沙漠。'},
  metal:    {n:'金属', e:'⚙', c:'#586888',d:'石在烈火中涅槃，化为坚硬的金属。'},
  rainbow:  {n:'彩虹', e:'🌈',c:'#B05898',d:'雨后阳光折射，七色横挂天际。'},
  plant:    {n:'植物', e:'🌱',c:'#409030',d:'雨水润泽大地，生命萌发。'},
  glass:    {n:'玻璃', e:'🔮',c:'#509898',d:'沙在高温中熔化，变成透明的奇迹。'},
  steel:    {n:'钢',   e:'🔩',c:'#487080',d:'金属在火中精炼，强度倍增。'},
  tool:     {n:'工具', e:'🔧',c:'#607888',d:'金属与石结合，人类掌握改造世界的力量。'},
  charcoal: {n:'炭',   e:'◼', c:'#282830',d:'植物经火不完全燃烧的遗存。'},
  tree:     {n:'树',   e:'🌳',c:'#287030',d:'植物扎根大地，向天空生长。'},
  algae:    {n:'藻',   e:'🌿',c:'#208858',d:'植物与水相融，在水中悄然生长。'},
  seed:     {n:'种子', e:'🌰',c:'#886830',d:'植物借风传播，携带生命的密码。'},
  forest:   {n:'森林', e:'🌲',c:'#186020',d:'树连树，生命繁茂，形成大地的肺。'},
  mirror:   {n:'镜子', e:'🪞',c:'#6898A8',d:'玻璃与沙磨砺，映出真实的倒影。'},
  wall:     {n:'砖墙', e:'🧱',c:'#907050',d:'砖与砖叠合，隔开了内与外。'},
  life:     {n:'生命', e:'✨',c:'#9030A0',d:'电光石火之间，奇迹在水中诞生。'},
  fish:     {n:'鱼',   e:'🐟',c:'#2870A8',d:'生命进入水中，长出鳍与鳞片。'},
  worm:     {n:'虫',   e:'🐛',c:'#608828',d:'生命扎入土里，蠕动于泥土之间。'},
  bird:     {n:'鸟',   e:'🐦',c:'#3880B8',d:'生命随风而起，展翅翱翔天际。'},
  phoenix:  {n:'凤凰', e:'🦅',c:'#C06010',d:'生命与火合一，浴火重生的神鸟。'},
  silk:     {n:'丝绸', e:'🧵',c:'#C0A0B8',d:'虫在树上吐丝结茧，织出柔滑的奇迹。'},
  ocean:    {n:'海洋', e:'🌊',c:'#085080',d:'无数条鱼汇聚，形成深不可测的海。'},
  sky:      {n:'天空', e:'🌤',c:'#4080B8',d:'群鸟高飞，广阔无垠的蓝色领域。'},
  house:    {n:'房屋', e:'🏠',c:'#B06820',d:'墙与墙相连，为生命遮风挡雨。'},
  paper:    {n:'纸',   e:'📄',c:'#C8C0A8',d:'树木削薄铺平，成为记录思想的媒介。'},
  ink:      {n:'墨',   e:'🖋',c:'#202028',d:'炭溶于水，变成书写文明的黑色液体。'},
  human:    {n:'人',   e:'👤',c:'#B87848',d:'生命走进房屋，演化出智慧与情感。'},
  tea:      {n:'茶',   e:'🍵',c:'#489048',d:'树叶落入水中，飘散出清雅的香气。'},
  book:     {n:'书',   e:'📖',c:'#503888',d:'纸上有了墨迹，思想得以传承万代。'},
  harvest:  {n:'收获', e:'🌾',c:'#B09018',d:'种子在雨水滋养下，结出丰硕果实。'},
  knowledge:{n:'知识', e:'💡',c:'#A08010',d:'书与人交汇，智慧之光照亮前路。'},
  dragon:   {n:'龙',   e:'🐉',c:'#203878',d:'凤凰穿越海洋，化身传说中的神龙。'},
  immortal: {n:'仙',   e:'🌟',c:'#B8B028',d:'龙飞天际，超脱凡尘，得道成仙。'},
  universe: {n:'宇宙', e:'🌌',c:'#0C1018',d:'海洋与天空合而为一，一切的起点与终点。'},
};
const ALL_IDS=Object.keys(E);
const TOTAL=ALL_IDS.length; // 51

// ── Recipes ──
const R={};
function rec(a,b,c){R[[a,b].sort().join('+')]=c;}
rec('fire','water','steam');
rec('fire','earth','lava');
rec('fire','wind','smoke');
rec('water','earth','mud');
rec('water','wind','wave');
rec('earth','wind','dust');
rec('steam','wind','cloud');
rec('lava','water','stone');
rec('lava','earth','volcano');
rec('mud','fire','brick');
rec('wave','wind','typhoon');
rec('smoke','water','fog');
rec('cloud','water','rain');
rec('cloud','fire','lightning');
rec('stone','wind','sand');
rec('stone','fire','metal');
rec('rain','fire','rainbow');
rec('rain','earth','plant');
rec('sand','fire','glass');
rec('metal','fire','steel');
rec('metal','stone','tool');
rec('plant','fire','charcoal');
rec('plant','earth','tree');
rec('plant','water','algae');
rec('plant','wind','seed');
rec('tree','tree','forest');
rec('glass','sand','mirror');
rec('brick','brick','wall');
rec('lightning','water','life');
rec('life','water','fish');
rec('life','earth','worm');
rec('life','wind','bird');
rec('life','fire','phoenix');
rec('worm','tree','silk');
rec('fish','fish','ocean');
rec('bird','bird','sky');
rec('wall','wall','house');
rec('tree','tool','paper');
rec('charcoal','water','ink');
rec('house','life','human');
rec('tree','water','tea');
rec('paper','ink','book');
rec('seed','rain','harvest');
rec('book','human','knowledge');
rec('phoenix','ocean','dragon');
rec('dragon','sky','immortal');
rec('ocean','sky','universe');

// ── Origin reverse lookup ──
const ORIGIN={};
for(const [k,v] of Object.entries(R)){
  const [a,b]=k.split('+');
  ORIGIN[v]=[a,b];
}

// ── State ──
const STARTERS=['fire','water','earth','wind'];
let discovered=loadDisc();
if(discovered.size===0) STARTERS.forEach(id=>discovered.add(id));
let slotA=null, slotB=null;
let shakePhase=0, shakeDamp=0;
let combAnim=null;
let revealAnim=null;
let combLocked=false;
let selectedEnc=null; // selected element in encyclopedia

// ── Layout ──
const LP=544;        // left panel width
const DIV_X=LP;      // divider x

// Left panel — combo zone
const SL_CY=155;     // slot center Y
const SL_R=40;       // slot radius
const SL_AX=148;     // slot A center X
const SL_BX=396;     // slot B center X
const RES_CY=242;    // result card center Y
const CZ_BOT=278;    // combo zone bottom

// Left panel — element grid
const EG_TOP=316;
const EG_SZ=52;      // card size  (7 rows × 57px = 399 → ends at 715, fits H=720)
const EG_GAP=5;
const EG_COLS=8;
const EG_X0=Math.round((LP - (EG_COLS*(EG_SZ+EG_GAP)-EG_GAP))/2); // ≈19

// Right panel — encyclopedia
const RP_X=LP+1;
const RP_W=W-LP-1;
const EN_HDR_H=56;
const EN_COLS=8;
const EN_CSZ=54;
const EN_GAP=6;
const EN_X0=RP_X+Math.round((RP_W-(EN_COLS*(EN_CSZ+EN_GAP)-EN_GAP))/2);
const EN_TOP=EN_HDR_H+14;
const EN_ROWS=7;
// detail panel below grid
const EN_DET_Y=EN_TOP+EN_ROWS*(EN_CSZ+EN_GAP)+10;

// ── Draw helpers ──
function roundRect(x,y,w,h,r){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
}

function drawCard(id,x,y,sz,alpha,glowing,locked){
  const el=E[id]||{n:'?',e:'?',c:'#888',d:''};
  const {n,e,c}=el;
  ctx.save();
  ctx.globalAlpha=alpha??1;
  if(locked){
    // locked card — warm paper with ?
    roundRect(x,y,sz,sz,8);
    ctx.fillStyle='rgba(180,165,140,0.22)'; ctx.fill();
    ctx.strokeStyle='rgba(150,120,80,0.14)'; ctx.lineWidth=1;
    roundRect(x,y,sz,sz,8); ctx.stroke();
    ctx.fillStyle='rgba(140,110,70,0.22)';
    ctx.font=`${Math.round(sz*0.36)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?', x+sz/2, y+sz*0.44);
    ctx.restore(); return;
  }
  // bg
  roundRect(x,y,sz,sz,8);
  ctx.fillStyle=c+'20'; ctx.fill();
  // border
  if(glowing){
    ctx.shadowBlur=16; ctx.shadowColor=c;
    ctx.strokeStyle=c+'CC'; ctx.lineWidth=2;
  } else {
    ctx.shadowBlur=0;
    ctx.strokeStyle=c+'55'; ctx.lineWidth=1;
  }
  roundRect(x,y,sz,sz,8); ctx.stroke();
  ctx.shadowBlur=0;
  // emoji
  ctx.font=`${Math.round(sz*0.38)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff';
  ctx.fillText(e, x+sz/2, y+sz*0.40);
  // name
  ctx.font=`300 ${Math.max(8,Math.round(sz*0.165))}px "Hiragino Sans","Yu Gothic",sans-serif`;
  ctx.fillStyle='rgba(40,28,16,0.65)';
  ctx.fillText(n, x+sz/2, y+sz*0.79);
  ctx.restore();
}

// ── Combine logic ──
function tryCombine(){
  if(combLocked||!slotA||!slotB) return;
  combLocked=true;
  const key=[slotA,slotB].sort().join('+');
  const result=R[key];
  if(!result){
    shakeDamp=1; shakePhase=0;
    combAnim={type:'fail',timer:1};
    setTimeout(()=>{slotA=null;slotB=null;combAnim=null;combLocked=false;},680);
    return;
  }
  const isNew=!discovered.has(result);
  discovered.add(result); saveDisc();
  combAnim={type:isNew?'new':'known',timer:1,id:result};
  if(isNew){
    setTimeout(()=>{
      revealAnim={id:result,t:0,hold:false};
      combAnim=null; slotA=null; slotB=null; combLocked=false;
    },380);
  } else {
    setTimeout(()=>{slotA=null;slotB=null;combAnim=null;combLocked=false;},820);
  }
}

// ── Draw ──
function draw(ts){
  ctx.clearRect(0,0,W,H);

  // === Background — 水墨仙境 · 米色宣纸 ===
  ctx.fillStyle='#EDE8DE'; ctx.fillRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W*0.38,H*0.42,0,W*0.38,H*0.42,620);
  bg.addColorStop(0,'#F5F0E6'); bg.addColorStop(0.55,'#EDE8DE'); bg.addColorStop(1,'#E4DED2');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Ink bleed blobs — warm sepia washes
  const b1=ctx.createRadialGradient(180,160,0,180,160,320);
  b1.addColorStop(0,'rgba(160,130,90,0.10)'); b1.addColorStop(1,'rgba(160,130,90,0)');
  ctx.fillStyle=b1; ctx.fillRect(0,0,W,H);
  const b2=ctx.createRadialGradient(920,560,0,920,560,280);
  b2.addColorStop(0,'rgba(140,110,75,0.08)'); b2.addColorStop(1,'rgba(140,110,75,0)');
  ctx.fillStyle=b2; ctx.fillRect(0,0,W,H);
  const b3=ctx.createRadialGradient(600,80,0,600,80,200);
  b3.addColorStop(0,'rgba(180,150,100,0.07)'); b3.addColorStop(1,'rgba(180,150,100,0)');
  ctx.fillStyle=b3; ctx.fillRect(0,0,W,H);

  // Sparse warm dot grid
  ctx.fillStyle='rgba(150,120,80,0.06)';
  for(let x=22;x<W;x+=32) for(let y=22;y<H;y+=32){
    ctx.beginPath();ctx.arc(x,y,0.7,0,Math.PI*2);ctx.fill();
  }

  // === Left Panel ===
  drawLeftPanel(ts);

  // === Divider ===
  ctx.strokeStyle='rgba(140,110,70,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(DIV_X,0); ctx.lineTo(DIV_X,H); ctx.stroke();

  // === Right Panel ===
  drawRightPanel();

  // === Reveal overlay (full-screen) ===
  if(revealAnim) drawReveal();
}

function drawLeftPanel(ts){
  // Header
  ctx.textAlign='center';
  ctx.fillStyle='rgba(40,28,16,0.78)';
  ctx.font='300 16px "Hiragino Sans","Yu Gothic",sans-serif';
  ctx.fillText('元  素  炼  成', LP/2, 30);

  const dl=[...discovered];
  ctx.fillStyle='rgba(120,90,55,0.55)';
  ctx.font='300 10px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(`${dl.length} / ${TOTAL}  已发现`, LP/2, 48);
  // progress bar
  const pbw=140,pbx=(LP-pbw)/2,pby=56;
  ctx.fillStyle='rgba(150,120,80,0.15)';
  ctx.beginPath();ctx.roundRect(pbx,pby,pbw,2,1);ctx.fill();
  ctx.fillStyle='rgba(120,90,50,0.40)';
  ctx.beginPath();ctx.roundRect(pbx,pby,pbw*(dl.length/TOTAL),2,1);ctx.fill();

  // ── Combo zone background ──
  ctx.fillStyle='rgba(200,185,160,0.22)';
  ctx.beginPath();ctx.roundRect(14,88,LP-28,CZ_BOT-88,12);ctx.fill();
  ctx.strokeStyle='rgba(150,120,80,0.18)'; ctx.lineWidth=0.5;
  ctx.beginPath();ctx.roundRect(14,88,LP-28,CZ_BOT-88,12);ctx.stroke();

  // slot shake offset
  const sOff=shakeDamp>0.01?Math.sin(shakePhase)*shakeDamp*10:0;

  // Draw two slots
  [[SL_AX+sOff,slotA],[SL_BX+sOff,slotB]].forEach(([sx,id])=>{
    ctx.save();
    ctx.beginPath();ctx.arc(sx,SL_CY,SL_R,0,Math.PI*2);
    if(id){
      const c=E[id].c;
      ctx.fillStyle=c+'15'; ctx.fill();
      ctx.strokeStyle=c+'70'; ctx.lineWidth=1.5;
    } else {
      ctx.fillStyle='rgba(200,185,160,0.15)'; ctx.fill();
      ctx.strokeStyle='rgba(150,120,80,0.28)';
      ctx.setLineDash([4,6]); ctx.lineWidth=1;
    }
    ctx.beginPath();ctx.arc(sx,SL_CY,SL_R,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    if(id){
      const csz=EG_SZ*0.92;
      drawCard(id, sx-csz/2, SL_CY-csz/2, csz, 1, true);
    } else {
      ctx.fillStyle='rgba(150,120,80,0.30)';
      ctx.font='20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('◇', sx, SL_CY);
    }
    ctx.restore();
  });

  // "+" label
  ctx.fillStyle='rgba(120,90,55,0.28)';
  ctx.font='300 22px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('+', LP/2, SL_CY);

  // Result area
  if(combAnim){
    const t=combAnim.timer;
    if(combAnim.type==='fail'){
      ctx.fillStyle=`rgba(220,80,60,${t*0.8})`;
      ctx.font='300 12px "Helvetica Neue",Arial,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('无法合成', LP/2, RES_CY);
    } else if(combAnim.id){
      const csz=EG_SZ;
      const sc=0.8+0.2*(1-t);
      ctx.save();
      ctx.translate(LP/2, RES_CY);
      ctx.scale(sc,sc);
      drawCard(combAnim.id, -csz/2, -csz/2, csz, Math.min(1,t*2), false);
      ctx.restore();
      const lbl=combAnim.type==='new'?'✦  新发现  ✦':'已知';
      ctx.fillStyle=combAnim.type==='new'
        ?`rgba(210,185,60,${Math.min(1,t*2)*0.9})`
        :`rgba(255,255,255,${t*0.3})`;
      ctx.font=`300 9px "Helvetica Neue",Arial,sans-serif`;
      ctx.textAlign='center';
      ctx.fillText(lbl, LP/2, RES_CY+csz/2+13);
    }
  } else if(!slotA&&!slotB){
    ctx.fillStyle='rgba(120,90,55,0.30)';
    ctx.font='300 10px "Helvetica Neue",Arial,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('点击下方元素放入槽中', LP/2, RES_CY);
  }

  // ── Divider between combo and grid ──
  ctx.strokeStyle='rgba(140,110,70,0.16)'; ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(14,CZ_BOT+6);ctx.lineTo(LP-14,CZ_BOT+6);ctx.stroke();
  ctx.fillStyle='rgba(120,90,55,0.50)';
  ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('已发现', 14, CZ_BOT+20);

  // ── Element grid ──
  const orderedDisc=ALL_IDS.filter(id=>discovered.has(id));
  ctx.save();
  ctx.beginPath();ctx.rect(0,CZ_BOT+24,LP,H-(CZ_BOT+24));ctx.clip();
  orderedDisc.forEach((id,i)=>{
    const col=i%EG_COLS, row=Math.floor(i/EG_COLS);
    const cx=EG_X0+col*(EG_SZ+EG_GAP);
    const cy=EG_TOP+row*(EG_SZ+EG_GAP);
    if(cy>H) return;
    const sel=(id===slotA||id===slotB);
    drawCard(id,cx,cy,EG_SZ,1,sel);
  });
  ctx.restore();
}

function drawRightPanel(){
  // Header
  ctx.textAlign='center';
  ctx.fillStyle='rgba(40,28,16,0.75)';
  ctx.font='300 14px "Hiragino Sans","Yu Gothic",sans-serif';
  ctx.fillText('图  鉴', RP_X+RP_W/2, 30);

  const cnt=discovered.size;
  ctx.fillStyle='rgba(120,90,55,0.55)';
  ctx.font='300 10px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(`${cnt} / ${TOTAL}`, RP_X+RP_W/2, 46);

  // Grid — all 51 in order (locked vs unlocked)
  ALL_IDS.forEach((id,i)=>{
    const col=i%EN_COLS, row=Math.floor(i/EN_COLS);
    const x=EN_X0+col*(EN_CSZ+EN_GAP);
    const y=EN_TOP+row*(EN_CSZ+EN_GAP);
    const isDisc=discovered.has(id);
    const isSel=(id===selectedEnc);
    drawCard(id,x,y,EN_CSZ,1,isSel,!isDisc);
    // selection highlight ring
    if(isSel&&isDisc){
      ctx.save();
      ctx.strokeStyle=E[id].c+'AA';
      ctx.lineWidth=2;
      ctx.shadowBlur=12; ctx.shadowColor=E[id].c;
      ctx.beginPath();ctx.roundRect(x-1,y-1,EN_CSZ+2,EN_CSZ+2,9);ctx.stroke();
      ctx.restore();
    }
  });

  // Detail panel
  if(selectedEnc&&discovered.has(selectedEnc)){
    drawDetailPanel(selectedEnc);
  } else {
    ctx.fillStyle='rgba(120,90,55,0.30)';
    ctx.font='300 10px "Helvetica Neue",Arial,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('点击已发现的元素查看详情', RP_X+RP_W/2, EN_DET_Y+26);
  }
}

function drawDetailPanel(id){
  const el=E[id];
  const {n,e,c,d}=el;
  const px=RP_X+10, py=EN_DET_Y, pw=RP_W-20, ph=H-EN_DET_Y-10;
  const PAD=18;

  // panel bg
  ctx.save();
  ctx.fillStyle=c+'14';
  ctx.beginPath();ctx.roundRect(px,py,pw,ph,10);ctx.fill();
  ctx.strokeStyle=c+'35'; ctx.lineWidth=0.8;
  ctx.beginPath();ctx.roundRect(px,py,pw,ph,10);ctx.stroke();

  // ── Row 1: emoji (left) + name & recipe (right) ──
  const emojiSize=46;
  const emojiCX=px+PAD+emojiSize*0.5;
  const emojiCY=py+PAD+emojiSize*0.5;

  ctx.font=`${emojiSize}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff';
  ctx.fillText(e, emojiCX, emojiCY);

  const textX=px+PAD+emojiSize+14;

  // name
  ctx.font=`500 17px "Hiragino Sans","Yu Gothic",sans-serif`;
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle=c;
  ctx.fillText(n, textX, py+PAD+2);

  // recipe
  const orig=ORIGIN[id];
  const recipeStr=orig
    ? `${E[orig[0]].e} ${E[orig[0]].n}  ＋  ${E[orig[1]].e} ${E[orig[1]].n}`
    : '起源元素';
  ctx.font=`300 10px "Hiragino Sans","Yu Gothic",sans-serif`;
  ctx.fillStyle=orig?'rgba(80,55,30,0.45)':'rgba(80,55,30,0.30)';
  ctx.fillText(recipeStr, textX, py+PAD+24);

  // ── Divider ──
  const divY=py+PAD+emojiSize+14;
  ctx.strokeStyle=c+'45'; ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(px+PAD,divY);ctx.lineTo(px+pw-PAD,divY);ctx.stroke();

  // ── Description ──
  ctx.font=`300 11px "Hiragino Sans","Yu Gothic",sans-serif`;
  ctx.fillStyle='rgba(50,35,18,0.52)';
  ctx.textBaseline='top';
  ctx.fillText(d, px+PAD, divY+12);

  ctx.restore();
}

function drawReveal(){
  const t=Math.min(1,revealAnim.t);
  const ease=t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2);
  ctx.fillStyle=`rgba(240,234,222,${ease*0.96})`; ctx.fillRect(0,0,W,H);
  const id=revealAnim.id;
  const {n,e,c}=E[id];

  // glow orb
  ctx.save();
  ctx.globalAlpha=ease*0.45;
  ctx.shadowBlur=100; ctx.shadowColor=c;
  ctx.beginPath();ctx.arc(W/2,H/2-10,80,0,Math.PI*2);
  ctx.fillStyle=c+'18';ctx.fill();
  ctx.restore();

  // big card
  const bsz=180;
  ctx.save();
  ctx.translate(W/2,H/2-14);
  ctx.scale(0.65+ease*0.35,0.65+ease*0.35);
  drawCard(id,-bsz/2,-bsz/2,bsz,ease,true);
  ctx.restore();

  ctx.globalAlpha=ease;
  ctx.fillStyle='rgba(160,110,30,0.90)';
  ctx.font='300 12px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('✦   新发现   ✦', W/2, H/2-bsz/2*0.72-22);
  ctx.fillStyle='rgba(80,55,30,0.40)';
  ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(revealAnim.hold?'点击继续':'', W/2, H/2+bsz/2*0.72+22);
  ctx.globalAlpha=1;
  if(!revealAnim.hold&&t>=1) revealAnim.hold=true;
}

// ── Loop ──
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-last,50)/1000; last=ts;
  shakePhase+=dt*55; shakeDamp=Math.max(0,shakeDamp-dt*4);
  if(combAnim) combAnim.timer=Math.max(0,combAnim.timer-dt*1.8);
  if(revealAnim) revealAnim.t=Math.min(1,revealAnim.t+dt*3.2);
  draw(ts);
}
requestAnimationFrame(loop);

// ── Hit testing ──
function hitLeftCard(x,y){
  const disc=ALL_IDS.filter(id=>discovered.has(id));
  for(let i=0;i<disc.length;i++){
    const col=i%EG_COLS, row=Math.floor(i/EG_COLS);
    const cx=EG_X0+col*(EG_SZ+EG_GAP);
    const cy=EG_TOP+row*(EG_SZ+EG_GAP);
    if(x>=cx&&x<=cx+EG_SZ&&y>=cy&&y<=cy+EG_SZ) return disc[i];
  }
  return null;
}

function hitEncCard(x,y){
  for(let i=0;i<ALL_IDS.length;i++){
    const col=i%EN_COLS, row=Math.floor(i/EN_COLS);
    const cx=EN_X0+col*(EN_CSZ+EN_GAP);
    const cy=EN_TOP+row*(EN_CSZ+EN_GAP);
    if(x>=cx&&x<=cx+EN_CSZ&&y>=cy&&y<=cy+EN_CSZ) return ALL_IDS[i];
  }
  return null;
}

function onTap(x,y){
  if(revealAnim&&revealAnim.hold){ revealAnim=null; return; }
  if(revealAnim) return;
  if(combLocked) return;

  // Click slot to clear
  if(Math.hypot(x-SL_AX,y-SL_CY)<=SL_R){ slotA=null; return; }
  if(Math.hypot(x-SL_BX,y-SL_CY)<=SL_R){ slotB=null; return; }

  // Right panel — encyclopedia
  if(x>=RP_X){
    const id=hitEncCard(x,y);
    if(id&&discovered.has(id)){
      selectedEnc=(selectedEnc===id)?null:id;
    }
    return;
  }

  // Left panel — element grid
  if(y<EG_TOP) return;
  const id=hitLeftCard(x,y);
  if(!id) return;
  if(!slotA){ slotA=id; }
  else if(!slotB){ slotB=id; setTimeout(tryCombine,120); }
  else { slotA=id; slotB=null; }
}

cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  onTap((e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height);
});
</script>
