<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>末日突围</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: min(100vw, calc(100vh * 900 / 600));
    height: min(100vh, calc(100vw * 600 / 900));
    image-rendering: pixelated;
  }
</style>
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="vibe coding">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2785C">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 600;
const dpr = Math.min(window.devicePixelRatio || 1, 2);
canvas.width = W * dpr;
canvas.height = H * dpr;
ctx.scale(dpr, dpr);

// ─── State ───────────────────────────────────────────────────────────────────
let state = 'start'; // start | playing | levelup | dead

// ─── Player ──────────────────────────────────────────────────────────────────
function makePlayer() {
  return {
    x: W / 2, y: H / 2,
    hp: 100, maxHp: 100,
    shield: 0,
    speed: 160,
    attackSpeed: 1.0,
    bulletDamage: 12,
    bulletCount: 1,
    bulletSize: 5,
    bulletSpeed: 420,
    pierce: 0,
    pickupRange: 90,
    hpRegen: 0,
    xp: 0, level: 1,
    xpNeeded: 20,
    lastShot: 0,
    hitCooldowns: new Map(),
    keys: {},
    r: 18,
  };
}
let player = makePlayer();

// ─── Game entities ───────────────────────────────────────────────────────────
let enemies = [];
let bullets = [];
let enemyBullets = [];
let orbs = [];
let particles = [];
let enemyIdCounter = 0;

// ─── Virtual joystick ────────────────────────────────────────────────────────
let joystick = null; // { id, baseX, baseY, dx, dy } — dx/dy normalised -1..1

// ─── Game state vars ─────────────────────────────────────────────────────────
let waveNumber = 1;
let waveTimer = 0;
let spawnTimer = 0;
let surviveTime = 0;
let killCount = 0;
let screenFlash = 0;
let pendingUpgrades = [];
let hoveredCard = -1;

// ─── Upgrade pool ─────────────────────────────────────────────────────────────
const UPGRADES = [
  { id:'dmg',    name:'弹药强化', icon:'💥', desc:'子弹伤害 +8',       apply: p => p.bulletDamage += 8 },
  { id:'spd',    name:'急速射击', icon:'⚡', desc:'攻击速度 +25%',     apply: p => p.attackSpeed *= 1.25 },
  { id:'count',  name:'多重射击', icon:'🔱', desc:'同时发射 +1 颗子弹', apply: p => p.bulletCount += 1 },
  { id:'pierce', name:'穿透射击', icon:'🎯', desc:'子弹穿透 +1 个敌人', apply: p => p.pierce += 1 },
  { id:'mspd',   name:'风驰电掣', icon:'👟', desc:'移动速度 +18%',     apply: p => p.speed *= 1.18 },
  { id:'range',  name:'吸引磁场', icon:'🧲', desc:'拾取范围 +40px',    apply: p => p.pickupRange += 40 },
  { id:'maxhp',  name:'强化体魄', icon:'❤️', desc:'最大生命值 +30',    apply: p => { p.maxHp += 30; p.hp = Math.min(p.hp + 30, p.maxHp); } },
  { id:'heal',   name:'急救包',   icon:'💊', desc:'立即回复 40 HP',    apply: p => p.hp = Math.min(p.hp + 40, p.maxHp) },
  { id:'bsize',  name:'巨型子弹', icon:'🔵', desc:'子弹半径 +3，伤害 +5', apply: p => { p.bulletSize += 3; p.bulletDamage += 5; } },
  { id:'bspd',   name:'超音速弹', icon:'💨', desc:'子弹速度 +80',      apply: p => p.bulletSpeed += 80 },
  { id:'regen',  name:'持续恢复', icon:'🌿', desc:'每秒回复 1.5 HP',   apply: p => p.hpRegen += 1.5 },
  { id:'shield', name:'能量护盾', icon:'🛡️', desc:'获得 25 点护盾',    apply: p => p.shield += 25 },
];

// Track how many times each upgrade was taken
let upgradeCounts = {};

// ─── Enemy templates ─────────────────────────────────────────────────────────
const ENEMY_TYPES = {
  walker:  { name:'小怪',  color:'#E05050', r:14, hp:30,  speed:80,  damage:8,  xp:3  },
  runner:  { name:'快鬼',  color:'#E080C0', r:11, hp:18,  speed:145, damage:6,  xp:4  },
  tank:    { name:'肥怪',  color:'#8060D0', r:22, hp:120, speed:45,  damage:18, xp:10 },
  shooter: { name:'远程怪', color:'#50C0A0', r:13, hp:25,  speed:55,  damage:0,  xp:6  },
};

// ─── Utility ─────────────────────────────────────────────────────────────────
function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function choose(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function getSpawnWeight() {
  if (waveNumber <= 2)      return { walker:70, runner:20, tank:8,  shooter:2  };
  else if (waveNumber <= 4) return { walker:50, runner:30, tank:12, shooter:8  };
  else                       return { walker:35, runner:30, tank:18, shooter:17 };
}

function weightedRandom(weights) {
  const total = Object.values(weights).reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (const [key, w] of Object.entries(weights)) {
    r -= w;
    if (r <= 0) return key;
  }
  return Object.keys(weights)[0];
}

function spawnEnemy() {
  const type = weightedRandom(getSpawnWeight());
  const tmpl = ENEMY_TYPES[type];
  // Spawn from random edge
  let x, y;
  const edge = randInt(0, 3);
  if (edge === 0)      { x = rand(-30, W + 30); y = -30; }
  else if (edge === 1) { x = rand(-30, W + 30); y = H + 30; }
  else if (edge === 2) { x = -30; y = rand(-30, H + 30); }
  else                 { x = W + 30; y = rand(-30, H + 30); }

  enemies.push({
    id: enemyIdCounter++,
    type,
    x, y,
    hp: tmpl.hp,
    maxHp: tmpl.hp,
    color: tmpl.color,
    r: tmpl.r,
    speed: tmpl.speed,
    damage: tmpl.damage,
    xp: tmpl.xp,
    dead: false,
    shootTimer: type === 'shooter' ? rand(0, 2.2) : 0,
  });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = rand(40, 120);
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      color,
      r: rand(2, 4),
      life: 0.4,
      maxLife: 0.4,
    });
  }
}

function firePlayerBullets(now) {
  const target = getNearestEnemy();
  if (!target) return;
  const dx = target.x - player.x;
  const dy = target.y - player.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const baseAngle = Math.atan2(dy, dx);
  const count = player.bulletCount;
  const spread = count > 1 ? 0.15 : 0;

  for (let i = 0; i < count; i++) {
    const offset = count > 1 ? (i - (count - 1) / 2) * spread : 0;
    const angle = baseAngle + offset;
    bullets.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * player.bulletSpeed,
      vy: Math.sin(angle) * player.bulletSpeed,
      damage: player.bulletDamage,
      pierceLeft: player.pierce,
      size: player.bulletSize,
      life: 0.9,
      dead: false,
    });
  }
}

function getNearestEnemy() {
  let nearest = null, minD = Infinity;
  for (const e of enemies) {
    const d = dist(player, e);
    if (d < minD) { minD = d; nearest = e; }
  }
  return nearest;
}

function pickUpgrades() {
  // Build eligible list (max 4 repeats)
  const eligible = UPGRADES.filter(u => (upgradeCounts[u.id] || 0) < 4);
  // Shuffle
  const shuffled = [...eligible].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 3);
}

function applyDamageToPlayer(dmg) {
  let remaining = dmg;
  if (player.shield > 0) {
    const absorbed = Math.min(dmg, player.shield);
    player.shield -= absorbed;
    remaining -= absorbed;
  }
  if (remaining > 0) {
    player.hp -= remaining;
    if (player.hp <= 0) {
      player.hp = 0;
      endGame();
    }
  }
  screenFlash = 0.1;
}

function endGame() {
  state = 'dead';
  const hi = parseFloat(localStorage.getItem('roguelite_hi') || '0');
  if (surviveTime > hi) {
    localStorage.setItem('roguelite_hi', surviveTime.toFixed(1));
  }
}

function startGame() {
  player = makePlayer();
  enemies = [];
  bullets = [];
  enemyBullets = [];
  orbs = [];
  particles = [];
  waveNumber = 1;
  waveTimer = 0;
  spawnTimer = 0;
  surviveTime = 0;
  killCount = 0;
  screenFlash = 0;
  upgradeCounts = {};
  state = 'playing';
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(dt) {
  surviveTime += dt;

  // HP regen
  if (player.hpRegen > 0) {
    player.hp = Math.min(player.hp + player.hpRegen * dt, player.maxHp);
  }

  // Screen flash decay
  if (screenFlash > 0) screenFlash = Math.max(0, screenFlash - dt * 2);

  // Player movement — keyboard or virtual joystick
  let mx = 0, my = 0;
  if (joystick) {
    mx = joystick.dx; my = joystick.dy;
  } else {
    const k = player.keys;
    if (k['ArrowLeft']  || k['a'] || k['A']) mx -= 1;
    if (k['ArrowRight'] || k['d'] || k['D']) mx += 1;
    if (k['ArrowUp']    || k['w'] || k['W']) my -= 1;
    if (k['ArrowDown']  || k['s'] || k['S']) my += 1;
    if (mx !== 0 && my !== 0) { mx *= 0.707; my *= 0.707; }
  }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x + mx * player.speed * dt));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y + my * player.speed * dt));

  // Auto-shoot
  const now = performance.now();
  const shotInterval = 1000 / player.attackSpeed;
  if (now - player.lastShot >= shotInterval && enemies.length > 0) {
    player.lastShot = now;
    firePlayerBullets(now);
  }

  // Update player bullets
  for (const b of bullets) {
    if (b.dead) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      b.dead = true;
    }
  }

  // Update enemy bullets
  for (const b of enemyBullets) {
    if (b.dead) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0) { b.dead = true; continue; }
    // Hit player
    if (dist(b, player) < player.r + b.r) {
      b.dead = true;
      applyDamageToPlayer(b.damage);
    }
  }

  // Update enemies
  for (const e of enemies) {
    if (e.dead) continue;

    // Move toward player
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 0) {
      e.x += (dx / d) * e.speed * dt;
      e.y += (dy / d) * e.speed * dt;
    }

    // Shooter fires
    if (e.type === 'shooter') {
      e.shootTimer += dt;
      if (e.shootTimer >= 2.2) {
        e.shootTimer = 0;
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        enemyBullets.push({
          x: e.x, y: e.y,
          vx: Math.cos(angle) * 170,
          vy: Math.sin(angle) * 170,
          r: 4, damage: 10, color: '#50C0A0',
          life: 2.5, dead: false,
        });
      }
    }

    // Contact damage to player
    if (dist(e, player) < e.r + player.r) {
      const lastHit = player.hitCooldowns.get(e.id) || 0;
      if (now - lastHit >= 600) {
        player.hitCooldowns.set(e.id, now);
        applyDamageToPlayer(e.damage);
      }
    }

    // Check bullet hits
    for (const b of bullets) {
      if (b.dead) continue;
      if (dist(b, e) < b.size + e.r) {
        e.hp -= b.damage;
        b.pierceLeft--;
        if (b.pierceLeft < 0) b.dead = true;
        if (e.hp <= 0) {
          e.dead = true;
          killCount++;
          spawnParticles(e.x, e.y, e.color, randInt(6, 8));
          orbs.push({ x: e.x, y: e.y, xp: e.xp, r: 5, dead: false });
          break;
        }
      }
    }
  }

  // Wave timer
  waveTimer += dt;
  if (waveTimer >= 20) {
    waveTimer -= 20;
    waveNumber++;
  }

  // Spawn timer
  const spawnInterval = Math.max(0.35, 1.4 - waveNumber * 0.09);
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    const count = waveNumber >= 3 ? 2 : 1;
    for (let i = 0; i < count; i++) spawnEnemy();
  }

  // XP orbs
  for (const orb of orbs) {
    if (orb.dead) continue;
    const d = dist(orb, player);
    if (d < player.pickupRange) {
      const dx2 = player.x - orb.x;
      const dy2 = player.y - orb.y;
      const len = Math.sqrt(dx2 * dx2 + dy2 * dy2);
      if (len < 220 * dt + player.r) {
        // Collect
        orb.dead = true;
        player.xp += orb.xp;
        if (player.xp >= player.xpNeeded) {
          player.xp -= player.xpNeeded;
          player.level++;
          player.xpNeeded = 20 + player.level * 15;
          pendingUpgrades = pickUpgrades();
          hoveredCard = -1;
          state = 'levelup';
        }
      } else {
        orb.x += (dx2 / len) * 220 * dt;
        orb.y += (dy2 / len) * 220 * dt;
      }
    }
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 1 - 3 * dt;
    p.vy *= 1 - 3 * dt;
    p.life -= dt;
  }

  // Cleanup
  bullets       = bullets.filter(b => !b.dead);
  enemyBullets  = enemyBullets.filter(b => !b.dead);
  enemies       = enemies.filter(e => !e.dead);
  orbs          = orbs.filter(o => !o.dead);
  particles     = particles.filter(p => p.life > 0);
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawBar(x, y, w, h, fill, bg, value, max) {
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w * (value / max), h);
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Vignette
  const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  if (state === 'start') {
    drawStartScreen();
    return;
  }

  // XP orbs
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#58A0FF';
  for (const orb of orbs) {
    ctx.beginPath();
    ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI * 2);
    ctx.fillStyle = '#58A0FF';
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Enemy bullets
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#50C0A0';
  for (const b of enemyBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Player bullets
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#FFE566';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fillStyle = '#FFE566';
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Enemies
  for (const e of enemies) {
    const tmpl = ENEMY_TYPES[e.type];
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fillStyle = e.color;
    ctx.fill();
    ctx.strokeStyle = shadeColor(e.color, -40);
    ctx.lineWidth = 2;
    ctx.stroke();

    // HP bar
    if (e.hp < e.maxHp) {
      const bw = e.r * 2 + 4;
      const bx = e.x - bw / 2;
      const by = e.y - e.r - 7;
      drawBar(bx, by, bw, 4, '#E04040', '#333', e.hp, e.maxHp);
    }
  }

  // Player
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#F4A44A';
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fillStyle = '#F4A44A';
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#C07828';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Shield ring
  if (player.shield > 0) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(80,160,220,${0.4 + 0.3 * Math.sin(Date.now() / 300)})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(220,30,30,${screenFlash * 0.15 / 0.1})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Virtual joystick overlay — fixed bottom-right
  if (state === 'playing') {
    const JR = JOYSTICK_R, TR = 22;
    const active = !!joystick;
    const tdx = active ? joystick.dx * JR : 0;
    const tdy = active ? joystick.dy * JR : 0;
    ctx.save();
    // Base ring
    ctx.globalAlpha = active ? 0.38 : 0.18;
    ctx.beginPath(); ctx.arc(JOY_BASE_X, JOY_BASE_Y, JR, 0, Math.PI*2);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = active ? 0.12 : 0.05;
    ctx.fillStyle = '#fff'; ctx.fill();
    // Thumb
    ctx.globalAlpha = active ? 0.60 : 0.22;
    ctx.beginPath();
    ctx.arc(JOY_BASE_X + tdx, JOY_BASE_Y + tdy, TR, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();
  }

  // HUD
  drawHUD();

  if (state === 'levelup') drawLevelUpScreen();
  if (state === 'dead')    drawDeadScreen();
}

function shadeColor(hex, amt) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (num & 0xff) + amt));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function drawHUD() {
  const pad = 14;

  // HP bar
  drawBar(pad, pad, 160, 10, '#E04040', 'rgba(60,30,30,0.8)', player.hp, player.maxHp);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(pad, pad, 160, 10);

  ctx.fillStyle = '#fff';
  ctx.font = '11px "PingFang SC", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`, pad, pad + 22);

  let barY = pad + 26;

  // Shield bar
  if (player.shield > 0) {
    drawBar(pad, barY, 160, 6, '#50A0DC', 'rgba(20,40,80,0.8)', player.shield, Math.max(player.shield, 25));
    barY += 10;
  }

  // XP bar
  drawBar(pad, barY, 160, 6, '#40E0D0', 'rgba(20,50,60,0.8)', player.xp, player.xpNeeded);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.strokeRect(pad, barY, 160, 6);
  ctx.fillStyle = '#80E8D8';
  ctx.font = '11px "PingFang SC", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Lv.${player.level}`, pad + 166, barY + 6);

  // Top-right HUD
  ctx.textAlign = 'right';
  ctx.font = 'bold 13px "PingFang SC", sans-serif';
  ctx.fillStyle = '#E8C870';
  ctx.fillText(`第 ${waveNumber} 波`, W - pad, pad + 14);
  ctx.fillStyle = '#A0C8E8';
  ctx.fillText(formatTime(surviveTime), W - pad, pad + 30);
  ctx.fillStyle = '#C8A8E8';
  ctx.fillText(`击杀 ${killCount}`, W - pad, pad + 46);

  ctx.textAlign = 'left';
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(5,5,15,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#F4A44A';
  ctx.font = 'bold 64px "PingFang SC", "STHeiti", sans-serif';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#F4A44A';
  ctx.fillText('末日突围', W / 2, H / 2 - 60);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(180,160,220,0.85)';
  ctx.font = '20px "PingFang SC", sans-serif';
  ctx.fillText('WASD 移动 · 自动攻击 · 升级求生', W / 2, H / 2);

  // Button
  const bw = 180, bh = 52, bx = W/2 - bw/2, by = H/2 + 40;
  const grd = ctx.createLinearGradient(bx, by, bx, by + bh);
  grd.addColorStop(0, '#F4A44A');
  grd.addColorStop(1, '#C07828');
  roundRect(bx, by, bw, bh, 26);
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "PingFang SC", sans-serif';
  ctx.fillText('开始游戏', W / 2, by + 34);

  // Hi-score
  const hi = parseFloat(localStorage.getItem('roguelite_hi') || '0');
  if (hi > 0) {
    ctx.fillStyle = 'rgba(200,180,100,0.7)';
    ctx.font = '14px "PingFang SC", sans-serif';
    ctx.fillText(`最佳记录: ${formatTime(hi)}`, W / 2, H / 2 + 120);
  }
  ctx.textAlign = 'left';
}

function drawLevelUpScreen() {
  ctx.fillStyle = 'rgba(5,5,15,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#F4D070';
  ctx.font = 'bold 28px "PingFang SC", sans-serif';
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#F4D070';
  ctx.fillText(`升级！ Lv.${player.level}`, W / 2, H / 2 - 90);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(180,160,220,0.8)';
  ctx.font = '16px "PingFang SC", sans-serif';
  ctx.fillText('选择一项强化', W / 2, H / 2 - 60);

  const cardW = 200, cardH = 120, gap = 20;
  const totalW = pendingUpgrades.length * cardW + (pendingUpgrades.length - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const cardY = H / 2 - 40;

  for (let i = 0; i < pendingUpgrades.length; i++) {
    const u = pendingUpgrades[i];
    const cx = startX + i * (cardW + gap);
    const hovered = (hoveredCard === i);

    ctx.save();
    if (hovered) {
      ctx.translate(cx + cardW / 2, cardY + cardH / 2);
      ctx.scale(1.04, 1.04);
      ctx.translate(-(cx + cardW / 2), -(cardY + cardH / 2));
    }

    // Card bg
    roundRect(cx, cardY, cardW, cardH, 12);
    ctx.fillStyle = 'rgba(20,18,35,0.95)';
    ctx.fill();
    ctx.strokeStyle = hovered ? 'rgba(200,160,255,0.9)' : 'rgba(120,100,200,0.5)';
    ctx.lineWidth = hovered ? 2 : 1.5;
    ctx.stroke();

    // Icon
    ctx.font = '32px serif';
    ctx.textAlign = 'center';
    ctx.fillText(u.icon, cx + cardW / 2, cardY + 42);

    // Name
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px "PingFang SC", sans-serif';
    ctx.fillText(u.name, cx + cardW / 2, cardY + 68);

    // Desc
    ctx.fillStyle = 'rgba(180,160,220,0.8)';
    ctx.font = '12px "PingFang SC", sans-serif';
    ctx.fillText(u.desc, cx + cardW / 2, cardY + 88);

    // Count badge
    const cnt = upgradeCounts[u.id] || 0;
    if (cnt > 0) {
      ctx.fillStyle = 'rgba(200,160,80,0.9)';
      ctx.font = '11px "PingFang SC", sans-serif';
      ctx.fillText(`已强化 ${cnt} 次`, cx + cardW / 2, cardY + 108);
    }

    ctx.restore();
  }
  ctx.textAlign = 'left';
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(5,5,15,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#E04040';
  ctx.font = 'bold 52px "PingFang SC", sans-serif';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#E04040';
  ctx.fillText('你牺牲了', W / 2, H / 2 - 80);
  ctx.shadowBlur = 0;

  const stats = [
    `存活时间: ${formatTime(surviveTime)}`,
    `达到等级: Lv.${player.level}`,
    `击杀数量: ${killCount}`,
  ];
  ctx.fillStyle = 'rgba(200,180,220,0.9)';
  ctx.font = '18px "PingFang SC", sans-serif';
  for (let i = 0; i < stats.length; i++) {
    ctx.fillText(stats[i], W / 2, H / 2 - 20 + i * 28);
  }

  const hi = parseFloat(localStorage.getItem('roguelite_hi') || '0');
  ctx.fillStyle = 'rgba(200,170,80,0.85)';
  ctx.font = '15px "PingFang SC", sans-serif';
  ctx.fillText(`最佳记录: ${formatTime(hi)}`, W / 2, H / 2 + 75);

  // Restart button
  const bw = 180, bh = 52, bx = W/2 - bw/2, by = H/2 + 90;
  const grd = ctx.createLinearGradient(bx, by, bx, by + bh);
  grd.addColorStop(0, '#8060D0');
  grd.addColorStop(1, '#5040A0');
  roundRect(bx, by, bw, bh, 26);
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "PingFang SC", sans-serif';
  ctx.fillText('再来一局', W / 2, by + 34);

  ctx.textAlign = 'left';
}

// ─── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  player.keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') {
    if (state === 'start') startGame();
  }
});
document.addEventListener('keyup', e => {
  player.keys[e.key] = false;
});

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;
  return { x: cx, y: cy };
}

canvas.addEventListener('mousemove', e => {
  if (state !== 'levelup') { hoveredCard = -1; return; }
  const { x, y } = getCanvasPos(e);
  const cardW = 200, cardH = 120, gap = 20;
  const totalW = pendingUpgrades.length * cardW + (pendingUpgrades.length - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const cardY = H / 2 - 40;
  hoveredCard = -1;
  for (let i = 0; i < pendingUpgrades.length; i++) {
    const cx = startX + i * (cardW + gap);
    if (x >= cx && x <= cx + cardW && y >= cardY && y <= cardY + cardH) {
      hoveredCard = i;
    }
  }
});

function handleTap(x, y) {
  if (state === 'start') {
    const bw = 180, bh = 52, bx = W/2 - bw/2, by = H/2 + 40;
    if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) startGame();
    return;
  }
  if (state === 'dead') {
    const bw = 180, bh = 52, bx = W/2 - bw/2, by = H/2 + 90;
    if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) startGame();
    return;
  }
  if (state === 'levelup') {
    const cardW = 200, cardH = 120, gap = 20;
    const totalW = pendingUpgrades.length * cardW + (pendingUpgrades.length - 1) * gap;
    const startX = W / 2 - totalW / 2;
    const cardY = H / 2 - 40;
    for (let i = 0; i < pendingUpgrades.length; i++) {
      const cx = startX + i * (cardW + gap);
      if (x >= cx && x <= cx + cardW && y >= cardY && y <= cardY + cardH) {
        const u = pendingUpgrades[i];
        u.apply(player);
        upgradeCounts[u.id] = (upgradeCounts[u.id] || 0) + 1;
        pendingUpgrades = [];
        state = 'playing';
        return;
      }
    }
  }
}

canvas.addEventListener('click', e => {
  const { x, y } = getCanvasPos(e);
  handleTap(x, y);
});

// ─── Touch / virtual joystick ────────────────────────────────────────────────
const JOYSTICK_R = 56;
// Fixed base position: bottom-right corner
const JOY_BASE_X = W - 90;
const JOY_BASE_Y = H - 80;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (state === 'playing' && !joystick) {
      joystick = { id: t.identifier, dx: 0, dy: 0 };
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (joystick && t.identifier === joystick.id) {
      const { x, y } = getCanvasPos(t);
      let dx = x - JOY_BASE_X, dy = y - JOY_BASE_Y;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len > JOYSTICK_R) { dx = dx/len*JOYSTICK_R; dy = dy/len*JOYSTICK_R; }
      joystick.dx = dx / JOYSTICK_R;
      joystick.dy = dy / JOYSTICK_R;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (joystick && t.identifier === joystick.id) {
      joystick = null;
    }
    // UI screens: treat lift-off as tap
    if (state !== 'playing') {
      const { x, y } = getCanvasPos(t);
      handleTap(x, y);
    }
  }
}, { passive: false });

// ─── Game loop ────────────────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if (state === 'playing') update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
