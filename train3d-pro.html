<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>3D 列车驾驶 Pro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#1a1410;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;color:#fff;
    user-select:none;-webkit-user-select:none}
  #scene{position:fixed;inset:0}
  canvas{display:block}
  .home{position:fixed;top:14px;left:14px;color:#fff;background:rgba(0,0,0,0.45);
    padding:6px 12px;border-radius:14px;text-decoration:none;font-size:14px;
    border:1px solid rgba(255,255,255,0.2);z-index:30}
  .home:hover{background:rgba(0,0,0,0.7)}

  /* ── 驾驶室装饰 ── */
  #cabFrame{position:fixed;inset:0;pointer-events:none;z-index:10}
  #cabFrame::before{content:'';position:absolute;inset:0;
    background:
      linear-gradient(105deg, rgba(8,8,12,0.95) 0%, rgba(8,8,12,0.6) 3%, transparent 7%),
      linear-gradient(-105deg, rgba(8,8,12,0.95) 0%, rgba(8,8,12,0.6) 3%, transparent 7%),
      linear-gradient(180deg, rgba(8,8,12,0.9) 0%, transparent 5%);
  }

  /* ── HUD ── */
  #hud{position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:linear-gradient(180deg, #2a3240, #161c26);
    border-top:3px solid #3a4250;
    padding:10px 14px;
    display:flex;align-items:center;gap:14px;flex-wrap:nowrap}

  .gauge{position:relative;width:92px;height:92px;border-radius:50%;
    background:#10141c;border:3px solid #4a5262;flex:0 0 auto}
  .gauge .needle{position:absolute;left:50%;top:50%;width:3px;height:36px;
    background:#ffd890;border-radius:2px;
    transform-origin:50% 0%;
    transform:rotate(135deg)}
  .gauge .hub{position:absolute;left:50%;top:50%;width:10px;height:10px;
    margin:-5px;border-radius:50%;background:#ffd890}
  .gauge .spd{position:absolute;left:0;right:0;top:56px;text-align:center;
    font:bold 17px monospace;color:#7eff90}
  .gauge .spd.over{color:#ff5070}
  .gauge .unit{position:absolute;left:0;right:0;top:74px;text-align:center;
    font:9px monospace;color:#6a7282}

  .infoScreen{background:#0c1410;border:1px solid #2a4232;border-radius:4px;
    padding:8px 12px;min-width:170px;flex:0 0 auto}
  .infoScreen .lbl{font:10px monospace;color:#5a9a6a}
  .infoScreen .stName{font:bold 16px monospace;color:#9aeaaa}
  .infoScreen .stDist{font:bold 20px monospace;color:#cde8d0}
  .infoScreen .stDist.near{color:#ffb060}

  .statBox{flex:0 0 auto;font:11px monospace;color:#8a92a2;line-height:1.7}
  .statBox b{display:block;font:bold 18px monospace;color:#7ec8e8}
  .statBox .limit{color:#ffd890;font-weight:bold;font-size:15px}

  .progress{flex:1 1 auto;min-width:80px;height:14px;background:rgba(255,255,255,0.08);
    position:relative;border-radius:3px;overflow:visible}
  .progress .fill{position:absolute;left:0;top:0;bottom:0;background:#5a9a6a;border-radius:3px}
  .progress .stMark{position:absolute;top:-3px;width:2px;height:20px;background:#aab}
  .progress .stMark.done{background:#7eff90}
  .progress .stMark.next{background:#ffd890}

  .lever{display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .lever .lbl{font:bold 11px monospace;color:#8a92a2;width:30px}
  .lever button{width:34px;height:34px;border:1px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.08);color:#fff;font:bold 16px monospace;
    border-radius:4px;cursor:pointer}
  .lever button:active{background:rgba(255,255,255,0.25)}
  .lever .val{width:60px;height:24px;background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.15);border-radius:3px;
    position:relative;overflow:hidden}
  .lever .val .bar{position:absolute;left:0;top:0;bottom:0}
  .lever .val .num{position:absolute;inset:0;text-align:center;
    font:bold 13px/24px monospace;color:#fff;text-shadow:0 0 3px #000}

  .btnEm{padding:8px 10px;border:1.5px solid rgba(255,90,90,0.6);
    background:rgba(255,90,90,0.2);color:#ff9090;font:bold 12px monospace;
    border-radius:4px;cursor:pointer;flex:0 0 auto}
  .btnGo{padding:8px 16px;border:1.5px solid rgba(122,255,144,0.5);
    background:rgba(122,255,144,0.16);color:#7eff90;font:bold 13px monospace;
    border-radius:4px;cursor:pointer;flex:0 0 auto}

  /* ── Toast ── */
  #toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:25;
    background:rgba(20,28,40,0.92);border:1px solid rgba(255,255,255,0.25);
    padding:9px 20px;border-radius:6px;font:bold 16px sans-serif;
    opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}

  /* ── 遮罩 ── */
  #overlay{position:fixed;inset:0;z-index:24;background:rgba(12,16,24,0.82);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:14px}
  #overlay h1{font-size:40px}
  #overlay .sub{color:#7ec8e8;font-size:16px}
  #overlay p{color:#cfdce8;font-size:14px;line-height:1.8}
  #overlay .best{color:#f4c440;font:bold 15px monospace}
  #overlay .hint{color:#8a92a2;font-size:12px}
  #overlay.hidden{display:none}

  @media (max-width:720px){
    .statBox.t2{display:none}
    .progress{display:none}
    #overlay h1{font-size:28px}
  }
</style>
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="vibe coding">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2785C">
<link rel="manifest" href="manifest.webmanifest">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<div id="scene"></div>
<div id="cabFrame"></div>
<a class="home" href="index.html">← 返回</a>

<div id="toast"></div>

<div id="hud">
  <div class="gauge">
    <div class="needle" id="needle"></div>
    <div class="hub"></div>
    <div class="spd" id="spdNum">0</div>
    <div class="unit">km/h</div>
  </div>
  <div class="infoScreen">
    <div class="lbl">下一站</div>
    <div class="stName" id="stName">—</div>
    <div class="stDist" id="stDist">— m</div>
  </div>
  <div class="statBox">
    限速 <span class="limit" id="limitNum">50</span><br>
    时间 <span id="timeNum">0:00</span>
  </div>
  <div class="statBox t2">
    得分<b id="scoreNum">0</b>
  </div>
  <div class="statBox t2">
    最佳<b id="bestNum" style="color:#8a92a2">0</b>
  </div>
  <div class="progress" id="progBar"><div class="fill" id="progFill"></div></div>
  <div class="lever">
    <span class="lbl">牵引</span>
    <button id="thrMinus">−</button>
    <div class="val"><div class="bar" id="thrBar" style="background:#7eff90"></div><div class="num" id="thrNum">0</div></div>
    <button id="thrPlus">＋</button>
  </div>
  <div class="lever">
    <span class="lbl">制动</span>
    <button id="brkMinus">−</button>
    <div class="val"><div class="bar" id="brkBar" style="background:#ff7070"></div><div class="num" id="brkNum">8</div></div>
    <button id="brkPlus">＋</button>
  </div>
  <button class="btnEm" id="btnEm">⚠ 紧急</button>
  <button class="btnGo" id="btnGo">出发 ▶</button>
</div>

<div id="overlay">
  <h1>🚆 3D 列车驾驶 Pro</h1>
  <div class="sub">— three.js · First-Person Train Sim —</div>
  <p>黄昏山线 · 真实曲线轨道 · 过弯倾斜 · 弯道隧道<br>
  看好限速，把车精准停靠在站台「停」标旁</p>
  <div class="hint">W/S 加减档 · Space 紧急制动 · 底部手柄可触控</div>
  <div class="best" id="ovBest">最佳分数：0</div>
</div>

<script>
// ════════ three.js 场景 ════════
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
document.getElementById('scene').appendChild(renderer.domElement);

const scene = new THREE.Scene();
const DUSK = 0xe8a878;
scene.background = new THREE.Color(DUSK);
scene.fog = new THREE.Fog(DUSK, 150, 900);

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.3, 3000);

addEventListener('resize', ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── 光照（黄昏） ──
const hemi = new THREE.HemisphereLight(0xffd0a0, 0x33402a, 0.65);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffa860, 1.3);
sun.position.set(-400, 90, -300);
scene.add(sun);
// 太阳盘
const sunDisc = new THREE.Mesh(
  new THREE.SphereGeometry(36, 16, 16),
  new THREE.MeshBasicMaterial({color:0xffd9a0, fog:false})
);
sunDisc.position.set(-1400, 110, -1000);
scene.add(sunDisc);

// ════════ 轨道样条 ════════
const ctrl = [
  [0, 0],
  [0, 350],
  [50, 750],
  [150, 1150],   // 右弯
  [185, 1550],
  [130, 1950],   // 左弯回
  [40, 2350],
  [0, 2750],
  [0, 3050],     // 直线（隧道）
  [0, 3350],
  [70, 3750],    // 右弯
  [125, 4150],
  [125, 4550],
  [125, 5050],
];
const curve = new THREE.CatmullRomCurve3(
  ctrl.map(p=>new THREE.Vector3(p[0], 0, p[1])),
  false, 'catmullrom', 0.35
);
const L = curve.getLength();   // 总弧长
const ROUTE_LEN = L;

// 沿线定位工具
const _up = new THREE.Vector3(0,1,0);
function frameAt(d){
  const u = THREE.MathUtils.clamp(d/L, 0, 1);
  const p = curve.getPointAt(u);
  const t = curve.getTangentAt(u);
  const n = new THREE.Vector3().crossVectors(_up, t).normalize(); // 右侧
  return {p, t, n, u};
}
function placeAt(obj, d, lat, h){
  const f = frameAt(d);
  obj.position.copy(f.p).addScaledVector(f.n, lat);
  obj.position.y += h||0;
  obj.rotation.y = Math.atan2(f.t.x, f.t.z);
  return f;
}

// ════════ 站点 / 限速 / 隧道 ════════
const STATIONS = [
  {x: 30,      name:'起点·樱川'},
  {x: L*0.25,  name:'青木町'},
  {x: L*0.52,  name:'岩鹿'},
  {x: L*0.78,  name:'山中谷'},
  {x: L-60,    name:'终点·云海台'},
];
const TUNNEL = {start: L*0.555, end: L*0.555+420};
const SPEED_LIMITS = [
  {x: 0,               limit: 50},
  {x: 250,             limit: 90},
  {x: L*0.33,          limit: 110},
  {x: TUNNEL.start-120,limit: 70},
  {x: TUNNEL.end+100,  limit: 100},
  {x: L-380,           limit: 50},
];
const TARGET_TIME = 330;

function speedLimitAt(pos){
  let lim=SPEED_LIMITS[0].limit;
  for(const s of SPEED_LIMITS) if(pos>=s.x) lim=s.limit;
  return lim;
}
function inTunnel(pos){ return pos>=TUNNEL.start && pos<=TUNNEL.end; }

// ════════ 地面 / 远山 ════════
{
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(3000, 48),
    new THREE.MeshLambertMaterial({color:0x7a9050})
  );
  ground.rotation.x = -Math.PI/2;
  ground.position.set(60, -0.25, L/2);
  scene.add(ground);
  // 远山环（避开轨道走廊）
  const mtnMat = new THREE.MeshLambertMaterial({color:0x6a7a88});
  const trackSamples=[];
  for(let d=0; d<=L; d+=150) trackSamples.push(curve.getPointAt(d/L));
  function nearTrack(x,z,margin){
    for(const s of trackSamples){
      const dx=s.x-x, dz=s.z-z;
      if(dx*dx+dz*dz < margin*margin) return true;
    }
    return false;
  }
  for(let i=0;i<26;i++){
    const ang = i/26*Math.PI*2;
    const r = 1500 + Math.sin(i*3.7)*350;
    const h = 180 + Math.sin(i*2.3)*90;
    const mx = 60+Math.cos(ang)*r, mz = L/2+Math.sin(ang)*r;
    if(nearTrack(mx, mz, 500)) continue;
    const m = new THREE.Mesh(new THREE.ConeGeometry(260+Math.sin(i*5)*80, h, 7), mtnMat);
    m.position.set(mx, h/2-30, mz);
    scene.add(m);
  }
}

// ════════ 轨道几何（道砟 + 钢轨缎带） ════════
function buildRibbon(latL, latR, y, color, step){
  const pos=[], idx=[];
  const N = Math.floor(L/step);
  for(let i=0;i<=N;i++){
    const f = frameAt(i*step);
    const a = f.p.clone().addScaledVector(f.n, latL); a.y+=y;
    const b = f.p.clone().addScaledVector(f.n, latR); b.y+=y;
    pos.push(a.x,a.y,a.z, b.x,b.y,b.z);
    if(i<N){
      const k=i*2;
      idx.push(k,k+1,k+2, k+1,k+3,k+2);
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx);
  g.computeVertexNormals();
  return new THREE.Mesh(g, new THREE.MeshLambertMaterial({color, side:THREE.DoubleSide}));
}
scene.add(buildRibbon(-3.4, 3.4, 0.02, 0x9a8a72, 6));     // 道砟
scene.add(buildRibbon(-0.82,-0.68, 0.20, 0xe8e8f0, 4));   // 左轨
scene.add(buildRibbon( 0.68, 0.82, 0.20, 0xe8e8f0, 4));   // 右轨

// 枕木 InstancedMesh
{
  const N = Math.floor(L/3.2);
  const inst = new THREE.InstancedMesh(
    new THREE.BoxGeometry(2.4, 0.12, 0.4),
    new THREE.MeshLambertMaterial({color:0x4a3422}),
    N
  );
  const m4=new THREE.Matrix4(), q=new THREE.Quaternion(), s=new THREE.Vector3(1,1,1);
  for(let i=0;i<N;i++){
    const f=frameAt(i*3.2+1);
    q.setFromAxisAngle(_up, Math.atan2(f.t.x,f.t.z));
    m4.compose(new THREE.Vector3(f.p.x, 0.08, f.p.z), q, s);
    inst.setMatrixAt(i, m4);
  }
  scene.add(inst);
}

// ════════ 接触网（电杆 + 导线） ════════
{
  const N = Math.floor(L/55);
  const poleInst = new THREE.InstancedMesh(
    new THREE.BoxGeometry(0.25, 7, 0.25),
    new THREE.MeshLambertMaterial({color:0x4a4a52}), N);
  const armInst = new THREE.InstancedMesh(
    new THREE.BoxGeometry(0.15, 0.15, 3.4),
    new THREE.MeshLambertMaterial({color:0x4a4a52}), N);
  const m4=new THREE.Matrix4(), q=new THREE.Quaternion(), s=new THREE.Vector3(1,1,1);
  for(let i=0;i<N;i++){
    const d=i*55+8;
    const f=frameAt(d);
    q.setFromAxisAngle(_up, Math.atan2(f.t.x,f.t.z));
    const base=f.p.clone().addScaledVector(f.n,-4.2);
    m4.compose(new THREE.Vector3(base.x,3.5,base.z), q, s);
    poleInst.setMatrixAt(i,m4);
    const armP=f.p.clone().addScaledVector(f.n,-2.5);
    m4.compose(new THREE.Vector3(armP.x,6.3,armP.z), q, new THREE.Vector3(1,1,1));
    armInst.setMatrixAt(i,m4);
  }
  scene.add(poleInst, armInst);
  // 导线
  const wirePts=[];
  for(let d=0; d<=L; d+=14){
    const f=frameAt(d);
    wirePts.push(new THREE.Vector3(f.p.x, 5.6, f.p.z));
  }
  const wire = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(wirePts),
    new THREE.LineBasicMaterial({color:0x222228})
  );
  scene.add(wire);
}

// ════════ 树木 ════════
{
  const N=420;
  const canopyInst = new THREE.InstancedMesh(
    new THREE.ConeGeometry(1.8, 4.4, 7),
    new THREE.MeshLambertMaterial({color:0x39622f}), N);
  const trunkInst = new THREE.InstancedMesh(
    new THREE.CylinderGeometry(0.22,0.3,1.6,5),
    new THREE.MeshLambertMaterial({color:0x5a3a20}), N);
  const m4=new THREE.Matrix4(), q=new THREE.Quaternion();
  const colors=[0x39622f, 0x4a7a3a, 0x2f5228];
  for(let i=0;i<N;i++){
    const d=Math.random()*L;
    if(d>TUNNEL.start-60 && d<TUNNEL.end+60){ // 隧道段不种
      canopyInst.setMatrixAt(i, new THREE.Matrix4().makeScale(0,0,0));
      trunkInst.setMatrixAt(i, new THREE.Matrix4().makeScale(0,0,0));
      continue;
    }
    const side=Math.random()<0.5?-1:1;
    const lat=side*(7.5+Math.random()*48);
    const f=frameAt(d);
    const p=f.p.clone().addScaledVector(f.n,lat);
    const sc=0.7+Math.random()*1.5;
    q.setFromAxisAngle(_up, Math.random()*Math.PI);
    m4.compose(new THREE.Vector3(p.x, 1.4*sc+1.4, p.z), q, new THREE.Vector3(sc,sc,sc));
    canopyInst.setMatrixAt(i,m4);
    m4.compose(new THREE.Vector3(p.x, 0.8*sc, p.z), q, new THREE.Vector3(sc,sc,sc));
    trunkInst.setMatrixAt(i,m4);
    canopyInst.setColorAt(i, new THREE.Color(colors[i%3]));
  }
  scene.add(canopyInst, trunkInst);
}

// ════════ 车站 ════════
function makeTextSprite(text, fg, bg, w, h, fs){
  const c=document.createElement('canvas');
  c.width=w; c.height=h;
  const x=c.getContext('2d');
  x.fillStyle=bg; x.fillRect(0,0,w,h);
  x.fillStyle=fg; x.font=`bold ${fs}px "PingFang SC",sans-serif`;
  x.textAlign='center'; x.textBaseline='middle';
  x.fillText(text, w/2, h/2);
  const tex=new THREE.CanvasTexture(c);
  return new THREE.MeshBasicMaterial({map:tex});
}
for(const st of STATIONS){
  const g = new THREE.Group();
  // 站台
  const plat = new THREE.Mesh(
    new THREE.BoxGeometry(4, 0.9, 64),
    new THREE.MeshLambertMaterial({color:0xc4b890}));
  plat.position.set(4.6, 0.45, 0);
  g.add(plat);
  // 站房
  const house = new THREE.Mesh(
    new THREE.BoxGeometry(5, 4, 9),
    new THREE.MeshLambertMaterial({color:0xe0d4b0}));
  house.position.set(9.5, 2.9, 0);
  g.add(house);
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(6.4, 2.6, 4),
    new THREE.MeshLambertMaterial({color:0x7a4030}));
  roof.position.set(9.5, 6.2, 0);
  roof.rotation.y = Math.PI/4;
  g.add(roof);
  // 站名牌
  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(7, 1.6),
    makeTextSprite(st.name, '#2a3040', '#f0e8d0', 256, 64, 34));
  sign.position.set(6.7, 3.4, 0);
  sign.rotation.y = -Math.PI/2;
  g.add(sign);
  // 停标（左侧红白杆 + 停牌）
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06,0.06,1.8,6),
    new THREE.MeshLambertMaterial({color:0xe84040}));
  pole.position.set(-3.2, 0.9, 0);
  g.add(pole);
  const stopSign = new THREE.Mesh(
    new THREE.PlaneGeometry(1.1, 0.7),
    makeTextSprite('停', '#e84040', '#ffffff', 96, 64, 44));
  stopSign.position.set(-3.2, 2.0, 0);
  stopSign.rotation.y = Math.PI/2;
  g.add(stopSign);
  placeAt(g, st.x, 0, 0);
  scene.add(g);
}

// ════════ 限速牌 ════════
for(const sl of SPEED_LIMITS){
  if(sl.x<=0) continue;
  const g=new THREE.Group();
  const pole=new THREE.Mesh(
    new THREE.CylinderGeometry(0.07,0.07,2.6,6),
    new THREE.MeshLambertMaterial({color:0x555560}));
  pole.position.y=1.3;
  g.add(pole);
  const face=new THREE.Mesh(
    new THREE.CircleGeometry(0.65, 24),
    makeTextSprite(String(sl.limit), '#222', '#ffffff', 128, 128, 64));
  face.position.y=2.9;
  face.rotation.y=Math.PI;       // 面向来车
  g.add(face);
  const rim=new THREE.Mesh(
    new THREE.RingGeometry(0.62, 0.74, 24),
    new THREE.MeshBasicMaterial({color:0xe84040, side:THREE.DoubleSide}));
  rim.position.set(0, 2.9, -0.01);
  rim.rotation.y=Math.PI;
  g.add(rim);
  placeAt(g, sl.x, 4.5, 0);
  scene.add(g);
}

// ════════ 隧道 ════════
{
  // 取隧道段子样条
  const pts=[];
  for(let d=TUNNEL.start-6; d<=TUNNEL.end+6; d+=20){
    const f=frameAt(d);
    pts.push(new THREE.Vector3(f.p.x, 2.4, f.p.z));
  }
  const sub=new THREE.CatmullRomCurve3(pts);
  const tube=new THREE.Mesh(
    new THREE.TubeGeometry(sub, 64, 5.4, 14, false),
    new THREE.MeshLambertMaterial({color:0x4a423a, side:THREE.BackSide}));
  scene.add(tube);
  // 覆盖山体
  const hillMat=new THREE.MeshLambertMaterial({color:0x5e7244});
  for(let i=0;i<4;i++){
    const d=TUNNEL.start + (i+0.5)*(TUNNEL.end-TUNNEL.start)/4;
    const f=frameAt(d);
    const hill=new THREE.Mesh(new THREE.SphereGeometry(85, 14, 10), hillMat);
    hill.scale.set(1.3, 0.5, 1);
    hill.position.set(f.p.x, -6, f.p.z);
    scene.add(hill);
  }
  // 洞口
  for(const dd of [TUNNEL.start, TUNNEL.end]){
    const g=new THREE.Group();
    const facade=new THREE.Mesh(
      new THREE.BoxGeometry(17, 10, 1.4),
      new THREE.MeshLambertMaterial({color:0x6a6258}));
    facade.position.y=4.4;
    g.add(facade);
    const hole=new THREE.Mesh(
      new THREE.CircleGeometry(4.6, 20),
      new THREE.MeshBasicMaterial({color:0x0a0806}));
    hole.position.set(0, 2.6, dd===TUNNEL.start ? -0.72 : 0.72);
    if(dd===TUNNEL.end) hole.rotation.y=Math.PI;
    g.add(hole);
    placeAt(g, dd, 0, 0);
    scene.add(g);
  }
  // 隧道灯
  const lampMat=new THREE.MeshBasicMaterial({color:0xffd890});
  for(let d=TUNNEL.start+25; d<TUNNEL.end; d+=42){
    const f=frameAt(d);
    const lamp=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8), lampMat);
    lamp.position.set(f.p.x, 5.0, f.p.z);
    scene.add(lamp);
    const pt=new THREE.PointLight(0xffc070, 9, 40);
    pt.position.copy(lamp.position);
    scene.add(pt);
  }
}

// ════════ 车头引擎盖 ════════
const nose=new THREE.Group();
{
  const hood=new THREE.Mesh(
    new THREE.BoxGeometry(1.9, 0.3, 2.0),
    new THREE.MeshLambertMaterial({color:0xb83828}));
  hood.position.set(0, -1.5, -3.4);
  nose.add(hood);
}
scene.add(nose);

// ════════ 游戏状态 ════════
let state='start';
let trainPos=0, trainSpeedKmh=0;
let throttle=0, brake=8;
let nextStationIdx=1;
let score=0, elapsed=0, overSpeedTime=0;
let bestScore=parseInt(localStorage.getItem('train3dpro_best')||'0');
let stationsDone=[];

const $=id=>document.getElementById(id);
$('ovBest').textContent=`最佳分数：${bestScore}`;
$('bestNum').textContent=bestScore;

// 进度条站点标记
for(const st of STATIONS){
  const m=document.createElement('div');
  m.className='stMark';
  m.style.left=`${st.x/L*100}%`;
  $('progBar').appendChild(m);
}

let toastTimer=null;
function showToast(t,col){
  const el=$('toast');
  el.textContent=t;
  el.style.color=col||'#fff';
  el.style.opacity=1;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.opacity=0;}, 2200);
}

// ── 控制 ──
function setThrottle(v){
  if(state!=='driving')return;
  throttle=THREE.MathUtils.clamp(v,0,8);
  if(throttle>0)brake=0;
}
function setBrake(v){
  if(state!=='driving')return;
  brake=THREE.MathUtils.clamp(v,0,8);
  if(brake>0)throttle=0;
}
$('thrPlus').onclick=()=>setThrottle(throttle+1);
$('thrMinus').onclick=()=>setThrottle(throttle-1);
$('brkPlus').onclick=()=>setBrake(brake+1);
$('brkMinus').onclick=()=>setBrake(brake-1);
$('btnEm').onclick=()=>{
  if(state==='driving'){throttle=0;brake=8;showToast('紧急制动！','#ff7070');}
};
$('btnGo').onclick=()=>{
  if(state==='start'||state==='paused'){
    state='driving';
    $('overlay').classList.add('hidden');
    $('btnGo').textContent='暂停';
  } else if(state==='driving'){
    state='paused';
    $('btnGo').textContent='继续 ▶';
  } else {
    resetGame();
    state='driving';
    $('overlay').classList.add('hidden');
    $('btnGo').textContent='暂停';
  }
};
addEventListener('keydown', e=>{
  if(state!=='driving')return;
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp'){
    if(brake>0){brake=0;throttle=Math.min(8,throttle+1);}
    else throttle=Math.min(8,throttle+1);
  } else if(e.key==='s'||e.key==='S'||e.key==='ArrowDown'){
    if(throttle>0)throttle--;
    else brake=Math.min(8,brake+1);
  } else if(e.key===' '){
    e.preventDefault();
    throttle=0;brake=8;
  }
});

function resetGame(){
  trainPos=0;trainSpeedKmh=0;
  throttle=0;brake=8;
  nextStationIdx=1;
  score=0;elapsed=0;stationsDone=[];overSpeedTime=0;
}

// ════════ 物理 ════════
function update(dt){
  if(state!=='driving')return;
  elapsed+=dt;
  if(throttle>0&&brake>0)brake=0;
  let v=trainSpeedKmh/3.6;
  const a=(throttle/8)*1.5-(brake/8)*2.6-0.18;
  v+=a*dt;if(v<0)v=0;
  trainSpeedKmh=v*3.6;
  trainPos+=v*dt;
  if(trainPos>L-2)trainPos=L-2;

  const lim=speedLimitAt(trainPos);
  if(trainSpeedKmh>lim+2){
    overSpeedTime+=dt;
    if(overSpeedTime>0.15){score=Math.max(0,score-6);overSpeedTime-=0.15;}
  } else overSpeedTime=Math.max(0,overSpeedTime-dt);

  if(nextStationIdx<STATIONS.length){
    const st=STATIONS[nextStationIdx];
    if(trainPos>st.x+30 && !stationsDone.includes(nextStationIdx) && trainSpeedKmh>5){
      showToast(`错过 ${st.name}！-200`,'#ff7070');
      score=Math.max(0,score-200);
      nextStationIdx++;
    }
    if(trainSpeedKmh<0.8 && Math.abs(trainPos-st.x)<25 && !stationsDone.includes(nextStationIdx)){
      const diff=Math.abs(trainPos-st.x);
      let pts;
      if(diff<2)pts=1000;else if(diff<5)pts=700;else if(diff<10)pts=400;else pts=150;
      score+=pts;
      stationsDone.push(nextStationIdx);
      showToast(`${st.name} 到站！偏差 ${diff.toFixed(1)}m  +${pts}`,'#7eff90');
      if(nextStationIdx>=STATIONS.length-1){
        const bonus=Math.max(0,Math.floor((TARGET_TIME-elapsed)*5));
        if(bonus>0){score+=bonus;setTimeout(()=>showToast(`时间奖励 +${bonus}`,'#7ec8ff'),1200);}
        if(score>bestScore){bestScore=score;localStorage.setItem('train3dpro_best',score);}
        state='arrived';
        setTimeout(()=>{
          $('overlay').classList.remove('hidden');
          $('overlay').innerHTML=`
            <h1>🏁 全线运转完毕！</h1>
            <p style="font:bold 26px monospace;color:#fff">最终得分：${score}</p>
            <p>用时 ${Math.floor(elapsed/60)}:${(elapsed%60).toFixed(0).padStart(2,'0')} · 停靠 ${stationsDone.length} 站</p>
            <div class="best">${score>=bestScore?'🏆 新纪录！':'历史最佳：'+bestScore}</div>
            <div class="hint">点击底部「再开一回」重新出发</div>`;
          $('btnGo').textContent='再开一回';
        }, 1600);
      } else nextStationIdx++;
    }
  }
}

// ════════ 相机 ════════
const _camT=new THREE.Vector3();
function updateCamera(){
  const f=frameAt(trainPos);
  camera.position.copy(f.p);
  camera.position.y += 3.1;
  // 前视点
  const fa=frameAt(Math.min(L-1, trainPos+42));
  _camT.copy(fa.p); _camT.y += 2.6;
  camera.lookAt(_camT);
  // 过弯倾斜：曲率 = 两点切线夹角 / 距离
  const t1=f.t, t2=frameAt(Math.min(L-1,trainPos+24)).t;
  let cross = t1.x*t2.z - t1.z*t2.x; // >0 左转
  const v=trainSpeedKmh/3.6;
  const bank=THREE.MathUtils.clamp(cross*v*v*0.0009, -0.14, 0.14);
  camera.rotateZ(bank);
  // 高速轻微震动
  if(state==='driving' && trainSpeedKmh>25){
    const sh=trainSpeedKmh/110*0.05;
    camera.position.y += Math.sin(elapsed*17)*sh;
    camera.rotateZ(Math.sin(elapsed*23)*sh*0.06);
  }
  // 车头引擎盖跟随
  nose.position.copy(camera.position);
  nose.quaternion.copy(camera.quaternion);
}

// ════════ 隧道光照过渡 ════════
const duskCol=new THREE.Color(DUSK);
const darkCol=new THREE.Color(0x16100c);
let darkBlend=0;
function updateLighting(dt){
  const target=inTunnel(trainPos)?1:0;
  darkBlend += (target-darkBlend)*Math.min(1,dt*2.5);
  const c=duskCol.clone().lerp(darkCol, darkBlend);
  scene.background=c;
  scene.fog.color=c;
  scene.fog.near=150-110*darkBlend;
  scene.fog.far=900-700*darkBlend;
  hemi.intensity=0.65*(1-darkBlend*0.85);
  sun.intensity=1.3*(1-darkBlend);
}

// ════════ HUD 刷新 ════════
function updateHUD(){
  const lim=speedLimitAt(trainPos);
  const over=trainSpeedKmh>lim+1;
  $('spdNum').textContent=trainSpeedKmh.toFixed(0);
  $('spdNum').className='spd'+(over?' over':'');
  // 表针：0-140 → 135°..405°
  const ang=135+Math.min(140,trainSpeedKmh)/140*270;
  $('needle').style.transform=`rotate(${ang}deg)`;
  $('limitNum').textContent=lim;
  const mm=Math.floor(elapsed/60), ss=(elapsed%60).toFixed(0).padStart(2,'0');
  $('timeNum').textContent=`${mm}:${ss}`;
  $('timeNum').style.color=elapsed>TARGET_TIME?'#ff8080':'#cde8d0';
  $('scoreNum').textContent=score;
  $('bestNum').textContent=bestScore;
  if(nextStationIdx<STATIONS.length){
    const st=STATIONS[nextStationIdx];
    const d=st.x-trainPos;
    $('stName').textContent=st.name;
    $('stDist').textContent=`${d>0?d.toFixed(0):'--'} m`;
    $('stDist').className='stDist'+(d<250?' near':'');
  } else {
    $('stName').textContent='全线终点';
    $('stDist').textContent='—';
  }
  $('progFill').style.width=`${Math.min(100,trainPos/L*100)}%`;
  const marks=$('progBar').querySelectorAll('.stMark');
  marks.forEach((m,i)=>{
    m.className='stMark'+(stationsDone.includes(i)?' done':(i===nextStationIdx?' next':''));
  });
  $('thrNum').textContent=throttle;
  $('thrBar').style.width=`${throttle/8*100}%`;
  $('brkNum').textContent=brake;
  $('brkBar').style.width=`${brake/8*100}%`;
}

// ════════ 主循环 ════════
let last=performance.now();
function loop(t){
  const dt=Math.min(0.05,(t-last)/1000);last=t;
  update(dt);
  updateCamera();
  updateLighting(dt);
  updateHUD();
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
updateCamera();
requestAnimationFrame(loop);
</script>
