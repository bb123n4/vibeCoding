<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>钓鱼</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #08101e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: monospace;
  overflow: hidden;
}
#c { display: block; max-width: 420px; width: 100%; aspect-ratio: 420/600; touch-action: none; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 420, H = 600;
cv.width = W; cv.height = H;

const SY = 218;   // water surface Y
const GY = H - 58; // shore top Y

// ── Helpers ──
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }

// ── Pre-computed scenery ──
const STARS = Array.from({length: 65}, () => ({
  x: rand(0, W), y: rand(0, SY * 0.92),
  r: Math.random() < 0.85 ? 0.7 : 1.4,
  ph: rand(0, Math.PI * 2), sp: rand(0.015, 0.04),
}));

const MTN_PTS = [
  [0,SY],[0,SY-22],[55,SY-60],[100,SY-88],[155,SY-52],[210,SY-95],
  [265,SY-68],[320,SY-80],[375,SY-42],[W,SY-25],[W,SY],
];

// ── Audio ──
let ac;
function getAC() { if (!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); return ac; }
function tone(freq, dur, type='sine', vol=0.15) {
  try {
    const a=getAC(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(0, a.currentTime);
    g.gain.linearRampToValueAtTime(vol, a.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  } catch(e){}
}
function sfxSplash() { tone(380,0.09,'triangle',0.12); tone(180,0.16,'triangle',0.08); }
function sfxBite() { tone(880,0.1,'sine',0.22); setTimeout(()=>tone(1100,0.09,'sine',0.18),85); }
function sfxCatch(legend) {
  const n = legend ? [523,659,784,1047,1319,1568] : [523,659,784,1047];
  n.forEach((f,i) => setTimeout(()=>tone(f,0.2,'sine',0.2), i*110));
}
function sfxFail() { tone(220,0.12,'sawtooth',0.12); setTimeout(()=>tone(170,0.22,'sawtooth',0.09),110); }
function sfxReel() { tone(280,0.07,'triangle',0.1); }

// ── Fish definitions ──
const FISH = [
  { name:'鲫鱼', rar:'普通', col:'#c8a058', col2:'#7a5828', wMin:0.1, wMax:0.5,  pts:10,  p:0.34, sz:19 },
  { name:'草鱼', rar:'普通', col:'#789050', col2:'#506030', wMin:0.4, wMax:2.0,  pts:25,  p:0.25, sz:29 },
  { name:'鲤鱼', rar:'少见', col:'#e09040', col2:'#a06020', wMin:0.8, wMax:5.0,  pts:55,  p:0.18, sz:35 },
  { name:'鳜鱼', rar:'稀有', col:'#6888a0', col2:'#3a5060', wMin:1.5, wMax:7.0,  pts:110, p:0.12, sz:40 },
  { name:'锦鲤', rar:'稀有', col:'#ff7040', col2:'#b02808', wMin:0.8, wMax:4.0,  pts:160, p:0.07, sz:36 },
  { name:'龙鱼', rar:'传说', col:'#b8d8f8', col2:'#5888b8', wMin:4.0, wMax:14.0, pts:500, p:0.04, sz:52 },
];
const RARITY_COL = { '普通':'#aaa', '少见':'#44ddaa', '稀有':'#cc88ff', '传说':'#ffaa20' };

function pickFish() {
  const tot = FISH.reduce((s,f)=>s+f.p, 0);
  let r = Math.random()*tot;
  for (const f of FISH) { r -= f.p; if (r<=0) return f; }
  return FISH[0];
}

// ── Rod / angler position ──
const ANGLER_X = W - 52;
const ROD_TIP = { x: ANGLER_X + 48, y: SY - 100 };

// ── Game state ──
const ST = { IDLE:0, WAITING:1, BITING:2, REELING:3, CATCH:4, FAIL:5 };
let state = ST.IDLE;
let score = 0;
let catchLog = [];
let t = 0;
let wavePhase = 0;

// fishing vars
let bobberX = 0, bobberY = SY + 4;
let lineT = 0;        // 0=retracted → 1=deployed
let castTarget = null;
let biteCountdown = 0, biteWindow = 0;
let caught = null;
let reelT = 0;
let catchAnim = 0, failAnim = 0;

// splash particles
let sparks = [];

// ambient fish under water
let ambFish = [];
let ambTimer = 60;

function spawnAmb() {
  if (ambFish.length >= 8) return;
  const f = FISH[Math.floor(Math.random()*(FISH.length-1))];
  const dir = Math.random()>0.5 ? 1 : -1;
  ambFish.push({
    x: dir>0 ? -60 : W+60,
    y: rand(SY+28, GY-30),
    vx: dir * rand(0.35, 0.75),
    ph: rand(0, Math.PI*2), f, dir,
  });
}

// ── Cast ──
function cast(tx) {
  tx = clamp(tx, 32, ANGLER_X - 28);
  castTarget = { x: tx, y: SY + 4 };
  bobberX = tx; bobberY = SY + 4;
  lineT = 0; reelT = 0; caught = null;
  state = ST.WAITING;
  sfxSplash();
  for (let i=0; i<9; i++) sparks.push({
    x: tx, y: SY+2,
    vx: rand(-2.5,2.5), vy: rand(-4,-0.8),
    life: 1, decay: 0.07+Math.random()*0.06,
  });
  biteCountdown = rand(2800, 7500);
  biteWindow   = rand(1300, 2400);
}

function startReel() {
  const f = pickFish();
  f._w = rand(f.wMin, f.wMax);
  caught = f;
  reelT = 0;
  state = ST.REELING;
  sfxReel();
}

function resetFishing() {
  state = ST.IDLE;
  lineT = 0; reelT = 0;
  castTarget = null; caught = null;
}

// ── Input ──
function tap(x, y) {
  getAC();
  if (state===ST.IDLE) {
    if (y > SY - 14 && y < GY) cast(x);
  } else if (state===ST.BITING) {
    startReel();
  } else if (state===ST.CATCH) {
    resetFishing();
  }
}
function toCanvas(cx, cy) {
  const r = cv.getBoundingClientRect();
  return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) };
}
cv.addEventListener('click', e => { const p=toCanvas(e.clientX,e.clientY); tap(p.x,p.y); });
cv.addEventListener('touchstart', e => {
  e.preventDefault(); getAC();
  const p=toCanvas(e.touches[0].clientX,e.touches[0].clientY); tap(p.x,p.y);
},{passive:false});
window.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='Enter') {
    e.preventDefault(); getAC();
    if      (state===ST.IDLE)   cast(rand(55, ANGLER_X-35));
    else if (state===ST.BITING) startReel();
    else if (state===ST.CATCH)  resetFishing();
  }
});

// ── Update ──
let prevTs = 0;
function update(ts) {
  const dt = Math.min(ts - prevTs, 50); prevTs = ts;
  t++; wavePhase += 0.022;

  // ambient fish
  ambTimer -= dt;
  if (ambTimer <= 0) { spawnAmb(); ambTimer = rand(1200, 2800); }
  ambFish.forEach(f => { f.x += f.vx; f.ph += 0.055; });
  ambFish = ambFish.filter(f => f.x > -80 && f.x < W+80);

  // sparks
  sparks.forEach(s => { s.x+=s.vx; s.y+=s.vy; s.vy+=0.18; s.life-=s.decay; });
  sparks = sparks.filter(s => s.life > 0);

  if (state === ST.WAITING) {
    lineT = Math.min(1, lineT + 0.065);
    bobberY = SY + 4 + Math.sin(t * 0.045) * 2.2;
    biteCountdown -= dt;
    if (biteCountdown <= 0) { state = ST.BITING; sfxBite(); }
  }

  if (state === ST.BITING) {
    lineT = 1;
    bobberY = SY + 7 + Math.sin(t * 0.28) * 6 + 3;
    biteWindow -= dt;
    if (biteWindow <= 0) {
      state = ST.FAIL; sfxFail(); failAnim = 0;
      setTimeout(resetFishing, 1500);
    }
  }

  if (state === ST.REELING) {
    lineT = Math.max(0, lineT - 0.04);
    reelT = Math.min(1, reelT + 0.022);
    bobberY = lerp(bobberY, ROD_TIP.y + 10, 0.07);
    if (reelT >= 1) {
      state = ST.CATCH; catchAnim = 0;
      score += caught.pts;
      catchLog.unshift({ f: caught, w: caught._w });
      if (catchLog.length > 5) catchLog.pop();
      sfxCatch(caught.rar === '传说');
    }
  }

  if (state === ST.CATCH)  catchAnim = Math.min(1, catchAnim + 0.035);
  if (state === ST.FAIL)   failAnim  = Math.min(1, failAnim  + 0.045);
}

// ── Draw fish shape ──
function drawFish(x, y, sz, col, col2, dir, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y); ctx.scale(dir, 1);
  // body
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.ellipse(0, 0, sz, sz*0.38, 0, 0, Math.PI*2); ctx.fill();
  // belly shimmer
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(sz*0.1, sz*0.1, sz*0.5, sz*0.18, 0, 0, Math.PI*2); ctx.fill();
  // tail
  ctx.fillStyle = col2;
  ctx.beginPath();
  ctx.moveTo(-sz*0.68, 0);
  ctx.bezierCurveTo(-sz*0.88,-sz*0.48,-sz*1.25,-sz*0.38,-sz*1.18,0);
  ctx.bezierCurveTo(-sz*1.25, sz*0.38,-sz*0.88, sz*0.48,-sz*0.68,0);
  ctx.fill();
  // dorsal fin
  ctx.fillStyle = col2;
  ctx.beginPath();
  ctx.moveTo(-sz*0.08,-sz*0.38); ctx.quadraticCurveTo(sz*0.18,-sz*0.78,sz*0.42,-sz*0.38);
  ctx.closePath(); ctx.fill();
  // eye
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sz*0.48,-sz*0.08,sz*0.11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(sz*0.50,-sz*0.08,sz*0.06,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(sz*0.52,-sz*0.12,sz*0.03,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Draw sky ──
function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,SY);
  g.addColorStop(0,'#0c0820'); g.addColorStop(0.5,'#18123a'); g.addColorStop(1,'#2a2050');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,SY);

  // moon glow
  const mg = ctx.createRadialGradient(72,52,0,72,52,46);
  mg.addColorStop(0,'rgba(220,230,180,0.25)'); mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg; ctx.fillRect(30,10,90,90);
  // moon
  ctx.fillStyle='#dce8c8'; ctx.shadowBlur=18; ctx.shadowColor='rgba(200,220,160,0.6)';
  ctx.beginPath(); ctx.arc(72,52,19,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(20,16,48,0.28)'; ctx.beginPath(); ctx.arc(80,48,17,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // stars
  STARS.forEach(s => {
    const a = s.r<1 ? 0.35 + Math.sin(t*s.sp+s.ph)*0.2 : 0.6 + Math.sin(t*s.sp+s.ph)*0.3;
    ctx.fillStyle=`rgba(255,255,240,${a})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });

  // mountains
  ctx.fillStyle='rgba(18,14,38,0.9)';
  ctx.beginPath(); ctx.moveTo(MTN_PTS[0][0],MTN_PTS[0][1]);
  MTN_PTS.forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.closePath(); ctx.fill();
}

// ── Draw water ──
function drawWater() {
  // main water body
  const wg = ctx.createLinearGradient(0,SY,0,GY);
  wg.addColorStop(0,'#163c58'); wg.addColorStop(0.4,'#0d2840'); wg.addColorStop(1,'#061420');
  ctx.fillStyle=wg; ctx.fillRect(0,SY,W,GY-SY);

  // moon reflection
  const rg = ctx.createLinearGradient(62,SY,62,SY+90);
  rg.addColorStop(0,'rgba(200,220,160,0.12)'); rg.addColorStop(1,'rgba(200,220,160,0)');
  ctx.fillStyle=rg; ctx.fillRect(40,SY,64,90);

  // shimmer lines
  ctx.lineWidth=1;
  for (let i=0; i<5; i++) {
    const wy = SY+22+i*28+Math.sin(wavePhase*0.8+i)*6;
    const a = 0.06 - i*0.008;
    ctx.strokeStyle=`rgba(100,200,240,${a})`;
    ctx.beginPath();
    ctx.moveTo(15+Math.sin(wavePhase+i*1.1)*12, wy);
    ctx.lineTo(W-15+Math.cos(wavePhase*0.7+i)*10, wy);
    ctx.stroke();
  }

  // depth overlay (makes fish look submerged)
  const dg = ctx.createLinearGradient(0,SY,0,GY);
  dg.addColorStop(0,'rgba(10,30,55,0)'); dg.addColorStop(1,'rgba(6,18,32,0.5)');
  ctx.fillStyle=dg; ctx.fillRect(0,SY,W,GY-SY);

  // surface wave
  ctx.fillStyle='rgba(50,120,170,0.32)';
  ctx.beginPath(); ctx.moveTo(0,SY);
  for (let i=0; i<=38; i++) {
    const x = (i/38)*W;
    const y = SY + Math.sin(i*0.48+wavePhase)*2.8 + Math.sin(i*0.9+wavePhase*1.5)*1.4;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,SY-6); ctx.lineTo(0,SY-6); ctx.closePath(); ctx.fill();

  // surface specular
  ctx.strokeStyle='rgba(160,230,255,0.18)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(0,SY);
  for (let i=0; i<=38; i++) {
    const x=(i/38)*W;
    const y=SY+Math.sin(i*0.48+wavePhase)*2.8+Math.sin(i*0.9+wavePhase*1.5)*1.4;
    ctx.lineTo(x,y);
  }
  ctx.stroke();
}

// ── Draw shore ──
function drawShore() {
  // soil
  ctx.fillStyle='#2e2616'; ctx.fillRect(0,GY,W,H-GY);
  // grass edge
  const gg = ctx.createLinearGradient(0,GY-6,0,GY+6);
  gg.addColorStop(0,'#4a6830'); gg.addColorStop(1,'#3a5020');
  ctx.fillStyle=gg; ctx.fillRect(0,GY-5,W,10);

  // pebbles near water
  ctx.fillStyle='rgba(80,70,55,0.5)';
  for (let i=0; i<14; i++) {
    const px = (i*37+18)%W, pr = 2+((i*13)%4);
    ctx.beginPath(); ctx.ellipse(px,GY-2,pr,pr*0.55,0,0,Math.PI*2); ctx.fill();
  }

  // trees right side
  [[W-8,60],[W-28,75],[W-18,52]].forEach(([tx,th])=>{
    ctx.fillStyle='#2a3a18';
    ctx.beginPath(); ctx.moveTo(tx,GY-th); ctx.lineTo(tx-12,GY); ctx.lineTo(tx+12,GY); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(tx,GY-th-18); ctx.lineTo(tx-9,GY-th+8); ctx.lineTo(tx+9,GY-th+8); ctx.closePath(); ctx.fill();
  });
}

// ── Draw angler ──
function drawAngler() {
  const ax = ANGLER_X, ay = GY;
  ctx.save(); ctx.translate(ax, ay);
  // legs
  ctx.strokeStyle='#2a1e10'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(-2,0); ctx.lineTo(-5,20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,0);  ctx.lineTo(5,20);  ctx.stroke();
  // body
  ctx.fillStyle='#3a5070';
  ctx.fillRect(-7,-28,14,28);
  // arm holding rod
  ctx.strokeStyle='#c8a070'; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.moveTo(6,-22); ctx.lineTo(20,-30); ctx.stroke();
  // head
  ctx.fillStyle='#c8a070'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(0,-36,8,0,Math.PI*2); ctx.fill();
  // hat brim + top
  ctx.fillStyle='#2a1a08';
  ctx.fillRect(-9,-43,18,4);
  ctx.fillRect(-6,-54,12,14);
  ctx.restore();

  // rod
  ctx.save();
  ctx.strokeStyle='#7a5828'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(ax+16, ay-22); ctx.lineTo(ROD_TIP.x, ROD_TIP.y); ctx.stroke();
  // rod tip thin section
  ctx.strokeStyle='#a07840'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ROD_TIP.x, ROD_TIP.y); ctx.lineTo(ROD_TIP.x+4, ROD_TIP.y+16); ctx.stroke();
  ctx.restore();
}

// ── Draw line & bobber ──
function drawLine() {
  if (state===ST.IDLE || !castTarget) return;
  const bp = lineT < 1
    ? { x:lerp(ROD_TIP.x, castTarget.x, easeOut(lineT)),
        y:lerp(ROD_TIP.y, castTarget.y, easeOut(lineT)) }
    : { x:bobberX, y:bobberY };

  // line
  ctx.save();
  ctx.strokeStyle='rgba(210,200,175,0.65)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ROD_TIP.x+4, ROD_TIP.y+16);
  const cx1=lerp(ROD_TIP.x+4,bp.x,0.38), cy1=lerp(ROD_TIP.y+16,bp.y,0.38)+18;
  ctx.quadraticCurveTo(cx1,cy1,bp.x,bp.y);
  ctx.stroke();

  if (lineT > 0.6) {
    // ripple at water entry
    if (state===ST.WAITING || state===ST.BITING) {
      const rr = 7+Math.sin(t*0.1)*2;
      ctx.strokeStyle='rgba(100,200,240,0.25)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.ellipse(bp.x,SY,rr,rr*0.28,0,0,Math.PI*2); ctx.stroke();
    }
    // bobber top (red)
    ctx.fillStyle='#ee3322'; ctx.shadowBlur=7; ctx.shadowColor='#ff4433';
    ctx.beginPath(); ctx.ellipse(bp.x,bp.y-3,4.5,5.5,0,0,Math.PI*2); ctx.fill();
    // bobber bottom (white)
    ctx.shadowBlur=0; ctx.fillStyle='#dddddd';
    ctx.beginPath(); ctx.ellipse(bp.x,bp.y+3,4.5,5.5,0,0,Math.PI*2); ctx.fill();
    // bite pulse
    if (state===ST.BITING) {
      const pulse=(Math.sin(t*0.28)+1)/2;
      ctx.globalAlpha=0.4+pulse*0.45; ctx.strokeStyle='#ffdd30';
      ctx.lineWidth=2; ctx.shadowBlur=14; ctx.shadowColor='#ffaa00';
      ctx.beginPath(); ctx.arc(bp.x,bp.y,12+pulse*9,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}

// ── Reel progress bar ──
function drawReelBar() {
  if (state!==ST.REELING) return;
  const bw=160, bh=10, bx=(W-bw)/2, by=SY-30;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,bw,bh);
  const g=ctx.createLinearGradient(bx,0,bx+bw,0);
  g.addColorStop(0,'#44bbff'); g.addColorStop(1,'#aaeeff');
  ctx.fillStyle=g; ctx.fillRect(bx,by,bw*reelT,bh);
  ctx.strokeStyle='rgba(100,200,255,0.4)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('收竿中', W/2, by-4);
}

// ── HUD ──
function drawHUD() {
  ctx.fillStyle='rgba(6,14,28,0.88)'; ctx.fillRect(0,GY,W,H-GY);

  ctx.textAlign='left'; ctx.font='bold 13px monospace';
  ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.fillText(`分数  ${score}`, 14, GY+22);

  // recent catches
  catchLog.slice(0,4).forEach((c,i)=>{
    ctx.fillStyle=RARITY_COL[c.f.rar];
    ctx.font='10px monospace';
    ctx.fillText(`${c.f.name} ${c.w.toFixed(1)}kg`, 14+i*96, GY+44);
  });

  // right side hint
  ctx.textAlign='right'; ctx.font='11px monospace';
  if (state===ST.IDLE) {
    ctx.fillStyle='rgba(180,200,220,0.35)';
    ctx.fillText('点击水面抛竿', W-14, GY+22);
  } else if (state===ST.WAITING) {
    ctx.fillStyle='rgba(160,200,230,0.4)';
    ctx.fillText('等待咬钩...', W-14, GY+22);
  } else if (state===ST.BITING) {
    ctx.fillStyle='#ffdd30';
    ctx.font='bold 13px monospace';
    ctx.fillText('▲ 咬钩了！', W-14, GY+22);
  }
}

// ── Sparks ──
function drawSparks() {
  sparks.forEach(s=>{
    ctx.save();
    ctx.globalAlpha=s.life*0.8;
    ctx.fillStyle='rgba(140,220,255,0.9)';
    ctx.beginPath(); ctx.arc(s.x,s.y,1.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── Catch overlay ──
function drawCatch() {
  if (state!==ST.CATCH) return;
  const a = easeOut(Math.min(catchAnim,1));
  const f = caught;
  ctx.save(); ctx.globalAlpha=a;
  ctx.fillStyle='rgba(4,10,22,0.88)'; ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H/2-40;
  ctx.shadowBlur=36; ctx.shadowColor=RARITY_COL[f.rar];
  drawFish(cx, cy, f.sz*1.85, f.col, f.col2, 1, 1);
  ctx.shadowBlur=0;

  // rarity badge
  const rw=90, rh=22;
  ctx.fillStyle=RARITY_COL[f.rar]+'33';
  ctx.fillRect(cx-rw/2, cy+f.sz*2+2, rw, rh);
  ctx.strokeStyle=RARITY_COL[f.rar]+'88'; ctx.lineWidth=1;
  ctx.strokeRect(cx-rw/2, cy+f.sz*2+2, rw, rh);
  ctx.fillStyle=RARITY_COL[f.rar]; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText(f.rar, cx, cy+f.sz*2+16);

  ctx.fillStyle='#fff'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
  ctx.fillText(f.name, cx, cy+f.sz*2+52);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='13px monospace';
  ctx.fillText(`${f._w.toFixed(2)} kg   +${f.pts} 分`, cx, cy+f.sz*2+76);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.font='11px monospace';
  ctx.fillText('点击继续', cx, cy+f.sz*2+110);
  ctx.restore();
}

// ── Fail overlay ──
function drawFail() {
  if (state!==ST.FAIL) return;
  const a = Math.min(failAnim*2.5,1);
  ctx.save();
  ctx.globalAlpha=a*0.55; ctx.fillStyle='rgba(80,10,10,0.5)'; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='bold 22px monospace';
  ctx.fillStyle='rgba(255,90,70,0.85)'; ctx.fillText('跑掉了...', W/2, H/2-SY*0.1);
  ctx.restore();
}

// ── Idle hint ──
function drawIdleHint() {
  if (state!==ST.IDLE) return;
  const a = 0.18 + Math.sin(t*0.04)*0.14;
  ctx.save(); ctx.globalAlpha=a; ctx.fillStyle='#c8d8f0';
  ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText('↓  点击水面抛竿  ↓', W/2, SY-12);
  ctx.restore();
}

// ── Ambient fish ──
function drawAmbFish() {
  ambFish.forEach(f => {
    const wobble = Math.sin(f.ph)*3.5;
    drawFish(f.x, f.y+wobble, f.f.sz*0.52, f.f.col, f.f.col2, f.dir, 0.18);
  });
}

// ── Render ──
function render() {
  drawSky();
  drawWater();
  drawAmbFish();
  drawShore();
  drawAngler();
  drawLine();
  drawReelBar();
  drawSparks();
  drawHUD();
  drawIdleHint();
  drawCatch();
  drawFail();
}

// ── Loop ──
function loop(ts) {
  update(ts);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
