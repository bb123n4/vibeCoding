<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>太空侵略者</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden}
canvas{display:block;touch-action:none;cursor:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W=560,H=640;
const cv=document.getElementById('c');
cv.width=W;cv.height=H;
const ctx=cv.getContext('2d');

// ── Hi-score ──
const HS_KEY='si_hi';
let hiScore=+localStorage.getItem(HS_KEY)||0;

// ── Audio ──
let _ac;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function tone(freq,dur,type='square',vol=0.1){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);}catch(e){}
}
const MARCH_NOTES=[160,135,110,90];
let marchIdx=0;
function marchBeat(){tone(MARCH_NOTES[marchIdx=(marchIdx+1)%4],0.09,'square',0.09);}
function sfxShoot(){tone(880,0.05,'square',0.1);tone(660,0.05,'square',0.07);}
function sfxHit(big){
  if(big){[100,75,55].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'sawtooth',0.16),i*70));}
  else{tone(220,0.08,'square',0.14);setTimeout(()=>tone(140,0.1,'sawtooth',0.1),50);}
}
function sfxUfo(){tone(700,0.05,'square',0.09);setTimeout(()=>tone(350,0.05,'square',0.09),55);}
function sfxClear(){[330,440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,0.1,'sine',0.12),i*70));}

// ── Layout constants ──
const COLS=11,ROWS=5;
const AW=24,AH=18,AGAPX=12,AGAPY=14;
const GRID_W=COLS*(AW+AGAPX)-AGAPX;          // 384
const AX0=Math.floor((W-GRID_W)/2);           // 88
const AY0=74;
const MARCH_STEP=8;
const PLAYER_W=44,PLAYER_H=14,PLAYER_Y=H-58,PLAYER_SPD=300;
const PBUL_SPD=540,ABUL_SPD=200;
const SHIELD_Y=H-128;
const UFO_W=46,UFO_H=16,UFO_Y=38,UFO_SPD=110;

// ── State ──
let state='title';
let score,lives,wave;
let aliens,player,pBullet,aBullets,shields,ufo;
let marchTimer,marchPeriod,fireTimer,firePeriod;
let alienDx,alienDy;   // current direction
let ufoTimer,ufoInterval;
const keys={};
let mouseX=W/2;

// ── Stars (static) ──
const STARS=Array.from({length:70},(_,i)=>({
  x:(i*137.508+31)%W, y:(i*97.33+51)%H,
  r:i%7===0?1.5:1, a:0.15+((i*53)%100)/200
}));

// ── Init ──
function newGame(){
  score=0;lives=3;wave=1;
  initAliens();initShields();
  player={x:W/2-PLAYER_W/2,deadTimer:0};
  pBullet=null;aBullets=[];ufo=null;
  marchIdx=0;marchTimer=0;marchPeriod=marchPeriodFor(COLS*ROWS);
  firePeriod=1500;fireTimer=600;
  alienDx=1;alienDy=0;
  ufoTimer=0;ufoInterval=22000+Math.random()*12000;
  state='playing';
}

function initAliens(){
  aliens=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const type=r<2?2:r<4?1:0;
    aliens.push({r,c,type,pts:[10,20,30][type],
      alive:true,explodeTimer:0,frame:0,
      x:AX0+c*(AW+AGAPX), y:AY0+r*(AH+AGAPY)});
  }
}

function initShields(){
  shields=[];
  const BW=8,BH=6,BC=6,BR=4;
  const xs=[W/5,W*2/5,W*3/5,W*4/5];
  for(const sx of xs){
    const ox=Math.floor(sx-BC*BW/2);
    for(let r=0;r<BR;r++) for(let c=0;c<BC;c++){
      if(r===BR-1&&(c===2||c===3)) continue; // arch cut
      shields.push({x:ox+c*BW,y:SHIELD_Y+r*BH,alive:true});
    }
  }
}

function marchPeriodFor(n){return Math.max(60,Math.round(800*(n/(COLS*ROWS))))}
function aliveList(){return aliens.filter(a=>a.alive);}

// ── Update ──
let lastTs=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-lastTs,50);lastTs=ts;
  if(state==='playing') update(dt);
  draw();
}

function update(dt){
  const alive=aliveList();
  if(!alive.length){waveClear();return;}

  // ── Player ──
  if(!player.deadTimer){
    let px=player.x;
    if(keys['ArrowLeft']||keys['KeyA'])  px-=PLAYER_SPD*dt/1000;
    if(keys['ArrowRight']||keys['KeyD']) px+=PLAYER_SPD*dt/1000;
    if(!keys['ArrowLeft']&&!keys['KeyA']&&!keys['ArrowRight']&&!keys['KeyD'])
      px+=(mouseX-PLAYER_W/2-px)*0.14;
    player.x=Math.max(0,Math.min(W-PLAYER_W,px));
  } else {
    player.deadTimer=Math.max(0,player.deadTimer-dt);
  }

  // ── Player bullet ──
  if(pBullet){
    pBullet.y-=PBUL_SPD*dt/1000;
    if(pBullet.y+14<0){pBullet=null;}
  }

  // ── Alien march ──
  marchTimer+=dt;
  marchPeriod=marchPeriodFor(alive.length);
  if(marchTimer>=marchPeriod){
    marchTimer=0;
    marchBeat();
    for(const a of aliens) a.frame^=1;
    // find bounds of alive aliens
    let minX=Infinity,maxX=-Infinity;
    for(const a of alive){minX=Math.min(minX,a.x);maxX=Math.max(maxX,a.x+AW);}
    let drop=false;
    if(alienDx>0&&maxX+MARCH_STEP>W-6)  drop=true;
    if(alienDx<0&&minX-MARCH_STEP<6)    drop=true;
    if(drop){
      alienDx*=-1;
      for(const a of aliens) a.y+=20;
      // game over if aliens reach player
      const lowest=alive.reduce((m,a)=>Math.max(m,a.y+AH),0);
      if(lowest>=PLAYER_Y-8){state='gameover';sfxHit(true);return;}
    } else {
      for(const a of aliens) a.x+=alienDx*MARCH_STEP;
    }
  }

  // ── Alien fire ──
  fireTimer+=dt;
  if(fireTimer>=firePeriod){
    fireTimer=0;
    // pick bottom-most in random column
    const byCol={};
    for(const a of alive) if(!byCol[a.c]||a.r>byCol[a.c].r) byCol[a.c]=a;
    const pool=Object.values(byCol);
    if(pool.length){
      const s=pool[Math.floor(Math.random()*pool.length)];
      aBullets.push({x:s.x+AW/2-1.5,y:s.y+AH,w:3,h:10,
        zigzag:Math.random()<0.35,tick:0,dead:false});
    }
  }

  // ── Alien bullets ──
  for(const b of aBullets){
    b.y+=ABUL_SPD*dt/1000; b.tick+=dt;
    // hit shield
    for(const s of shields){
      if(s.alive&&b.x<s.x+8&&b.x+b.w>s.x&&b.y<s.y+6&&b.y+b.h>s.y){
        s.alive=false;b.dead=true;break;
      }
    }
    // hit player
    if(!player.deadTimer&&!b.dead){
      const px=player.x,py=PLAYER_Y;
      if(b.x+b.w>px&&b.x<px+PLAYER_W&&b.y+b.h>py&&b.y<py+PLAYER_H){
        b.dead=true;playerHit();
      }
    }
    if(b.y>H) b.dead=true;
  }
  aBullets=aBullets.filter(b=>!b.dead);

  // ── Player bullet vs aliens ──
  if(pBullet){
    for(const a of alive){
      if(pBullet.x+3>a.x&&pBullet.x<a.x+AW&&pBullet.y<a.y+AH&&pBullet.y+14>a.y){
        a.alive=false;a.explodeTimer=22;
        score+=a.pts;
        if(score>hiScore){hiScore=score;localStorage.setItem(HS_KEY,hiScore);}
        pBullet=null;
        sfxHit(false);
        break;
      }
    }
    // vs shields
    if(pBullet){
      for(const s of shields){
        if(s.alive&&pBullet.x<s.x+8&&pBullet.x+3>s.x&&pBullet.y<s.y+6&&pBullet.y+14>s.y){
          s.alive=false;pBullet=null;break;
        }
      }
    }
    // vs UFO
    if(pBullet&&ufo&&!ufo.explodeTimer){
      if(pBullet.y<UFO_Y+UFO_H&&pBullet.x+3>ufo.x&&pBullet.x<ufo.x+UFO_W){
        const bonus=[50,100,150,200,300][Math.floor(Math.random()*5)];
        score+=bonus;ufo.pts=bonus;ufo.explodeTimer=40;
        if(score>hiScore){hiScore=score;localStorage.setItem(HS_KEY,hiScore);}
        pBullet=null;sfxUfo();sfxHit(false);
      }
    }
  }

  // ── UFO ──
  ufoTimer+=dt;
  if(!ufo&&ufoTimer>ufoInterval){
    ufoTimer=0;ufoInterval=20000+Math.random()*15000;
    const dir=Math.random()<0.5?1:-1;
    ufo={x:dir>0?-UFO_W:W,dir,pts:0,explodeTimer:0};
  }
  if(ufo){
    if(ufo.explodeTimer>0){
      ufo.explodeTimer-=dt;if(ufo.explodeTimer<=0)ufo=null;
    } else {
      ufo.x+=ufo.dir*UFO_SPD*dt/1000;
      if(ufo.dir>0&&ufo.x>W)ufo=null;
      if(ufo.dir<0&&ufo.x<-UFO_W)ufo=null;
    }
  }

  // tick alien explosions
  for(const a of aliens) if(a.explodeTimer>0) a.explodeTimer-=dt;
}

function playerHit(){
  lives--;sfxHit(true);
  player.deadTimer=1200;
  if(lives<=0){setTimeout(()=>{state='gameover';},900);}
}

function waveClear(){
  wave++;sfxClear();
  pBullet=null;aBullets=[];ufo=null;
  marchIdx=0;marchTimer=0;
  firePeriod=Math.max(700,1500-wave*80);
  alienDx=1;
  for(const a of aliens){
    a.alive=true;a.explodeTimer=0;a.frame=0;
    a.x=AX0+a.c*(AW+AGAPX);
    a.y=AY0+a.r*(AH+AGAPY);
  }
}

// ── Draw ──
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // stars
  for(const s of STARS){
    ctx.globalAlpha=s.a;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  if(state==='title'){drawTitle();return;}
  if(state==='gameover'){drawGameOver();return;}

  // HUD top
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='12px monospace';
  ctx.textAlign='left'; ctx.fillText(`SCORE  ${String(score).padStart(6,'0')}`,14,22);
  ctx.textAlign='right';ctx.fillText(`BEST  ${String(hiScore).padStart(6,'0')}`,W-14,22);
  ctx.textAlign='center';ctx.fillText(`WAVE ${wave}`,W/2,22);

  // HUD bottom
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H-26);ctx.lineTo(W,H-26);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px monospace';
  ctx.textAlign='left';ctx.fillText('LIVES',14,H-10);
  for(let i=0;i<lives;i++) drawShipIcon(70+i*26,H-19,20,8,'#55ccff');

  // shields
  for(const s of shields){
    if(!s.alive) continue;
    ctx.fillStyle='#22ff88';ctx.fillRect(s.x,s.y,7,5);
  }

  // UFO
  if(ufo){
    if(ufo.explodeTimer>0){
      ctx.globalAlpha=Math.min(1,ufo.explodeTimer/20);
      ctx.fillStyle='#ff4444';ctx.font='bold 13px monospace';ctx.textAlign='center';
      ctx.fillText(`+${ufo.pts}`,ufo.x+UFO_W/2,UFO_Y+UFO_H/2+4);
      ctx.globalAlpha=1;
    } else {
      drawUfo(ufo.x,UFO_Y);
    }
  }

  // aliens
  for(const a of aliens) drawAlien(a);

  // player
  if(!player.deadTimer||Math.floor(player.deadTimer/80)%2===0){
    drawShip(player.x,PLAYER_Y,PLAYER_W,PLAYER_H,'#55ccff',true);
  }
  // player explosion debris
  if(player.deadTimer>800){
    const t=1-(player.deadTimer-800)/400;
    ctx.save();ctx.globalAlpha=(1-t)*0.9;
    ctx.strokeStyle='#ff6644';ctx.lineWidth=2;
    for(let i=0;i<8;i++){
      const a2=i/8*Math.PI*2,r2=t*30+10;
      ctx.beginPath();ctx.moveTo(player.x+PLAYER_W/2,PLAYER_Y+PLAYER_H/2);
      ctx.lineTo(player.x+PLAYER_W/2+Math.cos(a2)*r2,PLAYER_Y+PLAYER_H/2+Math.sin(a2)*r2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // player bullet
  if(pBullet){
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#fff';
    ctx.fillStyle='#fff';ctx.fillRect(pBullet.x,pBullet.y,3,14);
    ctx.restore();
  }

  // alien bullets
  ctx.save();ctx.shadowBlur=6;ctx.shadowColor='#ff6644';
  for(const b of aBullets){
    ctx.fillStyle='#ff8844';
    if(b.zigzag){
      const ox=Math.sin(b.tick*0.018)*3;
      ctx.fillRect(b.x+ox,b.y,b.w,b.h);
      // zigzag trail
      ctx.fillStyle='rgba(255,100,40,0.3)';
      ctx.fillRect(b.x-ox,b.y+b.h,b.w,4);
    } else {
      ctx.fillRect(b.x,b.y,b.w,b.h);
    }
  }
  ctx.restore();
}

function drawAlien(a){
  if(!a.alive){
    if(a.explodeTimer>0){
      ctx.save();ctx.globalAlpha=a.explodeTimer/22;
      const cols=['#ff8844','#44ddff','#88ff44'];
      ctx.fillStyle=cols[a.type];ctx.font='16px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('✸',a.x+AW/2,a.y+AH/2);
      ctx.restore();
    }
    return;
  }
  const cx=a.x+AW/2,cy=a.y+AH/2,f=a.frame;
  ctx.save();
  if(a.type===2){ // squid — bright green
    ctx.shadowBlur=7;ctx.shadowColor='#44ff88';ctx.fillStyle='#44ff88';
    ctx.beginPath();ctx.ellipse(cx,cy,8,6,0,0,Math.PI*2);ctx.fill();
    // antennae
    ctx.fillRect(cx-7,cy-8,2,f===0?4:3);ctx.fillRect(cx+5,cy-8,2,f===0?4:3);
    // bottom feet
    ctx.fillRect(cx-9,cy+4,3,f===0?4:3);ctx.fillRect(cx+6,cy+4,3,f===0?4:3);
    // eyes
    ctx.fillStyle='#001a00';ctx.beginPath();ctx.arc(cx-3,cy-1,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3,cy-1,2,0,Math.PI*2);ctx.fill();

  } else if(a.type===1){ // crab — cyan
    ctx.shadowBlur=7;ctx.shadowColor='#44ccff';ctx.fillStyle='#44ccff';
    ctx.beginPath();ctx.ellipse(cx,cy,10,6,0,0,Math.PI*2);ctx.fill();
    // claws
    if(f===0){ctx.fillRect(cx-14,cy-1,5,7);ctx.fillRect(cx+9,cy-1,5,7);}
    else      {ctx.fillRect(cx-12,cy+2,4,5);ctx.fillRect(cx+8,cy+2,4,5);}
    // bottom fringe
    [-6,-2,2,6].forEach(ox=>ctx.fillRect(cx+ox-1,cy+5,2,f===0?4:3));
    // eyes
    ctx.fillStyle='#001020';ctx.beginPath();ctx.arc(cx-3.5,cy-1,2.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3.5,cy-1,2.2,0,Math.PI*2);ctx.fill();

  } else { // octopus — magenta
    ctx.shadowBlur=7;ctx.shadowColor='#ff44cc';ctx.fillStyle='#ff44cc';
    ctx.beginPath();ctx.ellipse(cx,cy-1,11,7,0,0,Math.PI*2);ctx.fill();
    // tentacles
    const tx=[-9,-3,3,9];
    tx.forEach((ox,i)=>ctx.fillRect(cx+ox-1,cy+5+(f===0&&i%2===0?2:0),2,5));
    // eyes
    ctx.fillStyle='#300018';ctx.beginPath();ctx.arc(cx-4,cy-2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+4,cy-2,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff44cc';ctx.beginPath();ctx.arc(cx-4,cy-2,1.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+4,cy-2,1.2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawUfo(x,y){
  ctx.save();ctx.shadowBlur=12;ctx.shadowColor='#ff2244';
  ctx.fillStyle='#cc1133';
  ctx.beginPath();ctx.ellipse(x+UFO_W/2,y+UFO_H/2,UFO_W/2,UFO_H/2,0,0,Math.PI*2);ctx.fill();
  // dome
  ctx.fillStyle='#ff4466';
  ctx.beginPath();ctx.ellipse(x+UFO_W/2,y+UFO_H/2-2,UFO_W/3,UFO_H/3,0,Math.PI,0);ctx.fill();
  // lights
  ctx.fillStyle='#ffaaaa';
  for(let i=0;i<4;i++) ctx.fillRect(x+8+i*9,y+UFO_H-5,5,3);
  ctx.restore();
}

function drawShip(x,y,w,h,col,glow){
  ctx.save();
  if(glow){ctx.shadowBlur=12;ctx.shadowColor=col;}
  ctx.fillStyle=col;
  ctx.fillRect(x+w*0.44|0,y,         w*0.12|0, h*0.38|0);  // barrel
  ctx.fillRect(x+w*0.2|0, y+h*0.3|0, w*0.6|0,  h*0.7|0);   // body
  ctx.fillRect(x,          y+h*0.55|0,w*0.22|0, h*0.45|0);  // left wing
  ctx.fillRect(x+w*0.78|0, y+h*0.55|0,w*0.22|0,h*0.45|0);  // right wing
  ctx.restore();
}

function drawShipIcon(x,y,w,h,col){
  ctx.save();ctx.shadowBlur=5;ctx.shadowColor=col;ctx.fillStyle=col;
  ctx.fillRect(x+w*0.44|0,y,         w*0.12|0, h*0.38|0);
  ctx.fillRect(x+w*0.2|0, y+h*0.3|0, w*0.6|0,  h*0.7|0);
  ctx.fillRect(x,          y+h*0.55|0,w*0.22|0, h*0.45|0);
  ctx.fillRect(x+w*0.78|0, y+h*0.55|0,w*0.22|0,h*0.45|0);
  ctx.restore();
}

function drawTitle(){
  ctx.textAlign='center';
  ctx.save();ctx.shadowBlur=20;ctx.shadowColor='#44ccff';
  ctx.fillStyle='#55ddff';ctx.font='bold 34px monospace';
  ctx.fillText('太空侵略者',W/2,130);ctx.restore();
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='12px monospace';
  ctx.fillText('SPACE INVADERS',W/2,162);

  // score table
  const demoY=220,demoX=W/2-40;
  const demos=[{type:2,pts:30},{type:1,pts:20},{type:0,pts:10}];
  demos.forEach((d,i)=>{
    const a={alive:true,explodeTimer:0,frame:Math.floor(Date.now()/500)%2,
             type:d.type,x:demoX-12,y:demoY+i*46-AH/2};
    drawAlien(a);
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='11px monospace';
    ctx.textAlign='left';ctx.fillText(`= ${d.pts} 分`,demoX+AW+8,demoY+i*46+5);
  });
  // UFO row
  drawUfo(demoX-14,demoY+3*46-AH/2+4);
  ctx.fillStyle='rgba(255,100,100,0.6)';ctx.font='11px monospace';
  ctx.textAlign='left';ctx.fillText('= ??? 分',demoX+UFO_W+4,demoY+3*46+5);

  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px monospace';
  ctx.fillText('←→ / 鼠标  移动',W/2,H/2+90);
  ctx.fillText('SPACE / 点击  射击',W/2,H/2+112);
  ctx.fillStyle=`rgba(255,255,255,${0.4+0.3*Math.sin(Date.now()*0.003)})`;
  ctx.font='12px monospace';ctx.fillText('[ SPACE 或 点击开始 ]',W/2,H/2+148);
  if(hiScore>0){ctx.fillStyle='rgba(255,200,50,0.4)';ctx.fillText(`BEST  ${hiScore}`,W/2,H/2+174);}
}

function drawGameOver(){
  ctx.textAlign='center';
  ctx.save();ctx.shadowBlur=22;ctx.shadowColor='#ff2244';
  ctx.fillStyle='#ff4455';ctx.font='bold 34px monospace';
  ctx.fillText('GAME OVER',W/2,H/2-24);ctx.restore();
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='14px monospace';
  ctx.fillText(`SCORE  ${score}`,W/2,H/2+16);
  if(score>0&&score>=hiScore){ctx.fillStyle='#ffdd00';ctx.fillText('NEW BEST!',W/2,H/2+40);}
  ctx.fillStyle=`rgba(255,255,255,${0.3+0.2*Math.sin(Date.now()*0.003)})`;
  ctx.font='11px monospace';ctx.fillText('SPACE / 点击 重试',W/2,H/2+78);
}

// ── Input ──
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){
    e.preventDefault();ac();
    if(state==='title'||state==='gameover'){newGame();}
    else if(state==='playing'&&!pBullet&&!player.deadTimer){
      pBullet={x:player.x+PLAYER_W/2-1.5,y:PLAYER_Y};sfxShoot();
    }
  }
  if((e.code==='ArrowLeft'||e.code==='ArrowRight')) e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',e=>{
  ac();
  if(state==='title'||state==='gameover'){newGame();}
  else if(state==='playing'&&!pBullet&&!player.deadTimer){
    pBullet={x:player.x+PLAYER_W/2-1.5,y:PLAYER_Y};sfxShoot();
  }
});
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*W/r.width;
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();ac();
  const r=cv.getBoundingClientRect();
  mouseX=(e.touches[0].clientX-r.left)*W/r.width;
  if(state==='title'||state==='gameover'){newGame();}
  else if(state==='playing'&&!pBullet&&!player.deadTimer){
    pBullet={x:player.x+PLAYER_W/2-1.5,y:PLAYER_Y};sfxShoot();
  }
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  mouseX=(e.touches[0].clientX-r.left)*W/r.width;
},{passive:false});

// ── Start ──
requestAnimationFrame(loop);
</script>
