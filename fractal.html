<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分形浏览器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:monospace}
canvas{display:block;width:100%;height:100%;cursor:crosshair;touch-action:none}
#ui{position:fixed;bottom:18px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:10;flex-wrap:wrap;padding:0 12px}
.btn{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:16px;color:rgba(255,255,255,.55);font-family:monospace;font-size:11px;letter-spacing:.12em;padding:7px 14px;cursor:pointer;transition:all .2s;backdrop-filter:blur(6px)}
.btn:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.4)}
.btn.active{border-color:rgba(180,120,255,.7);color:#c880ff;background:rgba(140,60,255,.12)}
#coords{position:fixed;top:14px;left:18px;color:rgba(255,255,255,.28);font-size:10px;letter-spacing:.12em;line-height:1.7;pointer-events:none;z-index:10;white-space:pre}
#title{position:fixed;top:14px;right:18px;color:rgba(255,255,255,.2);font-size:10px;letter-spacing:.3em;pointer-events:none;z-index:10}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.18);font-size:12px;letter-spacing:.2em;text-align:center;line-height:2;pointer-events:none;transition:opacity 1s;z-index:5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="coords"></div>
<div id="title">分形浏览器 · FRACTAL</div>
<div id="hint">滚轮缩放 · 拖拽平移<br><span style="font-size:10px;opacity:.6">SCROLL TO ZOOM · DRAG TO PAN</span></div>

<div id="ui">
  <button class="btn active" id="pal-0">电光</button>
  <button class="btn" id="pal-1">海洋</button>
  <button class="btn" id="pal-2">熔岩</button>
  <button class="btn" id="pal-3">霓虹</button>
  <button class="btn" id="pal-4">印加</button>
  <div style="width:1px;height:28px;background:rgba(255,255,255,.1);align-self:center"></div>
  <button class="btn" id="loc-0">全览</button>
  <button class="btn" id="loc-1">海马谷</button>
  <button class="btn" id="loc-2">螺旋</button>
  <button class="btn" id="loc-3">繁花</button>
</div>

<script>
const cv = document.getElementById('c');
const gl = cv.getContext('webgl', {antialias:false});
if (!gl) {
  document.body.innerHTML = '<p style="color:#fff;padding:40px;font-family:monospace">WebGL not supported</p>';
  throw 0;
}

// ── Vertex shader ──
const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

// ── Fragment shader ──
// Uses two-float trick for the center: pass (hi, lo) pairs so the GPU
// can add them at float32 precision and get ~2× the significant bits.
const FS = `
precision highp float;

uniform vec2  u_res;
uniform vec2  u_cx;      // center.x: (high_bits, low_bits)
uniform vec2  u_cy;      // center.y: (high_bits, low_bits)
uniform float u_zoom;
uniform float u_maxIter;
uniform int   u_pal;

vec3 cospal(float t, vec3 a, vec3 b, vec3 c, vec3 d) {
  return a + b * cos(6.28318 * (c * t + d));
}

vec3 palette(float t) {
  if (u_pal == 0)
    return cospal(t, vec3(.5,.5,.5), vec3(.5,.5,.5), vec3(1.,1.,1.),    vec3(0.,.33,.67));
  if (u_pal == 1)
    return cospal(t, vec3(.5,.5,.5), vec3(.5,.5,.5), vec3(1.,1.,1.),    vec3(0.,.10,.20));
  if (u_pal == 2)
    return cospal(t, vec3(.5,.0,.0), vec3(.5,.5,.0), vec3(1.,1.,.5),    vec3(0.,.10,.20));
  if (u_pal == 3)
    return cospal(t, vec3(.5,.5,.5), vec3(.5,.5,.5), vec3(2.,1.,0.),    vec3(.5,.20,.25));
  return cospal(t, vec3(.938,.328,.718), vec3(.659,.438,.328),
                   vec3(.388,.388,.296), vec3(2.538,.478,.768));
}

void main() {
  // Map fragment to math coordinates
  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / u_zoom;
  float x0 = uv.x + u_cx.x + u_cx.y;
  float y0 = uv.y + u_cy.x + u_cy.y;

  float x = x0, y = y0;
  float len2 = 0.0;
  float iter = 0.0;

  // Fixed loop bound (WebGL requires constant); break early via bool guard
  bool escaped = false;
  for (int i = 0; i < 1024; i++) {
    if (escaped || iter >= u_maxIter) break;
    float x2 = x * x;
    float y2 = y * y;
    len2 = x2 + y2;
    if (len2 > 256.0) { escaped = true; break; }
    float xt = x2 - y2 + x0;
    y = 2.0 * x * y + y0;
    x = xt;
    iter += 1.0;
  }

  if (!escaped) {
    gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
    return;
  }

  // Smooth (continuous) colouring
  float fi = iter + 1.0 - log(log(sqrt(len2))) / log(2.0);
  float t = fract(fi / u_maxIter * 5.0 + 0.4);
  vec3 col = palette(t);
  col *= 1.0 - exp(-fi * 0.035);
  gl_FragColor = vec4(col, 1.0);
}
`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compileShader(gl.VERTEX_SHADER, VS);
const fs = compileShader(gl.FRAGMENT_SHADER, FS);
if (!vs || !fs) throw new Error('Shader compile failed');

const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error('Link error:', gl.getProgramInfoLog(prog));
  throw new Error('Program link failed');
}
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniform locations
const uRes     = gl.getUniformLocation(prog, 'u_res');
const uCx      = gl.getUniformLocation(prog, 'u_cx');
const uCy      = gl.getUniformLocation(prog, 'u_cy');
const uZoom    = gl.getUniformLocation(prog, 'u_zoom');
const uMaxIter = gl.getUniformLocation(prog, 'u_maxIter');
const uPal     = gl.getUniformLocation(prog, 'u_pal');

// ── View state ──
let cx = -0.5, cy = 0.0, zoom = 250.0;
let curPal = 0, dirty = true;
let W, H;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W; cv.height = H;
  gl.viewport(0, 0, W, H);
  dirty = true;
}
resize();
window.addEventListener('resize', resize);

// Veltkamp split: gives ~24 extra bits of mantissa precision in the center
function split(v) {
  const c = v * 4097.0;   // 1 + 2^12
  const hi = c - (c - v);
  return [hi, v - hi];
}

function maxIter() {
  return Math.min(800, Math.max(80, 60 + Math.log2(zoom) * 14) | 0);
}

function draw() {
  if (!dirty) return;
  dirty = false;
  const [cxh, cxl] = split(cx);
  const [cyh, cyl] = split(cy);
  gl.uniform2f(uRes, W, H);
  gl.uniform2f(uCx, cxh, cxl);
  gl.uniform2f(uCy, cyh, cyl);
  gl.uniform1f(uZoom, zoom);
  gl.uniform1f(uMaxIter, maxIter());
  gl.uniform1i(uPal, curPal);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

(function loop() { requestAnimationFrame(loop); draw(); })();

// ── Coordinate display ──
function updateCoords() {
  document.getElementById('coords').textContent =
    `x  ${cx.toFixed(8)}\ny  ${cy.toFixed(8)}\nzoom  ${zoom.toExponential(1)}\niter  ${maxIter()}`;
}
updateCoords();

// ── Zoom toward a screen point ──
function zoomAt(screenX, screenY, factor) {
  const mx = screenX - W / 2;
  const my = H / 2 - screenY;   // flip Y: screen-down → math-up
  cx += (mx / zoom) * (1 - 1 / factor);
  cy += (my / zoom) * (1 - 1 / factor);
  zoom *= factor;
  dirty = true;
  updateCoords();
}

// ── Mouse ──
let dragging = false, dragX = 0, dragY = 0;

cv.addEventListener('wheel', e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? 0.8 : 1.25);
  hideHint();
}, {passive: false});

cv.addEventListener('mousedown', e => { dragging = true; dragX = e.clientX; dragY = e.clientY; });
cv.addEventListener('mousemove', e => {
  if (!dragging) return;
  cx -= (e.clientX - dragX) / zoom;
  cy += (e.clientY - dragY) / zoom;   // screen Y inverted vs math Y
  dragX = e.clientX; dragY = e.clientY;
  dirty = true; updateCoords(); hideHint();
});
cv.addEventListener('mouseup',    () => { dragging = false; });
cv.addEventListener('mouseleave', () => { dragging = false; });

// ── Touch ──
let touches = {}, lastPinchDist = null;

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) touches[t.identifier] = {x: t.clientX, y: t.clientY};
  hideHint();
}, {passive: false});

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const prev = touches[t.identifier];
    if (prev) {
      cx -= (t.clientX - prev.x) / zoom;
      cy += (t.clientY - prev.y) / zoom;
      dirty = true; updateCoords();
    }
    touches[t.identifier] = {x: t.clientX, y: t.clientY};
  } else if (e.touches.length === 2) {
    const [t0, t1] = [e.touches[0], e.touches[1]];
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    if (lastPinchDist) {
      const midX = (t0.clientX + t1.clientX) / 2;
      const midY = (t0.clientY + t1.clientY) / 2;
      zoomAt(midX, midY, dist / lastPinchDist);
    }
    lastPinchDist = dist;
    for (const t of [t0, t1]) touches[t.identifier] = {x: t.clientX, y: t.clientY};
  }
}, {passive: false});

cv.addEventListener('touchend', e => {
  for (const t of e.changedTouches) delete touches[t.identifier];
  if (e.touches.length < 2) lastPinchDist = null;
}, {passive: false});

// ── Palette buttons ──
for (let i = 0; i < 5; i++) {
  document.getElementById('pal-' + i).addEventListener('click', () => {
    curPal = i;
    document.querySelectorAll('.btn[id^=pal-]').forEach(b => b.classList.remove('active'));
    document.getElementById('pal-' + i).classList.add('active');
    dirty = true;
  });
}

// ── Preset locations ──
const LOCS = [
  {cx: -0.5,        cy:  0.0,        zoom:     250, label: '全览'},
  {cx: -0.0451,     cy:  0.6817,     zoom:    5000, label: '海马谷'},
  {cx: -0.7269,     cy:  0.1889,     zoom:  200000, label: '螺旋'},
  {cx: -0.5557503,  cy: -0.5556169,  zoom:  500000, label: '繁花'},
];
for (let i = 0; i < LOCS.length; i++) {
  document.getElementById('loc-' + i).addEventListener('click', () => {
    const l = LOCS[i]; cx = l.cx; cy = l.cy; zoom = l.zoom;
    dirty = true; updateCoords();
  });
}

// ── Hint ──
let hinted = false;
function hideHint() {
  if (!hinted) { hinted = true; document.getElementById('hint').style.opacity = '0'; }
}
</script>
</body>
</html>
