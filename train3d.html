<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>3D 列车驾驶</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0c1018;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;color:#fff}
  body{display:flex;align-items:center;justify-content:center}
  #wrap{position:relative;width:min(100vw,calc(100vh*900/600));height:min(100vh,calc(100vw*600/900))}
  canvas{display:block;width:100%;height:100%;background:#8cc4e8;cursor:pointer;touch-action:none}
  .home{position:absolute;top:14px;left:14px;color:#fff;background:rgba(0,0,0,0.4);
    padding:6px 12px;border-radius:14px;text-decoration:none;font-size:14px;
    border:1px solid rgba(255,255,255,0.2);z-index:5}
  .home:hover{background:rgba(0,0,0,0.65)}
</style>
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="vibe coding">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2785C">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <a class="home" href="index.html">← 返回</a>
</div>
<script>
const W=900, H=600;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const dpr=Math.min(devicePixelRatio||1,2);
cv.width=W*dpr; cv.height=H*dpr; ctx.scale(dpr,dpr);

// ════════ 路线定义 ════════
const ROUTE_LEN = 5000;
const STATIONS = [
  {x: 0,    name:'起点·樱川'},
  {x: 1300, name:'青木町'},
  {x: 2600, name:'隧道口·岩鹿'},
  {x: 3900, name:'山中谷'},
  {x: 5000, name:'终点·云海台'},
];
const SPEED_LIMITS = [
  {x: 0,    limit: 50},
  {x: 350,  limit: 90},
  {x: 1700, limit: 110},
  {x: 2750, limit: 70},   // 隧道
  {x: 3300, limit: 100},
  {x: 4650, limit: 50},
];
// 曲率段：从 x 开始曲率 k（正=右弯），单位 1/m 缩放过的视觉系数
const CURVES = [
  {x: 0,    k: 0},
  {x: 600,  k: 0.6},
  {x: 1000, k: 0},
  {x: 1800, k: -0.8},
  {x: 2300, k: 0},
  {x: 3400, k: 0.5},
  {x: 3800, k: 0},
  {x: 4300, k: -0.4},
  {x: 4700, k: 0},
];
// 隧道段
const TUNNEL = {start: 2750, end: 3250};
const TARGET_TIME = 320;

function speedLimitAt(pos){
  let lim=SPEED_LIMITS[0].limit;
  for(const s of SPEED_LIMITS) if(pos>=s.x) lim=s.limit;
  return lim;
}
function curveAt(pos){
  let k=0;
  for(const c of CURVES) if(pos>=c.x) k=c.k;
  return k;
}
function inTunnel(pos){ return pos>=TUNNEL.start && pos<=TUNNEL.end; }

// ════════ 状态 ════════
let state='start';
let trainPos=0, trainSpeedKmh=0;
let throttle=0, brake=8;
let nextStationIdx=1;
let score=0, elapsed=0, overSpeedTime=0;
let bestScore=parseInt(localStorage.getItem('train3d_best')||'0');
let stationsDone=[];
let toast=null, toastT=0;
let shake=0;
function showToast(t,col){toast={t,col:col||'#fff'}; toastT=2.4;}

// 沿线物件（树、电杆）预生成
const TREES=[];
for(let i=0;i<260;i++){
  const side = Math.random()<0.5?-1:1;
  TREES.push({
    x: Math.random()*ROUTE_LEN,
    lat: side*(6+Math.random()*22),     // 离轨道中心横向米数
    h: 4+Math.random()*5,
    col: Math.random()<0.5?'#3a6a3a':'#4d8045',
  });
}
const POLES=[];
for(let p=0;p<ROUTE_LEN;p+=55){
  POLES.push({x:p, lat:-4.2});
}

// ════════ 输入 ════════
const buttons=[];
function addBtn(x,y,w,h,label,onClick,opts){buttons.push({x,y,w,h,label,onClick,opts:opts||{}});}
function getCanvasPos(e){
  const r=cv.getBoundingClientRect();
  const cx=(e.clientX!==undefined?e.clientX:(e.touches?e.touches[0]:e.changedTouches[0]).clientX);
  const cy=(e.clientY!==undefined?e.clientY:(e.touches?e.touches[0]:e.changedTouches[0]).clientY);
  return {x:(cx-r.left)*W/r.width, y:(cy-r.top)*H/r.height};
}
function handleClick(x,y){
  for(const b of buttons){
    if(b.opts.disabled) continue;
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){b.onClick(); return true;}
  }
  return false;
}
cv.addEventListener('click', e=>{const{x,y}=getCanvasPos(e); handleClick(x,y);});
cv.addEventListener('touchend', e=>{e.preventDefault(); const{x,y}=getCanvasPos(e); handleClick(x,y);}, {passive:false});
window.addEventListener('keydown', e=>{
  if(state!=='driving') return;
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp'){
    if(brake>0){brake=0; throttle=Math.min(8,throttle+1);}
    else throttle=Math.min(8,throttle+1);
  } else if(e.key==='s'||e.key==='S'||e.key==='ArrowDown'){
    if(throttle>0) throttle--;
    else brake=Math.min(8,brake+1);
  } else if(e.key===' '){
    e.preventDefault();
    throttle=0; brake=8;
  }
});

// ════════ 物理 ════════
function update(dt){
  if(state!=='driving') return;
  elapsed+=dt;
  if(throttle>0 && brake>0) brake=0;
  let v=trainSpeedKmh/3.6;
  const a=(throttle/8)*1.5 - (brake/8)*2.6 - 0.18;
  v+=a*dt; if(v<0)v=0;
  trainSpeedKmh=v*3.6;
  trainPos+=v*dt;
  if(trainPos>ROUTE_LEN+60) trainPos=ROUTE_LEN+60;

  // 弯道晃动
  const k=Math.abs(curveAt(trainPos));
  shake = k * (trainSpeedKmh/100) * 2;

  const lim=speedLimitAt(trainPos);
  if(trainSpeedKmh>lim+2){
    overSpeedTime+=dt;
    if(overSpeedTime>0.15){score=Math.max(0,score-6); overSpeedTime-=0.15;}
  } else overSpeedTime=Math.max(0,overSpeedTime-dt);

  if(nextStationIdx<STATIONS.length){
    const st=STATIONS[nextStationIdx];
    if(trainPos>st.x+30 && !stationsDone.includes(nextStationIdx) && trainSpeedKmh>5){
      showToast(`错过 ${st.name}！-200`,'#ff7070');
      score=Math.max(0,score-200);
      nextStationIdx++;
    }
    if(trainSpeedKmh<0.8 && Math.abs(trainPos-st.x)<25 && !stationsDone.includes(nextStationIdx)){
      const diff=Math.abs(trainPos-st.x);
      let pts;
      if(diff<2)pts=1000; else if(diff<5)pts=700; else if(diff<10)pts=400; else pts=150;
      score+=pts;
      stationsDone.push(nextStationIdx);
      showToast(`${st.name} 到站！偏差 ${diff.toFixed(1)}m  +${pts}`,'#7eff90');
      if(nextStationIdx>=STATIONS.length-1){
        const bonus=Math.max(0,Math.floor((TARGET_TIME-elapsed)*5));
        if(bonus>0){score+=bonus; showToast(`时间奖励 +${bonus}`,'#7ec8ff');}
        if(score>bestScore){bestScore=score; localStorage.setItem('train3d_best',score);}
        state='arrived';
      } else nextStationIdx++;
    }
  }
}

// ════════ 3D 投影 ════════
const HORIZON_Y = 270;        // 地平线
const CAM_H = 3.2;            // 相机高度（米）
const FOCAL = 330;            // 焦距（像素）
const DRAW_DIST = 600;        // 绘制距离（米）
const GAUGE = 1.5;            // 轨距一半（米）
const CAB_TOP = 470;          // 驾驶台顶部 y

// 曲线积分缓存：lateralOffset(d) = 前方 d 米处轨道相对当前朝向的横向偏移
// 用赛车伪3D法：每米 dx += k*small；x += dx
function project(d, lat, h, curveAccum){
  // d: 前方距离, lat: 横向米, h: 高度米, curveAccum: 该距离处弯道累计横移(米)
  const z = Math.max(0.7, d);
  const scale = FOCAL / z;
  const sx = W/2 + (lat + curveAccum) * scale;
  const sy = HORIZON_Y + (CAM_H - h) * scale;
  return {x:sx, y:sy, scale};
}

// 预计算当前帧的弯道累计横移表（每 2m 一格）
let curveTable=[];
function buildCurveTable(){
  curveTable.length=0;
  let x=0, dx=0;
  const stepM=2;
  for(let d=0; d<=DRAW_DIST; d+=stepM){
    curveTable.push(x);
    const k=curveAt(trainPos+d);
    dx += k*0.0035*stepM;
    x += dx*stepM;
  }
}
function curveOff(d){
  const idx=Math.min(curveTable.length-1, Math.max(0, Math.floor(d/2)));
  return curveTable[idx];
}

// ════════ 绘制场景 ════════
function drawScene(){
  const dark = inTunnel(trainPos);
  // 天空
  if(dark){
    ctx.fillStyle='#16100c';
    ctx.fillRect(0,0,W,CAB_TOP);
  } else {
    const g=ctx.createLinearGradient(0,0,0,HORIZON_Y);
    g.addColorStop(0,'#7eb8e8'); g.addColorStop(1,'#d8ecf8');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,HORIZON_Y);
    // 云
    ctx.fillStyle='rgba(255,255,255,0.6)';
    const coff=(elapsed*4)%900;
    [[180,70,1],[480,110,0.7],[760,55,1.2]].forEach(([cx,cy,s])=>{
      const x=((cx-coff)%900+900)%900;
      ctx.beginPath();
      ctx.arc(x,cy,16*s,0,Math.PI*2);
      ctx.arc(x+18*s,cy-5*s,13*s,0,Math.PI*2);
      ctx.arc(x+36*s,cy,15*s,0,Math.PI*2);
      ctx.fill();
    });
    // 远山
    ctx.fillStyle='#8fa9b8';
    ctx.beginPath(); ctx.moveTo(0,HORIZON_Y);
    for(let i=0;i<=12;i++){
      const x=i*80;
      ctx.lineTo(x, HORIZON_Y-30-18*Math.sin(i*1.3+1));
    }
    ctx.lineTo(W,HORIZON_Y); ctx.closePath(); ctx.fill();
    // 地面
    ctx.fillStyle='#9cb86a';
    ctx.fillRect(0,HORIZON_Y,W,CAB_TOP-HORIZON_Y);
  }
  if(dark){
    // 隧道内地面
    ctx.fillStyle='#241c14';
    ctx.fillRect(0,HORIZON_Y,W,CAB_TOP-HORIZON_Y);
  }

  buildCurveTable();

  // ── 道砟梯形（由远及近） ──
  const ballastCol = dark ? '#3a2e22' : '#a89880';
  for(let d=DRAW_DIST; d>2; d-=8){
    const c1=curveOff(d), c2=curveOff(Math.max(2,d-8));
    const p1L=project(d, -3.4, 0, c1), p1R=project(d, 3.4, 0, c1);
    const p2L=project(Math.max(2,d-8), -3.4, 0, c2), p2R=project(Math.max(2,d-8), 3.4, 0, c2);
    if(p2L.y<HORIZON_Y-2) continue;
    ctx.fillStyle=ballastCol;
    ctx.beginPath();
    ctx.moveTo(p1L.x,p1L.y); ctx.lineTo(p1R.x,p1R.y);
    ctx.lineTo(p2R.x,p2R.y); ctx.lineTo(p2L.x,p2L.y);
    ctx.closePath(); ctx.fill();
  }

  // ── 枕木 ──
  const tieCol = dark ? '#1a140e' : '#4a3422';
  const tieSpacing=3;
  const startTie = Math.ceil(trainPos/tieSpacing)*tieSpacing - trainPos;
  for(let d=startTie; d<DRAW_DIST*0.7; d+=tieSpacing){
    if(d<1) continue;
    const c=curveOff(d);
    const pL=project(d,-2.2,0,c), pR=project(d,2.2,0,c);
    const thick=Math.max(1, 1.0*FOCAL/d*0.35);
    ctx.strokeStyle=tieCol;
    ctx.lineWidth=thick;
    ctx.beginPath(); ctx.moveTo(pL.x,pL.y); ctx.lineTo(pR.x,pR.y); ctx.stroke();
  }

  // ── 钢轨 ──
  const railCol = dark ? '#8a8a92' : '#c8c8d0';
  for(const side of [-GAUGE, GAUGE]){
    ctx.strokeStyle=railCol;
    ctx.beginPath();
    let first=true;
    for(let d=2; d<DRAW_DIST; d+=4){
      const c=curveOff(d);
      const p=project(d, side, 0, c);
      if(p.y < HORIZON_Y-1) break;
      if(first){ctx.moveTo(p.x,p.y); first=false;}
      else ctx.lineTo(p.x,p.y);
    }
    ctx.lineWidth=2.4; ctx.stroke();
  }

  // ── 收集所有 3D 物件，按距离排序后从远到近绘制 ──
  const objects=[];
  // 树
  for(const t of TREES){
    const d=t.x-trainPos;
    if(d>2 && d<DRAW_DIST) objects.push({d, kind:'tree', o:t});
  }
  // 电杆
  for(const p of POLES){
    const d=p.x-trainPos;
    if(d>2 && d<DRAW_DIST) objects.push({d, kind:'pole', o:p});
  }
  // 限速牌
  for(const sl of SPEED_LIMITS){
    const d=sl.x-trainPos;
    if(d>2 && d<DRAW_DIST) objects.push({d, kind:'sign', o:sl});
  }
  // 车站
  for(let i=0;i<STATIONS.length;i++){
    const d=STATIONS[i].x-trainPos;
    if(d>-80 && d<DRAW_DIST) objects.push({d:Math.max(2.5,d), kind:'station', o:STATIONS[i], idx:i});
  }
  // 隧道口
  for(const tx of [TUNNEL.start, TUNNEL.end]){
    const d=tx-trainPos;
    if(d>2 && d<DRAW_DIST) objects.push({d, kind:'portal', o:{x:tx}});
  }
  objects.sort((a,b)=>b.d-a.d);

  for(const obj of objects){
    const d=obj.d;
    const c=curveOff(d);
    if(obj.kind==='tree'){
      if(dark) continue;
      const t=obj.o;
      const base=project(d, t.lat, 0, c);
      const top=project(d, t.lat, t.h, c);
      if(base.y<HORIZON_Y) continue;
      const w=Math.max(2, t.h*0.55*base.scale);
      // 树干
      ctx.fillStyle='#5a3a20';
      ctx.fillRect(base.x-w*0.08, top.y+(base.y-top.y)*0.55, w*0.16, (base.y-top.y)*0.45);
      // 树冠
      ctx.fillStyle=t.col;
      ctx.beginPath();
      ctx.ellipse(base.x, top.y+(base.y-top.y)*0.32, w*0.5, (base.y-top.y)*0.42, 0, 0, Math.PI*2);
      ctx.fill();
    } else if(obj.kind==='pole'){
      if(dark) continue;
      const p=obj.o;
      const base=project(d, p.lat, 0, c);
      const top=project(d, p.lat, 7, c);
      if(base.y<HORIZON_Y) continue;
      ctx.strokeStyle='#4a4a52';
      ctx.lineWidth=Math.max(1, 0.25*base.scale);
      ctx.beginPath(); ctx.moveTo(base.x,base.y); ctx.lineTo(top.x,top.y); ctx.stroke();
      // 横臂
      const arm=project(d, p.lat+1.8, 6.4, c);
      ctx.beginPath(); ctx.moveTo(top.x,top.y+2); ctx.lineTo(arm.x,arm.y); ctx.stroke();
      // 接触网线（向远处下一根延伸简化为短线）
      ctx.strokeStyle='rgba(40,40,48,0.5)';
      ctx.lineWidth=1;
      const wire1=project(d, 0, 5.6, c);
      const wire2=project(Math.min(DRAW_DIST,d+55), 0, 5.6, curveOff(Math.min(DRAW_DIST,d+55)));
      ctx.beginPath(); ctx.moveTo(wire1.x,wire1.y); ctx.lineTo(wire2.x,wire2.y); ctx.stroke();
    } else if(obj.kind==='sign'){
      const sl=obj.o;
      const base=project(d, 4.5, 0, c);
      const top=project(d, 4.5, 2.6, c);
      if(base.y<HORIZON_Y) continue;
      ctx.strokeStyle='#555';
      ctx.lineWidth=Math.max(1,0.2*base.scale);
      ctx.beginPath(); ctx.moveTo(base.x,base.y); ctx.lineTo(top.x,top.y); ctx.stroke();
      const r=Math.max(3, 0.55*base.scale);
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(top.x,top.y-r*0.5,r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#e84040'; ctx.lineWidth=Math.max(1,r*0.18);
      ctx.beginPath(); ctx.arc(top.x,top.y-r*0.5,r*0.92,0,Math.PI*2); ctx.stroke();
      if(r>7){
        ctx.fillStyle='#222'; ctx.font=`bold ${Math.round(r*0.9)}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(sl.limit, top.x, top.y-r*0.5);
      }
    } else if(obj.kind==='station'){
      const st=obj.o;
      // 站台在右侧：lat 2.2~8m，高 0.9m
      const dNear=Math.max(2.5, d-60), dFar=d+60;
      if(dFar<3) continue;
      const cN=curveOff(Math.max(0,dNear)), cF=curveOff(Math.min(DRAW_DIST,dFar));
      const nL=project(dNear, 2.4, 0.9, cN), nR=project(dNear, 8, 0.9, cN);
      const fL=project(Math.min(DRAW_DIST,dFar), 2.4, 0.9, cF), fR=project(Math.min(DRAW_DIST,dFar), 8, 0.9, cF);
      // 站台面
      ctx.fillStyle=dark?'#3a342a':'#c4b890';
      ctx.beginPath();
      ctx.moveTo(nL.x,nL.y); ctx.lineTo(nR.x,nR.y);
      ctx.lineTo(fR.x,fR.y); ctx.lineTo(fL.x,fL.y);
      ctx.closePath(); ctx.fill();
      // 站台立面
      const nLg=project(dNear, 2.4, 0, cN), fLg=project(Math.min(DRAW_DIST,dFar), 2.4, 0, cF);
      ctx.fillStyle=dark?'#2a241c':'#8a7a55';
      ctx.beginPath();
      ctx.moveTo(nL.x,nL.y); ctx.lineTo(fL.x,fL.y);
      ctx.lineTo(fLg.x,fLg.y); ctx.lineTo(nLg.x,nLg.y);
      ctx.closePath(); ctx.fill();
      // 站房 + 站名（仅近处显示）
      if(d<300){
        const hub=project(d, 6.5, 0.9, c);
        const hubTop=project(d, 6.5, 5.2, c);
        const wB=Math.max(6, 4.4*hub.scale);
        if(hub.y>HORIZON_Y-50){
          ctx.fillStyle='#e0d4b0';
          ctx.fillRect(hub.x-wB/2, hubTop.y, wB, hub.y-hubTop.y);
          ctx.fillStyle='#7a4030';
          ctx.beginPath();
          ctx.moveTo(hub.x-wB*0.62, hubTop.y);
          ctx.lineTo(hub.x, hubTop.y-wB*0.3);
          ctx.lineTo(hub.x+wB*0.62, hubTop.y);
          ctx.closePath(); ctx.fill();
          if(wB>26){
            ctx.fillStyle='#2a3040';
            ctx.font=`bold ${Math.max(9,Math.round(wB*0.16))}px sans-serif`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(st.name, hub.x, hubTop.y+(hub.y-hubTop.y)*0.4);
          }
        }
        // 停车目标标志（站中心轨旁红白杆）
        const mark=project(d, -3.2, 0, c);
        const markTop=project(d, -3.2, 1.6, c);
        if(mark.y>HORIZON_Y){
          ctx.strokeStyle='#e84040'; ctx.lineWidth=Math.max(2,0.3*mark.scale);
          ctx.beginPath(); ctx.moveTo(mark.x,mark.y); ctx.lineTo(markTop.x,markTop.y); ctx.stroke();
          const fr=Math.max(3,0.5*mark.scale);
          ctx.fillStyle='#fff';
          ctx.fillRect(markTop.x-fr, markTop.y-fr*0.7, fr*2, fr*0.7);
          ctx.fillStyle='#e84040';
          ctx.font=`bold ${Math.max(7,Math.round(fr*0.62))}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='bottom';
          if(fr>6) ctx.fillText('停', markTop.x, markTop.y);
        }
      }
    } else if(obj.kind==='portal'){
      // 隧道口
      const base=project(d, 0, 0, c);
      const sc=base.scale;
      const wP=8*sc, hP=7*sc;
      if(base.y<HORIZON_Y) continue;
      ctx.fillStyle='#6a6258';
      ctx.beginPath();
      ctx.moveTo(base.x-wP, base.y);
      ctx.lineTo(base.x-wP, base.y-hP*0.75);
      ctx.quadraticCurveTo(base.x, base.y-hP*1.25, base.x+wP, base.y-hP*0.75);
      ctx.lineTo(base.x+wP, base.y);
      ctx.closePath(); ctx.fill();
      // 洞口
      ctx.fillStyle='#0a0806';
      ctx.beginPath();
      ctx.moveTo(base.x-wP*0.62, base.y);
      ctx.lineTo(base.x-wP*0.62, base.y-hP*0.6);
      ctx.quadraticCurveTo(base.x, base.y-hP*1.0, base.x+wP*0.62, base.y-hP*0.6);
      ctx.lineTo(base.x+wP*0.62, base.y);
      ctx.closePath(); ctx.fill();
    }
  }

  // 隧道内顶灯
  if(dark){
    const lightSpacing=30;
    const startL=Math.ceil(trainPos/lightSpacing)*lightSpacing-trainPos;
    for(let d=startL; d<DRAW_DIST*0.6; d+=lightSpacing){
      if(d<2) continue;
      const c=curveOff(d);
      const p=project(d, 0, 5.5, c);
      const r=Math.max(1.5, 0.4*p.scale);
      ctx.fillStyle='#ffd890';
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.globalCompositeOperation='lighter';
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*6);
      g.addColorStop(0,'rgba(255,216,144,0.35)'); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(p.x-r*6,p.y-r*6,r*12,r*12);
      ctx.restore();
    }
  }
}

// ════════ 驾驶舱 ════════
function drawCab(){
  // 舱体
  const g=ctx.createLinearGradient(0,CAB_TOP,0,H);
  g.addColorStop(0,'#2a3240'); g.addColorStop(1,'#161c26');
  ctx.fillStyle=g;
  ctx.fillRect(0,CAB_TOP,W,H-CAB_TOP);
  // 台面边缘
  ctx.fillStyle='#3a4250';
  ctx.fillRect(0,CAB_TOP,W,8);
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.fillRect(0,CAB_TOP+8,W,2);
  // A柱（左右黑边，营造舱内感）
  ctx.fillStyle='rgba(12,16,24,0.9)';
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(46,0); ctx.lineTo(14,CAB_TOP); ctx.lineTo(0,CAB_TOP);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(W,0); ctx.lineTo(W-46,0); ctx.lineTo(W-14,CAB_TOP); ctx.lineTo(W,CAB_TOP);
  ctx.closePath(); ctx.fill();
  // 顶梁
  ctx.fillStyle='rgba(12,16,24,0.9)';
  ctx.fillRect(0,0,W,26);
  // 雨刷痕迹弧
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  ctx.lineWidth=40;
  ctx.beginPath();
  ctx.arc(W/2, CAB_TOP+140, 360, Math.PI*1.18, Math.PI*1.82);
  ctx.stroke();

  // ── 速度表（圆盘） ──
  const sx=130, sy=CAB_TOP+68, sr=52;
  ctx.fillStyle='#10141c';
  ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#4a5262'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.stroke();
  // 刻度 0-140
  for(let v=0;v<=140;v+=20){
    const ang=Math.PI*0.75 + (v/140)*Math.PI*1.5;
    const x1=sx+Math.cos(ang)*(sr-8), y1=sy+Math.sin(ang)*(sr-8);
    const x2=sx+Math.cos(ang)*(sr-3), y2=sy+Math.sin(ang)*(sr-3);
    ctx.strokeStyle='#8a92a2'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  // 限速红区
  const lim=speedLimitAt(trainPos);
  const limAng=Math.PI*0.75+(lim/140)*Math.PI*1.5;
  ctx.strokeStyle='rgba(255,80,80,0.8)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(sx,sy,sr-5,limAng,Math.PI*2.25); ctx.stroke();
  // 指针
  const spdAng=Math.PI*0.75+(Math.min(140,trainSpeedKmh)/140)*Math.PI*1.5;
  ctx.strokeStyle='#ffd890'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(sx,sy);
  ctx.lineTo(sx+Math.cos(spdAng)*(sr-12), sy+Math.sin(spdAng)*(sr-12));
  ctx.stroke();
  ctx.fillStyle='#ffd890';
  ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill();
  // 数字
  const over=trainSpeedKmh>lim+1;
  ctx.fillStyle=over?'#ff5070':'#7eff90';
  ctx.font='bold 18px monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(trainSpeedKmh.toFixed(0), sx, sy+14);
  ctx.fillStyle='#6a7282'; ctx.font='9px monospace';
  ctx.fillText('km/h', sx, sy+33);

  // ── 信息屏 ──
  const ix=210, iy=CAB_TOP+26;
  ctx.fillStyle='#0c1410';
  ctx.fillRect(ix,iy,220,84);
  ctx.strokeStyle='#2a4232'; ctx.strokeRect(ix+0.5,iy+0.5,220,84);
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#5a9a6a'; ctx.font='11px monospace';
  ctx.fillText('下一站', ix+10, iy+8);
  if(nextStationIdx<STATIONS.length){
    const next=STATIONS[nextStationIdx];
    const dist=next.x-trainPos;
    ctx.fillStyle='#9aeaaa'; ctx.font='bold 16px monospace';
    ctx.fillText(next.name, ix+10, iy+24);
    ctx.fillStyle=dist<200?'#ffb060':'#cde8d0';
    ctx.font='bold 20px monospace';
    ctx.fillText(`${dist>0?dist.toFixed(0):'--'} m`, ix+10, iy+48);
  } else {
    ctx.fillStyle='#9aeaaa'; ctx.font='bold 16px monospace';
    ctx.fillText('全线终点', ix+10, iy+30);
  }
  // 限速 & 时间
  ctx.fillStyle='#5a9a6a'; ctx.font='11px monospace';
  ctx.fillText('限速', ix+140, iy+8);
  ctx.fillStyle='#ffd890'; ctx.font='bold 18px monospace';
  ctx.fillText(`${lim}`, ix+140, iy+24);
  ctx.fillStyle='#5a9a6a'; ctx.font='11px monospace';
  ctx.fillText('时间', ix+140, iy+48);
  const mm=Math.floor(elapsed/60), ss=(elapsed%60).toFixed(0).padStart(2,'0');
  ctx.fillStyle=elapsed>TARGET_TIME?'#ff8080':'#cde8d0';
  ctx.font='bold 15px monospace';
  ctx.fillText(`${mm}:${ss}`, ix+140, iy+62);

  // ── 得分 ──
  ctx.fillStyle='#5a9a6a'; ctx.font='11px monospace';
  ctx.fillText('得分', ix+240, iy+8);
  ctx.fillStyle='#7ec8e8'; ctx.font='bold 22px monospace';
  ctx.fillText(`${score}`, ix+240, iy+24);
  ctx.fillStyle='#6a7282'; ctx.font='11px monospace';
  ctx.fillText(`最佳 ${bestScore}`, ix+240, iy+56);

  // ── 路线进度 ──
  const px=560, py=CAB_TOP+30;
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(px,py,150,14);
  const prog=Math.min(1,trainPos/ROUTE_LEN);
  ctx.fillStyle='#5a9a6a';
  ctx.fillRect(px,py,150*prog,14);
  for(let i=0;i<STATIONS.length;i++){
    const tx=px+150*(STATIONS[i].x/ROUTE_LEN);
    ctx.fillStyle=stationsDone.includes(i)?'#7eff90':(i===nextStationIdx?'#ffd890':'#aab');
    ctx.fillRect(tx-1,py-3,2,20);
  }

  // ── 手柄 ──
  drawLever('牵引', 560, CAB_TOP+62, 150, throttle, '#7eff90', v=>{
    if(state!=='driving')return;
    throttle=v; if(v>0)brake=0;
  });
  drawLever('制动', 560, CAB_TOP+100, 150, brake, '#ff7070', v=>{
    if(state!=='driving')return;
    brake=v; if(v>0)throttle=0;
  });

  // 紧急 + 出发按钮
  addBtn(740, CAB_TOP+56, 64, 30, '⚠ 紧急', ()=>{
    if(state==='driving'){throttle=0;brake=8;showToast('紧急制动！','#ff7070');}
  }, {emergency:true});
  let label='暂停';
  if(state==='start')label='出发 ▶';
  else if(state==='paused')label='继续 ▶';
  else if(state==='arrived')label='再开一回';
  addBtn(740, CAB_TOP+94, 130, 32, label, ()=>{
    if(state==='start'||state==='paused') state='driving';
    else if(state==='driving') state='paused';
    else {resetGame(); state='driving';}
  }, {primary:true});
}

function drawLever(name,x,y,w,value,col,setter){
  ctx.fillStyle='#8a92a2'; ctx.font='bold 11px monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(name, x, y+14);
  const tx=x+38, tw=w-38;
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fillRect(tx,y,tw,28);
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.strokeRect(tx+0.5,y+0.5,tw,28);
  const fillW=(tw-16)*value/8;
  ctx.fillStyle=col;
  ctx.fillRect(tx+8,y+6,fillW,16);
  const hx=tx+8+fillW;
  ctx.fillStyle='#fff';
  ctx.fillRect(hx-4,y+2,8,24);
  ctx.fillStyle=col; ctx.font='bold 11px monospace';
  ctx.textAlign='left';
  ctx.fillText(`${value}`, tx+tw+6, y+14);
  // 不可见点击带（左半减右半加）
  addBtn(tx, y, tw/2, 28, '', ()=>setter(Math.max(0,value-1)));
  addBtn(tx+tw/2, y, tw/2, 28, '', ()=>setter(Math.min(8,value+1)));
}

function drawButtons(){
  for(const b of buttons){
    if(!b.label) continue;
    let bg='rgba(255,255,255,0.10)', stroke='rgba(255,255,255,0.3)', fg='#fff';
    if(b.opts.emergency){bg='rgba(255,90,90,0.22)';stroke='rgba(255,90,90,0.6)';fg='#ff9090';}
    else if(b.opts.primary){bg='rgba(122,255,144,0.18)';stroke='rgba(122,255,144,0.5)';fg='#7eff90';}
    ctx.fillStyle=bg; ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle=stroke; ctx.lineWidth=1.5;
    ctx.strokeRect(b.x+0.5,b.y+0.5,b.w-1,b.h-1);
    ctx.fillStyle=fg; ctx.font='bold 13px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2);
  }
}

function drawToastMsg(dt){
  if(!toast) return;
  toastT-=dt;
  if(toastT<=0){toast=null;return;}
  const a=Math.min(1,toastT/0.4);
  ctx.font='bold 18px sans-serif';
  const tw=ctx.measureText(toast.t).width;
  ctx.fillStyle=`rgba(20,28,40,${0.92*a})`;
  ctx.fillRect(W/2-tw/2-16, 60, tw+32, 38);
  ctx.globalAlpha=a;
  ctx.fillStyle=toast.col;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(toast.t, W/2, 79);
  ctx.globalAlpha=1;
}

function drawOverlay(){
  if(state==='start'){
    ctx.fillStyle='rgba(12,16,24,0.80)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 42px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🚆 3D 列车驾驶', W/2, 160);
    ctx.fillStyle='#7ec8e8'; ctx.font='17px sans-serif';
    ctx.fillText('— First-Person Train Sim —', W/2, 200);
    ctx.fillStyle='#cfdce8'; ctx.font='15px sans-serif';
    ctx.fillText('驾驶室视角 · 5 km 山线 · 途经隧道与连续弯道', W/2, 252);
    ctx.fillText('看好限速牌，把车精准停在「停」标旁', W/2, 278);
    ctx.fillStyle='#aab'; ctx.font='13px sans-serif';
    ctx.fillText('W/S 或点手柄左右半区 加减档 · Space 紧急制动', W/2, 320);
    ctx.fillStyle='#f4c440'; ctx.font='bold 15px monospace';
    ctx.fillText(`最佳分数：${bestScore}`, W/2, 360);
  } else if(state==='paused'){
    ctx.fillStyle='rgba(12,16,24,0.6)';
    ctx.fillRect(0,26,W,CAB_TOP-26);
    ctx.fillStyle='#fff'; ctx.font='bold 40px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⏸ 暂停', W/2, 240);
  } else if(state==='arrived'){
    ctx.fillStyle='rgba(12,16,24,0.85)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#7eff90'; ctx.font='bold 42px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🏁 全线运转完毕！', W/2, 170);
    ctx.fillStyle='#fff'; ctx.font='bold 28px monospace';
    ctx.fillText(`最终得分：${score}`, W/2, 240);
    ctx.fillStyle='#cfdce8'; ctx.font='16px monospace';
    ctx.fillText(`用时 ${Math.floor(elapsed/60)}:${(elapsed%60).toFixed(0).padStart(2,'0')} · 停靠 ${stationsDone.length} 站`, W/2, 282);
    ctx.fillStyle='#f4c440'; ctx.font='bold 16px monospace';
    if(score>=bestScore) ctx.fillText('🏆 新纪录！', W/2, 330);
    else ctx.fillText(`历史最佳：${bestScore}`, W/2, 330);
  }
}

function resetGame(){
  trainPos=0; trainSpeedKmh=0;
  throttle=0; brake=8;
  nextStationIdx=1;
  score=0; elapsed=0; stationsDone=[]; overSpeedTime=0;
}

// ════════ 主循环 ════════
let last=performance.now();
function loop(t){
  const dt=Math.min(0.04,(t-last)/1000); last=t;
  buttons.length=0;
  update(dt);

  // 弯道+速度晃动
  ctx.save();
  if(state==='driving' && shake>0.01){
    ctx.translate(Math.sin(elapsed*9)*shake*2.5, Math.cos(elapsed*13)*shake*1.2);
  }
  drawScene();
  ctx.restore();

  drawCab();
  drawButtons();
  drawToastMsg(dt);
  drawOverlay();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
