<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔防</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#fff;user-select:none}
#wrap{display:flex;gap:12px;align-items:flex-start}
canvas{display:block;border:1px solid rgba(255,255,255,0.08);border-radius:4px;cursor:crosshair}
#panel{width:140px;display:flex;flex-direction:column;gap:8px}
.stat{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:.1em}
.stat span{color:#fff;font-size:13px}
.sep{height:1px;background:rgba(255,255,255,0.07)}
.label{font-size:10px;color:rgba(255,255,255,0.28);letter-spacing:.1em}
/* tower shop */
.twr-btn{padding:8px 6px;border:1px solid rgba(255,255,255,0.13);border-radius:6px;background:rgba(255,255,255,0.03);cursor:pointer;font-family:monospace;font-size:11px;color:rgba(255,255,255,0.65);text-align:left;transition:all .15s;line-height:1.6;width:100%}
.twr-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
.twr-btn.sel{border-color:rgba(255,200,60,0.7);color:#ffd43b;background:rgba(255,200,60,0.07)}
/* upgrade panel */
#upg-panel{display:none;flex-direction:column;gap:7px}
#upg-title{font-size:13px;color:#fff;font-weight:bold}
#upg-level{font-size:10px;color:rgba(255,255,255,0.4)}
.upg-stat{font-size:10px;color:rgba(255,255,255,0.5)}
#btn-upg{padding:8px 6px;border:1px solid rgba(120,220,120,0.4);border-radius:6px;background:rgba(60,180,60,0.08);color:#7ecc7e;cursor:pointer;font-family:monospace;font-size:11px;text-align:left;transition:all .15s;width:100%}
#btn-upg:hover:not(:disabled){background:rgba(60,180,60,0.18);color:#aaffaa}
#btn-upg:disabled{opacity:.3;cursor:not-allowed}
#btn-sell{padding:7px 6px;border:1px solid rgba(255,100,100,0.3);border-radius:6px;background:rgba(180,40,40,0.07);color:rgba(255,120,120,0.8);cursor:pointer;font-family:monospace;font-size:11px;text-align:left;transition:all .15s;width:100%}
#btn-sell:hover{background:rgba(180,40,40,0.18);color:#ff8888}
#btn-back{padding:6px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:transparent;color:rgba(255,255,255,0.35);cursor:pointer;font-family:monospace;font-size:10px;transition:all .15s;width:100%}
#btn-back:hover{color:rgba(255,255,255,0.7)}
/* bottom controls */
#start-btn{padding:9px;border:1px solid rgba(100,220,100,0.35);border-radius:6px;background:rgba(60,180,60,0.08);color:#7ecc7e;cursor:pointer;font-family:monospace;font-size:12px;letter-spacing:.1em;transition:all .15s;width:100%}
#start-btn:hover:not(:disabled){background:rgba(60,180,60,0.18);color:#aaffaa}
#start-btn:disabled{opacity:.3;cursor:not-allowed}
#speed-btn{padding:7px;border:1px solid rgba(255,255,255,0.12);border-radius:6px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.45);cursor:pointer;font-family:monospace;font-size:11px;transition:all .15s;width:100%}
#speed-btn:hover{background:rgba(255,255,255,0.07)}
#speed-btn.fast{border-color:rgba(255,200,60,0.5);color:#ffd43b;background:rgba(255,200,60,0.06)}
#msg{font-size:10px;color:rgba(255,160,60,0.8);letter-spacing:.08em;min-height:14px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="panel">
    <div class="stat">💰 <span id="s-gold">150</span></div>
    <div class="stat">❤️ <span id="s-lives">20</span></div>
    <div class="stat">🌊 波次 <span id="s-wave">0</span></div>
    <div class="sep"></div>

    <!-- Tower shop (default view) -->
    <div id="shop-panel">
      <div class="label">选择炮塔</div>
      <button class="twr-btn sel" data-type="gun">🔫 枪塔<br><span style="color:rgba(255,255,255,0.38)">50金 · 快速</span></button>
      <button class="twr-btn" data-type="cannon">💣 炮塔<br><span style="color:rgba(255,255,255,0.38)">100金 · 溅射</span></button>
      <button class="twr-btn" data-type="slow">❄️ 冰塔<br><span style="color:rgba(255,255,255,0.38)">80金 · 减速</span></button>
      <button class="twr-btn" data-type="laser">⚡ 电塔<br><span style="color:rgba(255,255,255,0.38)">120金 · 穿透</span></button>
    </div>

    <!-- Upgrade panel (shown when tower selected) -->
    <div id="upg-panel">
      <div id="upg-title">枪塔</div>
      <div id="upg-level">等级 1 / 3</div>
      <div class="sep"></div>
      <div class="upg-stat" id="upg-stats"></div>
      <button id="btn-upg">⬆ 升级</button>
      <button id="btn-sell">💰 出售</button>
      <button id="btn-back">← 返回</button>
    </div>

    <div class="sep"></div>
    <button id="start-btn">▶ 开始波次</button>
    <button id="speed-btn">⏩ 加速 ×2</button>
    <div id="msg">放置炮塔后开始</div>
  </div>
</div>
<script>
// ── Canvas ──
const COLS=20,ROWS=15,CELL=36;
const CW=COLS*CELL,CH=ROWS*CELL;
const cv=document.getElementById('c');
cv.width=CW; cv.height=CH;
const ctx=cv.getContext('2d');

// ── Path ──
const WAYPOINTS=[[0,2],[3,2],[3,5],[7,5],[7,2],[11,2],[11,8],[5,8],[5,12],[15,12],[15,7],[19,7]];
function expandPath(wps){
  const pts=[];
  for(let i=0;i<wps.length-1;i++){
    const[c0,r0]=wps[i],[c1,r1]=wps[i+1];
    const dc=Math.sign(c1-c0),dr=Math.sign(r1-r0);
    let c=c0,r=r0;
    while(c!==c1||r!==r1){pts.push({x:c*CELL+CELL/2,y:r*CELL+CELL/2,col:c,row:r});c+=dc;r+=dr;}
  }
  const[lc,lr]=wps[wps.length-1];
  pts.push({x:lc*CELL+CELL/2,y:lr*CELL+CELL/2,col:lc,row:lr});
  return pts;
}
const PATH=expandPath(WAYPOINTS);
const onPath=new Set(PATH.map(p=>p.col+','+p.row));

// ── Tower defs ──
const TD={
  gun:   {name:'枪塔', icon:'🔫', cost:50,  range:3,   dmg:8,  rate:28, col:'#55ccff',pcol:'#88ddff',splash:0,  slow:0,  pierce:false},
  cannon:{name:'炮塔', icon:'💣', cost:100, range:3.5, dmg:40, rate:85, col:'#ff8844',pcol:'#ffcc44',splash:1.4,slow:0,  pierce:false},
  slow:  {name:'冰塔', icon:'❄️', cost:80,  range:3.5, dmg:3,  rate:45, col:'#88eeff',pcol:'#bbffff',splash:0,  slow:0.5,pierce:false},
  laser: {name:'电塔', icon:'⚡', cost:120, range:4,   dmg:14, rate:18, col:'#ffff44',pcol:'#ffff99',splash:0,  slow:0,  pierce:true},
};
// Upgrade multipliers per level (index = level-1)
const UPG_DMG=[1,1.6,2.8], UPG_RNG=[1,1.12,1.25], UPG_RATE=[1,0.72,0.52];
function upgCost(type,fromLv){ return Math.round(TD[type].cost*(fromLv===1?1.2:2.0)); }
function sellVal(t){ // 60% of total invested
  let total=TD[t.type].cost;
  if(t.level>=2) total+=upgCost(t.type,1);
  if(t.level>=3) total+=upgCost(t.type,2);
  return Math.floor(total*0.6);
}
function towerStats(t){
  const d=TD[t.type], lv=t.level-1;
  return {dmg:Math.round(d.dmg*UPG_DMG[lv]), range:+(d.range*UPG_RNG[lv]).toFixed(1), rate:Math.round(d.rate*UPG_RATE[lv])};
}

// ── Audio ──
let audioCtx;
function ac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(freq,dur,type='square',vol=0.1,ramp=true){
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    if(ramp)g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);
  }catch(e){}
}
function sfx(k){
  if(k==='shoot') tone(600,0.04,'square',0.06);
  if(k==='hit')   tone(300,0.05,'triangle',0.08);
  if(k==='kill')  {tone(500,0.08,'sine',0.1);setTimeout(()=>tone(700,0.08,'sine',0.1),60);}
  if(k==='boss')  {tone(80,0.5,'sawtooth',0.15);tone(100,0.4,'sawtooth',0.12);}
  if(k==='clear') [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'sine',0.14),i*90));
  if(k==='over')  [300,240,180,120].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sawtooth',0.13),i*130));
  if(k==='place') tone(440,0.06,'triangle',0.1);
  if(k==='upg')   {tone(440,0.08,'sine',0.1);setTimeout(()=>tone(660,0.1,'sine',0.12),70);}
}

// ── State ──
let gold=150,lives=20,wave=0,waveActive=false,gameOver=false;
let towers=[],enemies=[],bullets=[],particles=[],floats=[];
let selType='gun',hoverCell=null,selTower=null;
let waveQueue=[],waveTimer=0;
let speed=1; // 1 or 2
let boss=null; // current boss reference for top bar

// ── DOM ──
const $gold=document.getElementById('s-gold');
const $lives=document.getElementById('s-lives');
const $wave=document.getElementById('s-wave');
const $msg=document.getElementById('msg');
const $startBtn=document.getElementById('start-btn');
const $speedBtn=document.getElementById('speed-btn');
const $shop=document.getElementById('shop-panel');
const $upgPanel=document.getElementById('upg-panel');
const $upgTitle=document.getElementById('upg-title');
const $upgLevel=document.getElementById('upg-level');
const $upgStats=document.getElementById('upg-stats');
const $btnUpg=document.getElementById('btn-upg');
const $btnSell=document.getElementById('btn-sell');

function setMsg(t){$msg.textContent=t;}
function refreshGold(){$gold.textContent=gold;}

function openShop(){
  selTower=null;
  $shop.style.display='flex'; $shop.style.flexDirection='column';$shop.style.gap='8px';
  $upgPanel.style.display='none';
}
function openUpgPanel(t){
  selTower=t;
  $shop.style.display='none';
  $upgPanel.style.display='flex';
  const d=TD[t.type], st=towerStats(t);
  $upgTitle.textContent=d.icon+' '+d.name;
  $upgLevel.textContent=`等级 ${t.level} / 3`;
  $upgStats.textContent=`伤害 ${st.dmg}  射程 ${st.range}  间隔 ${st.rate}ms`;
  if(t.level<3){
    const cost=upgCost(t.type,t.level);
    $btnUpg.textContent=`⬆ 升级  ${cost}金`;
    $btnUpg.disabled=gold<cost;
  } else {
    $btnUpg.textContent='✦ 已满级';
    $btnUpg.disabled=true;
  }
  $btnSell.textContent=`💰 出售 +${sellVal(t)}金`;
}
openShop();

$btnUpg.addEventListener('click',()=>{
  if(!selTower||selTower.level>=3) return;
  const cost=upgCost(selTower.type,selTower.level);
  if(gold<cost){setMsg('金币不足 💸');return;}
  gold-=cost; refreshGold();
  selTower.level++;
  sfx('upg');
  burst(selTower.x,selTower.y,'#ffff88',8,12);
  openUpgPanel(selTower);
  setMsg('');
});
$btnSell.addEventListener('click',()=>{
  if(!selTower) return;
  gold+=sellVal(selTower);
  refreshGold();
  towers=towers.filter(t=>t!==selTower);
  burst(selTower.x,selTower.y,'#ffdd44',6,10);
  openShop();
  setMsg('');
});
document.getElementById('btn-back').addEventListener('click',openShop);

$speedBtn.addEventListener('click',()=>{
  speed=speed===1?2:1;
  $speedBtn.textContent=speed===2?'⏩ 加速 ×2 ON':'⏩ 加速 ×2';
  $speedBtn.classList.toggle('fast',speed===2);
});

document.querySelectorAll('.twr-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    selType=btn.dataset.type;
    document.querySelectorAll('.twr-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
  });
});
$startBtn.addEventListener('click',startWave);

// ── Wave builder ──
function buildWave(w){
  const list=[];
  const count=8+w*3;
  const isBossWave=w%5===0;
  for(let i=0;i<count;i++){
    let hp=55+w*28,spd=0.85+w*0.09,reward=10+w*2,color='#ff5566',r=9,armor=0,isBoss=false;
    if(w>=3&&i%5===4){hp*=3;r=15;spd*=0.65;color='#ff2244';reward*=4;}
    if(w>=5&&i%6===5){armor=0.3;color='#cc9944';}
    if(w>=7&&i%4===3){spd*=1.6;r=7;hp*=0.6;color='#ff88cc';reward*=1.5;}
    list.push({hp,spd,reward,color,r,armor,isBoss:false,delay:i*52});
  }
  if(isBossWave){
    const bossHp=Math.round((55+w*28)*18);
    list.push({hp:bossHp,spd:0.45+w*0.03,reward:Math.round((10+w*2)*15),color:'#ff00cc',r:22,armor:0.35,isBoss:true,delay:count*52+800});
    sfx('boss');
  }
  return list;
}

function startWave(){
  if(waveActive||gameOver) return;
  wave++; $wave.textContent=wave;
  waveQueue=buildWave(wave);
  waveActive=true; waveTimer=0;
  $startBtn.disabled=true;
  setMsg(wave%5===0?`⚠️ 第${wave}波 · BOSS来袭！`:'');
}

// ── Update ──
function updateWave(dt){
  waveTimer+=dt;
  while(waveQueue.length&&waveTimer>=waveQueue[0].delay){
    const cfg=waveQueue.shift();
    const e={hp:cfg.hp,maxHp:cfg.hp,spd:cfg.spd,armor:cfg.armor,
              progress:0,x:PATH[0].x,y:PATH[0].y,
              slow:0,slowTimer:0,reward:cfg.reward,color:cfg.color,r:cfg.r,isBoss:cfg.isBoss};
    if(cfg.isBoss) boss=e;
    enemies.push(e);
  }
}

function updateEnemies(dt){
  for(const e of enemies){
    if(e.slowTimer>0){e.slowTimer-=dt;if(e.slowTimer<=0)e.slow=0;}
    const step=(e.spd*(1-e.slow))*dt/16;
    e.progress=Math.min(e.progress+step,PATH.length-1);
    const pi=Math.floor(e.progress),frac=e.progress-pi;
    const a=PATH[pi],b=PATH[Math.min(pi+1,PATH.length-1)];
    e.x=a.x+(b.x-a.x)*frac; e.y=a.y+(b.y-a.y)*frac;
    if(e.progress>=PATH.length-1){
      lives=Math.max(0,lives-1);
      $lives.textContent=lives;
      e.hp=-1;
      if(e.isBoss) boss=null;
      if(lives<=0&&!gameOver){gameOver=true;$startBtn.disabled=true;sfx('over');}
    }
  }
  enemies=enemies.filter(e=>e.hp>0);
  if(waveActive&&waveQueue.length===0&&enemies.length===0){
    waveActive=false;
    $startBtn.disabled=false;
    boss=null;
    sfx('clear');
    setMsg(gameOver?'':'本波结束 · 准备好了？');
  }
}

function updateTowers(dt){
  for(const t of towers){
    t.cd=(t.cd||0)-dt;
    if(t.cd>0) continue;
    const d=TD[t.type],st=towerStats(t);
    let tgt=null;
    for(const e of enemies){
      if(Math.hypot(e.x-t.x,e.y-t.y)<=st.range*CELL){
        if(!tgt||e.progress>tgt.progress) tgt=e;
      }
    }
    if(!tgt) continue;
    t.angle=Math.atan2(tgt.y-t.y,tgt.x-t.x)+Math.PI/2;
    t.cd=st.rate;
    sfx('shoot');
    bullets.push({x:t.x,y:t.y,tgt,spd:8,dmg:st.dmg,col:d.pcol,splash:d.splash,slow:d.slow,pierce:d.pierce,r:d.splash>0?5:3});
  }
}

function updateBullets(dt){
  for(const b of bullets){
    if(!b.tgt||b.tgt.hp<=0){b.dead=true;continue;}
    const dx=b.tgt.x-b.x,dy=b.tgt.y-b.y,dist=Math.hypot(dx,dy);
    const step=b.spd*dt/16;
    if(dist<=step+5){
      if(b.splash>0){
        for(const e of enemies) if(Math.hypot(e.x-b.tgt.x,e.y-b.tgt.y)<=b.splash*CELL) hit(e,b);
        burst(b.tgt.x,b.tgt.y,'#ffaa44',10,14);
      } else {
        hit(b.tgt,b);
        burst(b.tgt.x,b.tgt.y,b.col,4,7);
      }
      b.dead=true;
    } else {
      b.x+=dx/dist*step; b.y+=dy/dist*step;
    }
  }
  bullets=bullets.filter(b=>!b.dead);
}

function hit(e,b){
  const dmg=Math.max(1,b.dmg*(1-e.armor));
  e.hp-=dmg;
  if(b.slow>0){e.slow=b.slow;e.slowTimer=100;}
  sfx('hit');
  if(e.hp<=0){
    if(e.isBoss) boss=null;
    gold+=e.reward; refreshGold();
    sfx('kill');
    burst(e.x,e.y,e.color,e.isBoss?20:6,e.isBoss?20:10);
    floatText(e.x,e.y,`+${e.reward}金`,'#ffd43b');
  }
}

function burst(x,y,col,n,maxR){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.2+Math.random()*2.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:.8+Math.random()*(maxR/5),life:1,col});
  }
}

function floatText(x,y,txt,col){
  floats.push({x,y,txt,col,life:1,vy:-1.2});
}

function updateParticles(dt){
  for(const p of particles){p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.vy+=0.07*dt/16;p.life-=0.045*dt/16;}
  particles=particles.filter(p=>p.life>0);
  for(const f of floats){f.y+=f.vy*dt/16;f.life-=0.025*dt/16;}
  floats=floats.filter(f=>f.life>0);
}

// ── Draw ──
function drawMap(){
  ctx.fillStyle='#0f1520';ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(255,255,255,0.035)';ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,CH);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(CW,r*CELL);ctx.stroke();}
  for(const p of PATH){ctx.fillStyle='#1e1608';ctx.fillRect(p.col*CELL+1,p.row*CELL+1,CELL-2,CELL-2);}
  ctx.save();
  ctx.strokeStyle='rgba(255,190,60,0.18)';ctx.lineWidth=2;ctx.setLineDash([6,6]);
  ctx.beginPath();ctx.moveTo(PATH[0].x,PATH[0].y);
  for(let i=1;i<PATH.length;i++) ctx.lineTo(PATH[i].x,PATH[i].y);
  ctx.stroke();ctx.restore();
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold 10px monospace';
  ctx.fillStyle='rgba(80,255,80,0.8)';ctx.fillText('入',PATH[0].x,PATH[0].y);
  ctx.fillStyle='rgba(255,80,80,0.8)';ctx.fillText('出',PATH[PATH.length-1].x,PATH[PATH.length-1].y);
}

function drawHover(){
  if(!hoverCell||gameOver) return;
  const{col,row}=hoverCell;
  // hovering existing tower
  const existing=towers.find(t=>t.col===col&&t.row===row);
  if(existing){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([]);
    ctx.strokeRect(col*CELL+1,row*CELL+1,CELL-2,CELL-2);
    return;
  }
  if(onPath.has(col+','+row)) return;
  const d=TD[selType];
  const cx=col*CELL+CELL/2,cy=row*CELL+CELL/2;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.13)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(cx,cy,d.range*CELL,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  ctx.fillStyle=gold>=d.cost?'rgba(255,255,255,0.06)':'rgba(255,60,60,0.08)';
  ctx.fillRect(col*CELL+1,row*CELL+1,CELL-2,CELL-2);
}

function drawTowers(){
  for(const t of towers){
    const d=TD[t.type],st=towerStats(t);
    const isSel=t===selTower;
    // range ring when selected
    if(isSel){
      ctx.save();
      ctx.strokeStyle=d.col+'66';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(t.x,t.y,st.range*CELL,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    // base
    ctx.fillStyle=isSel?d.col+'44':d.col+'22';
    ctx.fillRect(t.col*CELL+2,t.row*CELL+2,CELL-4,CELL-4);
    // body + barrel
    ctx.save();
    ctx.translate(t.x,t.y);ctx.rotate(t.angle||0);
    ctx.shadowBlur=isSel?14:8;ctx.shadowColor=d.col;
    ctx.fillStyle=d.col;
    // bigger body for higher levels
    const sz=6+t.level*1.2;
    ctx.beginPath();ctx.roundRect(-sz,-sz,sz*2,sz*2,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillRect(-2.5,-sz-5,-2.5+5,-sz);
    ctx.restore();
    // level dots
    if(t.level>1){
      for(let i=0;i<t.level;i++){
        ctx.fillStyle=t.level===3?'#ffd43b':'#aaffaa';
        ctx.beginPath();ctx.arc(t.col*CELL+5+i*6,t.row*CELL+CELL-5,2,0,Math.PI*2);ctx.fill();
      }
    }
    // selected highlight border
    if(isSel){
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([]);
      ctx.strokeRect(t.col*CELL+1,t.row*CELL+1,CELL-2,CELL-2);
    }
  }
}

function drawEnemies(){
  for(const e of enemies){
    ctx.fillStyle='rgba(0,0,0,0.28)';
    ctx.beginPath();ctx.ellipse(e.x,e.y+e.r*.55,e.r*.75,e.r*.28,0,0,Math.PI*2);ctx.fill();
    const iced=e.slow>0;
    // boss glow
    if(e.isBoss){
      ctx.save();ctx.shadowBlur=20;ctx.shadowColor='#ff00cc';
      ctx.beginPath();ctx.arc(e.x,e.y,e.r+4,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,0,200,0.4)';ctx.lineWidth=3;ctx.stroke();
      ctx.restore();
    }
    const g=ctx.createRadialGradient(e.x-e.r*.3,e.y-e.r*.3,0,e.x,e.y,e.r);
    g.addColorStop(0,iced?'#ccffff':'#ffffff');
    g.addColorStop(1,iced?'#44aacc':e.color);
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    if(e.armor>0){
      ctx.strokeStyle='rgba(255,200,80,0.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.stroke();
    }
    // hp bar
    const bw=e.r*2+2,bx=e.x-e.r-1,by=e.y-e.r-(e.isBoss?10:7);
    ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,e.isBoss?5:3);
    const pct=e.hp/e.maxHp;
    ctx.fillStyle=pct>0.5?'#44dd55':pct>0.25?'#ffaa00':'#ff3333';
    ctx.fillRect(bx,by,bw*pct,e.isBoss?5:3);
  }
}

function drawBossBar(){
  if(!boss||boss.hp<=0) return;
  const bx=20,by=10,bw=CW-40,bh=12;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx-2,by-2,bw+4,bh+4);
  ctx.fillStyle='#330022';ctx.fillRect(bx,by,bw,bh);
  const pct=boss.hp/boss.maxHp;
  const g=ctx.createLinearGradient(bx,0,bx+bw,0);
  g.addColorStop(0,'#ff00cc');g.addColorStop(1,'#ff6644');
  ctx.fillStyle=g;ctx.fillRect(bx,by,bw*pct,bh);
  ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#ff00cc';
  ctx.strokeStyle='rgba(255,0,200,0.5)';ctx.lineWidth=1;
  ctx.strokeRect(bx,by,bw,bh);ctx.restore();
  ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(`BOSS  ${Math.max(0,Math.ceil(boss.hp))} / ${boss.maxHp}`,CW/2,by+bh/2);
}

function drawBullets(){
  ctx.save();
  for(const b of bullets){
    ctx.shadowBlur=8;ctx.shadowColor=b.col;
    ctx.fillStyle=b.col;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.save();
  for(const f of floats){
    ctx.globalAlpha=Math.max(0,f.life);
    ctx.fillStyle=f.col;ctx.font='bold 11px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.txt,f.x,f.y);
  }
  ctx.globalAlpha=1;ctx.restore();
}

function drawOverlay(){
  if(!gameOver) return;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.save();ctx.shadowBlur=20;ctx.shadowColor='#ff2244';
  ctx.fillStyle='#ff4455';ctx.font='bold 38px monospace';
  ctx.fillText('GAME OVER',CW/2,CH/2-22);ctx.restore();
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='14px monospace';
  ctx.fillText(`撑到了第 ${wave} 波`,CW/2,CH/2+18);
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.font='11px monospace';
  ctx.fillText('刷新重试',CW/2,CH/2+48);
}

// ── Loop ──
let last=0;
function loop(ts){
  const rawDt=Math.min(ts-last,50);last=ts;
  const steps=speed;
  for(let s=0;s<steps;s++){
    const dt=rawDt/steps;
    if(!gameOver){
      updateWave(dt);updateEnemies(dt);updateTowers(dt);updateBullets(dt);
    }
    updateParticles(dt);
  }
  drawMap();drawHover();drawTowers();drawEnemies();drawBossBar();drawBullets();drawParticles();drawOverlay();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ──
function cellOf(ev){
  const r=cv.getBoundingClientRect();
  return{col:Math.floor((ev.clientX-r.left)/r.width*COLS),row:Math.floor((ev.clientY-r.top)/r.height*ROWS)};
}
cv.addEventListener('mousemove',e=>{hoverCell=cellOf(e);});
cv.addEventListener('mouseleave',()=>{hoverCell=null;});
cv.addEventListener('click',e=>{
  if(gameOver) return;
  const{col,row}=cellOf(e);
  if(col<0||col>=COLS||row<0||row>=ROWS) return;
  // clicking existing tower → open upgrade panel
  const existing=towers.find(t=>t.col===col&&t.row===row);
  if(existing){openUpgPanel(existing);return;}
  // clicking path
  if(onPath.has(col+','+row)){setMsg('不能放在路上');return;}
  // place tower
  const d=TD[selType];
  if(gold<d.cost){setMsg('金币不足 💸');return;}
  gold-=d.cost;refreshGold();
  towers.push({col,row,x:col*CELL+CELL/2,y:row*CELL+CELL/2,type:selType,cd:0,angle:0,level:1});
  sfx('place');
  setMsg('');
  if(selTower) openShop();
});
</script>
