<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命名打分器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #100c1a;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 40px 20px 60px;
  font-family: 'Noto Serif SC', serif;
  color: #e8dfc8;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(160,100,255,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 100%, rgba(255,140,50,0.05) 0%, transparent 60%);
  pointer-events: none;
}

h1 {
  font-size: 26px; letter-spacing: 0.5em;
  color: #d4a84b;
  text-shadow: 0 0 20px rgba(212,168,75,0.4);
  margin-bottom: 6px;
  text-indent: 0.5em;
}
.subtitle {
  font-size: 11px; letter-spacing: 0.3em;
  color: rgba(255,255,255,0.25);
  margin-bottom: 36px;
}

/* Input area */
.input-area {
  display: flex; gap: 10px;
  margin-bottom: 40px;
  width: 100%; max-width: 400px;
}
input[type=text] {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,168,75,0.3);
  border-radius: 6px;
  padding: 12px 16px;
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  color: #e8dfc8;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.1em;
}
input[type=text]::placeholder { color: rgba(255,255,255,0.2); }
input[type=text]:focus { border-color: rgba(212,168,75,0.7); }
button#score-btn {
  background: rgba(212,168,75,0.15);
  border: 1px solid rgba(212,168,75,0.5);
  border-radius: 6px;
  color: #d4a84b;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; letter-spacing: 0.15em;
  padding: 12px 20px;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
button#score-btn:hover {
  background: rgba(212,168,75,0.28);
  box-shadow: 0 0 14px rgba(212,168,75,0.2);
}

/* Certificate */
#cert {
  width: 100%; max-width: 420px;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.6s, transform 0.6s;
  pointer-events: none;
}
#cert.show { opacity: 1; transform: translateY(0); pointer-events: all; }

.cert-border {
  border: 1px solid rgba(212,168,75,0.3);
  border-radius: 12px;
  padding: 28px 28px 24px;
  background: rgba(255,255,255,0.03);
  position: relative;
  overflow: hidden;
}
.cert-border::before {
  content: '';
  position: absolute; inset: 6px;
  border: 1px solid rgba(212,168,75,0.12);
  border-radius: 8px;
  pointer-events: none;
}

/* Corner ornaments */
.cert-border::after {
  content: '✦';
  position: absolute; bottom: 14px; right: 18px;
  font-size: 12px; color: rgba(212,168,75,0.2);
}

.cert-name {
  text-align: center;
  font-size: 32px;
  letter-spacing: 0.6em;
  color: #f0e4c0;
  text-shadow: 0 0 16px rgba(212,168,75,0.3);
  margin-bottom: 6px;
  text-indent: 0.6em;
}
.cert-name-label {
  text-align: center; font-size: 10px; letter-spacing: 0.25em;
  color: rgba(255,255,255,0.2); margin-bottom: 22px;
}

/* Grade badge */
.grade-row {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; margin-bottom: 24px;
}
.grade-badge {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 2px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: bold;
  position: relative;
}
.grade-badge::before {
  content: '';
  position: absolute; inset: 4px;
  border-radius: 50%;
  border: 1px solid currentColor;
  opacity: 0.3;
}
.grade-s { color: #ff9922; text-shadow: 0 0 12px rgba(255,153,34,0.6); border-color: #ff9922; box-shadow: 0 0 16px rgba(255,153,34,0.25); }
.grade-a { color: #d4a84b; text-shadow: 0 0 12px rgba(212,168,75,0.6); border-color: #d4a84b; box-shadow: 0 0 14px rgba(212,168,75,0.2); }
.grade-b { color: #88cc88; text-shadow: 0 0 10px rgba(136,204,136,0.5); border-color: #88cc88; }
.grade-c { color: #8899bb; border-color: #8899bb; }
.grade-d { color: #888; border-color: #666; }

.grade-info { display: flex; flex-direction: column; gap: 4px; }
.grade-title { font-size: 16px; letter-spacing: 0.15em; color: #d4a84b; }
.grade-score { font-size: 12px; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); font-family: monospace; }
.grade-phrase { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; }

/* Divider */
.divider {
  border: none; border-top: 1px solid rgba(212,168,75,0.15);
  margin: 18px 0;
}

/* Dimensions */
.dims {
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 20px;
}
.dim-row { display: flex; align-items: center; gap: 10px; }
.dim-label {
  width: 72px; font-size: 11px; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4); flex-shrink: 0; text-align: right;
}
.dim-bar-bg {
  flex: 1; height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px; overflow: hidden;
}
.dim-bar {
  height: 100%; border-radius: 3px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
  background: linear-gradient(90deg, #8866cc, #d4a84b);
}
.dim-score {
  width: 28px; text-align: right;
  font-size: 11px; font-family: monospace;
  color: rgba(212,168,75,0.7);
}

/* Commentary */
.commentary {
  font-size: 13px; line-height: 1.9;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 0 4px;
}

/* Seal */
.cert-seal {
  text-align: center; margin-top: 20px;
  font-size: 10px; letter-spacing: 0.25em;
  color: rgba(212,168,75,0.2);
}
</style>
</head>
<body>
<h1>命名打分器</h1>
<p class="subtitle">NAME SCORE ORACLE</p>

<div class="input-area">
  <input type="text" id="name-input" placeholder="输入姓名 / 品牌名 / 项目名" maxlength="20">
  <button id="score-btn">鉴 定</button>
</div>

<div id="cert">
  <div class="cert-border">
    <div class="cert-name" id="cert-name"></div>
    <div class="cert-name-label">NAME APPRAISAL CERTIFICATE</div>

    <div class="grade-row">
      <div class="grade-badge" id="grade-badge"></div>
      <div class="grade-info">
        <div class="grade-title" id="grade-title"></div>
        <div class="grade-score" id="grade-score-line"></div>
        <div class="grade-phrase" id="grade-phrase"></div>
      </div>
    </div>

    <hr class="divider">

    <div class="dims" id="dims"></div>

    <hr class="divider">

    <div class="commentary" id="commentary"></div>

    <div class="cert-seal" id="cert-seal"></div>
  </div>
</div>

<script>
const DIMS = [
  { key:'字形美感', label:'字形美感', desc:[
    ['结构松散，视觉失衡','字形尚可，略显平凡','笔画协调，端庄大气','形神兼备，赏心悦目'],
  ]},
  { key:'音律流畅', label:'音律流畅', desc:[
    ['声调杂乱，拗口难记','音节尚可，略显平淡','朗朗上口，音调和谐','声如流水，韵味悠长'],
  ]},
  { key:'五行平衡', label:'五行平衡', desc:[
    ['五行失衡，气场涣散','五行尚可，略有偏颇','五行调和，气场稳定','五行圆满，天地灵气汇聚'],
  ]},
  { key:'数理能量', label:'数理能量', desc:[
    ['数理黯淡，运势受阻','数理平稳，波澜不惊','数理旺盛，吉数加持','数理大吉，万物共鸣'],
  ]},
  { key:'综合气场', label:'综合气场', desc:[
    ['气场薄弱，易受外扰','气场平和，自守有余','气场充盈，贵人相助','气场恢弘，天命所归'],
  ]},
];

const GRADES = [
  { grade:'S', cls:'grade-s', title:'传世之名', phrase:'此名横空出世，气运非凡', minScore:88 },
  { grade:'A', cls:'grade-a', title:'上乘之名', phrase:'音形俱佳，格局开阔',       minScore:75 },
  { grade:'B', cls:'grade-b', title:'中正之名', phrase:'平稳扎实，可堪大用',       minScore:60 },
  { grade:'C', cls:'grade-c', title:'普通之名', phrase:'中规中矩，尚待打磨',       minScore:45 },
  { grade:'D', cls:'grade-d', title:'待改之名', phrase:'气场稍弱，建议斟酌',       minScore:0  },
];

const COMMENTARIES = {
  S: ['此名如天降祥瑞，音形神韵三者合一，凡触此名者，皆感其非凡气场。传世之作，可载入史册。',
      '字字珠玑，声声入耳。此名已超越文字本身，化为一种力量符号，令人过目不忘，心生敬意。'],
  A: ['此名上乘，音律悦耳，字形优雅，五行相生，数理吉祥。持此名者，事业顺遂，贵人常伴。',
      '字形端庄，声调和谐，气场沉稳而不失锋芒。此名予人以信赖之感，是为立身之本。'],
  B: ['此名中正平和，无大过亦有小美。字形尚可，音律流畅，五行虽有小偏，整体气运稳健向上。',
      '平实之中自有深意，此名不哗众取宠，却经得起时间考验。稳中求胜，方为长久之道。'],
  C: ['此名略显平凡，字形与音律尚需雕琢。若能在字形搭配上多加用心，气场或可大幅提升。',
      '名字如人，需经磨砺方显光华。此名现虽中规中矩，然潜力尚存，待时而动方可焕发光彩。'],
  D: ['此名气场较弱，或字形失衡，或音律欠佳，五行稍有冲克。建议重新斟酌，寻求更佳搭配。',
      '名字关乎气运，此名在各维度均有提升空间。可尝试调整字形或音律，或可迎来气场转机。'],
};

async function hashName(name) {
  const enc = new TextEncoder().encode(name.toLowerCase().trim());
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return new Uint8Array(buf);
}

async function scoreName(name) {
  const bytes = await hashName(name);
  const scores = DIMS.map((_, i) => {
    const raw = ((bytes[i*3] << 8) | bytes[i*3+1]) % 101;
    return Math.max(20, Math.min(99, raw));
  });
  const total = Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
  return { scores, total };
}

function getGrade(total) {
  return GRADES.find(g => total >= g.minScore);
}

function getDimDesc(score, dimIdx) {
  if (score >= 85) return DIMS[dimIdx].desc[0][3];
  if (score >= 65) return DIMS[dimIdx].desc[0][2];
  if (score >= 45) return DIMS[dimIdx].desc[0][1];
  return DIMS[dimIdx].desc[0][0];
}

async function run() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;

  const cert = document.getElementById('cert');
  cert.classList.remove('show');

  const { scores, total } = await scoreName(name);
  const grade = getGrade(total);

  document.getElementById('cert-name').textContent = name;

  const badge = document.getElementById('grade-badge');
  badge.textContent = grade.grade;
  badge.className = `grade-badge ${grade.cls}`;

  document.getElementById('grade-title').textContent = grade.title;
  document.getElementById('grade-score-line').textContent = `TOTAL SCORE  ${total} / 100`;
  document.getElementById('grade-phrase').textContent = grade.phrase;

  // Dims
  const dimsEl = document.getElementById('dims');
  dimsEl.innerHTML = '';
  scores.forEach((sc, i) => {
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="dim-label">${DIMS[i].label}</div>
      <div class="dim-bar-bg"><div class="dim-bar" style="width:0%" data-w="${sc}"></div></div>
      <div class="dim-score">${sc}</div>
    `;
    dimsEl.appendChild(row);
  });

  // Commentary
  const comms = COMMENTARIES[grade.grade];
  const commIdx = (scores[0] + scores[4]) % comms.length;
  document.getElementById('commentary').textContent = comms[commIdx];

  // Seal
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('cert-seal').textContent = `✦ 命名鉴定  ${today} ✦`;

  // Animate in
  requestAnimationFrame(() => {
    cert.classList.add('show');
    setTimeout(() => {
      document.querySelectorAll('.dim-bar').forEach(bar => {
        bar.style.width = bar.dataset.w + '%';
      });
    }, 200);
  });
}

document.getElementById('score-btn').addEventListener('click', run);
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') run();
});
</script>
</body>
</html>
