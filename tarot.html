<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日塔罗</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 0%, #1c1848 0%, #0e0c28 45%, #070614 100%);
  color: #e0d8f0;
  font-family: "STKaiti","KaiTi","Kaiti SC","楷体","Hiragino Mincho ProN","Yu Mincho",serif;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Stars ── */
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute; border-radius: 50%; background: #fff;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: var(--base-op); transform: scale(1); }
  50%      { opacity: calc(var(--base-op) * 0.2); transform: scale(0.7); }
}
.shoot {
  position: absolute; width: 80px; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
  animation: shoot linear infinite; opacity: 0;
}
@keyframes shoot {
  0%  { opacity:0; transform:translateX(0) translateY(0) rotate(-25deg); }
  5%  { opacity:1; }
  20% { opacity:0; transform:translateX(300px) translateY(120px) rotate(-25deg); }
  100%{ opacity:0; transform:translateX(300px) translateY(120px) rotate(-25deg); }
}

/* ── Layout ── */
.page {
  position: relative; z-index: 1;
  width: 100%; max-width: 820px;
  padding: 40px 20px 60px;
  display: flex; flex-direction: column; align-items: center;
}

/* ── Header ── */
header { text-align: center; margin-bottom: 44px; }
.header-deco { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:10px; }
.deco-line { flex:1; max-width:80px; height:1px; background:linear-gradient(90deg,transparent,rgba(180,140,255,0.5)); }
.deco-line.r { background:linear-gradient(90deg,rgba(180,140,255,0.5),transparent); }
.deco-sym { color:rgba(180,140,255,0.7); font-size:1rem; }
h1 {
  font-size:1.6rem; font-weight:400; letter-spacing:0.5em; padding-left:0.5em;
  color:#e8e0ff; text-shadow:0 0 30px rgba(180,140,255,0.4); margin-bottom:8px;
}
.subtitle { font-size:0.7rem; letter-spacing:0.25em; color:rgba(200,180,255,0.45); }

/* ── Spread labels ── */
.spread-label { display:flex; justify-content:center; gap:0; margin-bottom:24px; width:100%; max-width:520px; }
.pos-label { flex:1; text-align:center; font-size:0.65rem; letter-spacing:0.2em; color:rgba(200,180,255,0.4); padding-top:2px; }

/* ── Cards row ── */
.cards-row { display:flex; justify-content:center; gap:24px; margin-bottom:36px; flex-wrap:wrap; }

/* ── Card ── */
.card-wrap {
  perspective:900px; width:150px; height:255px;
  cursor:pointer; flex-shrink:0; opacity:0;
}
.card-inner {
  position:relative; width:100%; height:100%;
  transform-style:preserve-3d;
  transition:transform 0.85s cubic-bezier(0.4,0,0.2,1);
}
.card-wrap.flipped .card-inner { transform:rotateY(180deg); }
.card-wrap.reversed .card-inner { transform:rotateY(180deg) rotate(180deg); }
.card-face, .card-back {
  position:absolute; inset:0; border-radius:14px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
}

/* Card back */
.card-back {
  background:linear-gradient(145deg,#1e1850,#130e38,#0c0920);
  border:1.5px solid rgba(180,140,255,0.35);
  overflow:hidden; display:flex; align-items:center; justify-content:center;
}
.card-back::before {
  content:''; position:absolute; inset:7px;
  border:0.5px solid rgba(180,140,255,0.2); border-radius:8px; pointer-events:none;
}
.card-back::after { content:'✦'; position:absolute; font-size:0.55rem; color:rgba(180,140,255,0.35); bottom:12px; right:12px; }
.back-center { display:flex; flex-direction:column; align-items:center; gap:6px; }
.back-star { font-size:2rem; color:rgba(200,170,255,0.5); line-height:1; }
.back-dots { display:flex; gap:5px; }
.back-dot { width:3px; height:3px; border-radius:50%; background:rgba(180,140,255,0.35); }
.back-corner-tl { position:absolute; top:11px; left:12px; font-size:0.55rem; color:rgba(180,140,255,0.35); }
.card-wrap:not(.flipped):not(.reversed):hover .card-back {
  border-color:rgba(220,180,255,0.7);
  box-shadow:0 0 20px rgba(180,140,255,0.2),0 0 40px rgba(180,140,255,0.1);
}

/* Card face */
.card-face {
  transform:rotateY(180deg);
  border:1.5px solid rgba(200,170,255,0.2);
  display:flex; flex-direction:column; align-items:center;
  justify-content:space-between; padding:14px 10px 12px;
  overflow:hidden; position:relative;
}
.card-face::before {
  content:''; position:absolute; inset:0;
  background:var(--card-bg,linear-gradient(160deg,#1a1640,#0e0c28));
  border-radius:inherit; z-index:0;
}
.card-face::after {
  content:''; position:absolute; inset:7px;
  border:0.5px solid rgba(255,255,255,0.07); border-radius:8px; z-index:0; pointer-events:none;
}
.card-face > * { position:relative; z-index:1; }
.card-numeral { font-size:0.65rem; letter-spacing:0.2em; color:rgba(255,255,255,0.35); width:100%; text-align:center; }
.card-symbol { font-size:3.2rem; line-height:1; filter:drop-shadow(0 0 12px var(--card-color,#c8b0ff)); text-align:center; flex:1; display:flex; align-items:center; }
.card-name-row { width:100%; text-align:center; }
.card-name { font-size:1rem; letter-spacing:0.12em; color:var(--card-color,#e0d8ff); display:block; margin-bottom:3px; }
.card-orientation { font-size:0.58rem; letter-spacing:0.15em; opacity:0.45; color:#fff; }

/* ── Reading panel ── */
.reading-panel {
  width:100%; max-width:560px; margin-bottom:32px;
  opacity:0; transform:translateY(14px);
  transition:opacity 0.7s ease, transform 0.7s ease;
}
.reading-panel.visible { opacity:1; transform:translateY(0); }

/* Tabs */
.tab-row {
  display:flex; gap:0; margin-bottom:0;
  border-bottom:1px solid rgba(180,140,255,0.15);
}
.tab-btn {
  padding:9px 0; flex:1; text-align:center;
  background:transparent; border:none; border-bottom:2px solid transparent;
  color:rgba(200,180,255,0.4); font-family:inherit; font-size:0.72rem;
  letter-spacing:0.15em; cursor:pointer;
  transition:color 0.2s, border-color 0.2s;
  margin-bottom:-1px;
}
.tab-btn:hover { color:rgba(200,180,255,0.75); }
.tab-btn.active { color:#d0b8ff; border-bottom-color:#a080e0; }

/* Tab content */
.tab-content { display:none; }
.tab-content.active { display:block; }

.reading-card {
  background:rgba(20,16,50,0.55);
  border:1px solid rgba(180,140,255,0.18);
  border-top:none; border-radius:0 0 10px 10px;
  padding:20px 22px;
  backdrop-filter:blur(4px);
}

/* Reading rows */
.reading-row {
  display:grid;
  grid-template-columns: 36px 1fr;
  gap:0 14px;
  padding:12px 0;
  border-bottom:1px solid rgba(180,140,255,0.08);
  opacity:0; transform:translateX(-6px);
  transition:opacity 0.5s ease, transform 0.5s ease;
}
.reading-row:last-child { border-bottom:none; padding-bottom:0; }
.reading-row.shown { opacity:1; transform:translateX(0); }

.rrow-pos {
  display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; padding-top:2px;
}
.pos-badge {
  font-size:0.58rem; letter-spacing:0.1em;
  color:rgba(200,180,255,0.35); margin-bottom:5px; white-space:nowrap;
}
.pos-dots { display:flex; flex-direction:column; gap:3px; margin-top:2px; }
.pos-dot {
  width:4px; height:4px; border-radius:50%;
  background:rgba(180,140,255,0.2);
  transition:background 0.3s;
}
.pos-dot.lit { background:var(--dot-color,#a080e0); }

.rrow-content {}
.rrow-cardname {
  font-size:0.85rem; letter-spacing:0.1em;
  color:var(--card-color,#c8b0ff); margin-bottom:5px;
  display:flex; align-items:center; gap:7px;
}
.rrow-orient {
  font-size:0.58rem; opacity:0.5; color:#fff; letter-spacing:0.1em;
  background:rgba(255,255,255,0.07); padding:1px 6px; border-radius:10px;
}
.rrow-text {
  font-size:0.78rem; color:rgba(224,216,240,0.72);
  letter-spacing:0.06em; line-height:1.6;
}

/* Overall summary row */
.summary-row {
  padding:14px 0 2px;
  border-top:1px solid rgba(180,140,255,0.1);
  margin-top:4px;
}
.summary-label { font-size:0.6rem; letter-spacing:0.2em; color:rgba(200,180,255,0.35); margin-bottom:6px; }
.summary-text { font-size:0.8rem; color:rgba(224,216,240,0.8); line-height:1.7; letter-spacing:0.06em; }

/* ── Buttons ── */
.btn-row { display:flex; gap:14px; }
.action-btn {
  padding:11px 34px;
  background:transparent; border:1px solid rgba(180,140,255,0.4);
  border-radius:3px; color:rgba(200,170,255,0.85);
  font-family:inherit; font-size:0.88rem; letter-spacing:0.3em;
  padding-left:calc(34px + 0.3em); cursor:pointer;
  transition:all 0.3s; overflow:hidden; position:relative;
}
.action-btn::before {
  content:''; position:absolute; inset:0;
  background:rgba(180,140,255,0.12);
  transform:scaleX(0); transform-origin:left;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.action-btn:hover { border-color:rgba(200,170,255,0.7); color:#e8e0ff; box-shadow:0 0 18px rgba(180,140,255,0.15); }
.action-btn:hover::before { transform:scaleX(1); }
.action-btn span { position:relative; z-index:1; }
.action-btn:active { transform:scale(0.97); }
.action-btn:disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }

/* ── Entrance & glow ── */
@keyframes cardAppear {
  0%   { opacity:0; transform:translateY(30px) scale(0.92); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
.card-wrap.appeared { opacity:1; animation:cardAppear 0.6s cubic-bezier(0.22,1,0.36,1) both; }

@keyframes cardGlow {
  0%,100% { box-shadow:0 0 10px var(--card-glow,rgba(180,140,255,0.2)); }
  50%      { box-shadow:0 0 28px var(--card-glow,rgba(180,140,255,0.4)); }
}
.card-wrap.flipped, .card-wrap.reversed { opacity:1; animation:cardGlow 3s ease-in-out infinite 0.9s; }
</style>
</head>

</div>

// Overall summaries per category (indexed by number of positive cards 0-3)

// ── Stars ──
(function(){
  const s = document.getElementById('stars');
  for(let i=0;i<160;i++){
    const el=document.createElement('div'); el.className='star';
    const size=Math.random()<0.85?1:Math.random()*2+1, op=0.2+Math.random()*0.6;
    el.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--base-op:${op};animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;

})();

// ── Helpers ──
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }

let drawnCards=[], flippedCount=0;

function buildCards(){
  drawnCards = shuffle(CARDS).slice(0,3).map(c=>({...c, reversed:Math.random()<0.35}));
  flippedCount=0;

  const row=document.getElementById('cardsRow'); row.innerHTML='';
  drawnCards.forEach((card,i)=>{
    const wrap=document.createElement('div');
    wrap.className='card-wrap'; wrap.id=`card-${i}`;
    wrap.style.setProperty('--card-color',card.color);
    wrap.style.setProperty('--card-glow',card.color+'55');
    wrap.onclick=()=>flipCard(i);
    wrap.innerHTML=`
      <div class="card-inner">
        <div class="card-back">
          <span class="back-corner-tl">✦</span>
          <div class="back-center">
            <div class="back-star">✦</div>
            <div class="back-dots"><div class="back-dot"></div><div class="back-dot"></div><div class="back-dot"></div></div>
          </div>
        </div>
        <div class="card-face" style="--card-bg:linear-gradient(155deg,${card.bg}ee,${card.bg}cc)">
          <div class="card-numeral">${card.num}</div>
          <div class="card-symbol">${card.sym}</div>
          <div class="card-name-row">
            <span class="card-name">${card.name}</span>
            <span class="card-orientation">${card.reversed?'逆位':'正位'}</span>
          </div>
        </div>
      </div>`;
    row.appendChild(wrap);
    setTimeout(()=>wrap.classList.add('appeared'), 80+i*160);
  });

  // reset panel
  const panel=document.getElementById('readingPanel');
  panel.classList.remove('visible');
  CATS.forEach(c=>{ document.getElementById(`tab-${c.key}`).innerHTML=''; });
  document.getElementById('flipAllBtn').disabled=false;
  switchTab('all');
}

function flipCard(i){
  const card=drawnCards[i];
  const wrap=document.getElementById(`card-${i}`);
  if(wrap.classList.contains('flipped')||wrap.classList.contains('reversed')) return;
  wrap.classList.add(card.reversed?'reversed':'flipped');
  flippedCount++;
  if(flippedCount===3) showReading();
}

function flipAll(){
  drawnCards.forEach((_,i)=>{
    const wrap=document.getElementById(`card-${i}`);
    if(!wrap.classList.contains('flipped')&&!wrap.classList.contains('reversed')){
      setTimeout(()=>{ wrap.classList.add(drawnCards[i].reversed?'reversed':'flipped'); flippedCount++; if(flippedCount===3) showReading(); }, i*320);
    }
  });
  document.getElementById('flipAllBtn').disabled=true;
}

function showReading(){
  document.getElementById('flipAllBtn').disabled=true;

  // Build all 4 tabs
  buildTab('all');
  buildTab('love');
  buildTab('career');
  buildTab('money');

  const panel=document.getElementById('readingPanel');
  panel.classList.add('visible');
  // stagger rows in
  setTimeout(()=>{
    document.querySelectorAll('.reading-row').forEach((r,i)=>{
      setTimeout(()=>r.classList.add('shown'), i*120);
    });
  }, 400);
}

function buildTab(key){
  const container=document.getElementById(`tab-${key}`);
  container.innerHTML='';

  // positive count for summary
  let posCount=0;
  drawnCards.forEach((card,i)=>{
    const isRev=card.reversed;
    let text, mainColor;
    if(key==='all'){
      text=isRev?card.rev:card.up;
      mainColor=card.color;
    } else {
      text=isRev?card.cats[key].rev:card.cats[key].up;
      mainColor=card.color;
    }
    if(!isRev) posCount++;

    // energy dots (3 dots: lit = positive, dim = reversed)
    const dots=isRev?1:3;
    const dotEls=Array.from({length:3},(_,d)=>
      `<div class="pos-dot${d<dots?' lit':''}" style="--dot-color:${card.color}"></div>`
    ).join('');

    const row=document.createElement('div');
    row.className='reading-row';
    row.innerHTML=`
      <div class="rrow-pos">
        <div class="pos-badge">${POS[i]}</div>
        <div class="pos-dots">${dotEls}</div>
      </div>
      <div class="rrow-content">
        <div class="rrow-cardname" style="--card-color:${mainColor}">
          ${card.name}<span class="rrow-orient">${isRev?'逆位':'正位'}</span>
        </div>
        <div class="rrow-text">${text}</div>
      </div>`;
    container.appendChild(row);
  });

  // Summary for category tabs
  if(key!=='all'){
    const idx=Math.min(posCount,3);
    const sumRow=document.createElement('div');
    sumRow.className='reading-row summary-row';
    sumRow.innerHTML=`
      <div class="rrow-pos"><div class="pos-badge">综</div></div>
      <div class="rrow-content">
        <div class="summary-label">综合解读</div>
        <div class="summary-text">${SUMMARIES[key][idx]}</div>
      </div>`;
    container.appendChild(sumRow);
  }
}

function switchTab(key){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', CATS[i].key===key);
  });
  document.querySelectorAll('.tab-content').forEach(el=>{
    el.classList.toggle('active', el.id===`tab-${key}`);
  });
}

function reshuffle(){
  document.getElementById('flipAllBtn').disabled=false;
  buildCards();
}

buildCards();
