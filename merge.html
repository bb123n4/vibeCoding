// ── Audio ──
let _ac;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function tone(freq,dur,type='sine',vol=0.10){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);}catch(e){}
}
function sfxDrop(){tone(360,0.05,'sine',0.07);}
function sfxMerge(tier){
  const freqs=[330,370,415,466,523,587,659,740,830,932];
  tone(freqs[tier]||660,0.22,'sine',0.13);
  setTimeout(()=>tone((freqs[tier]||660)*1.5,0.12,'sine',0.08),90);
}
function sfxOver(){[240,190,150].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sine',0.08),i*110));}

// ── Preload SVG images ──
const fruitImgs = SVG_SRC.map(src => {
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(src);
  return img;
});

// ── Matter.js ──
const {Engine,Bodies,Body,World,Events,Composite}=Matter;
const engine=Engine.create({gravity:{y:2.2}});
const world=engine.world;

const STATIC=[
  Bodies.rectangle(W/2,   H+12,  W+60,  24,  {isStatic:true,label:'wall',friction:0.4}),
  Bodies.rectangle(-10,   H/2,   20,    H+60,{isStatic:true,label:'wall',friction:0.3}),
  Bodies.rectangle(W+10,  H/2,   20,    H+60,{isStatic:true,label:'wall',friction:0.3}),
];
World.add(world, STATIC);

// ── State ──
let score=0, fruits=[], pendingMerges=[], mergingIds=new Set();
let particles=[], popAnims=[];
let curTier, nextTier;
let dropX=W/2, canDrop=true;
let gameState='playing';

function randTier(){return Math.floor(Math.random()*5);}
function reset(){
  for(const b of fruits) World.remove(world,b);
  fruits=[];pendingMerges=[];mergingIds.clear();particles=[];popAnims=[];
  score=0;dropX=W/2;canDrop=true;gameState='playing';
  curTier=randTier();nextTier=randTier();
}
reset();

// ── Bodies ──
function makeFruitBody(x,y,tier){
  const f=FRUITS[tier];
  const b=Bodies.circle(
    Math.max(WALL_X0+f.r, Math.min(WALL_X1-f.r, x)),
    Math.max(DROP_Y, y), f.r,
    {restitution:0.22,friction:0.55,frictionAir:0.008,density:0.0015,label:'fruit'}
  );
  b.fruitTier=tier; b.spawnTime=Date.now(); return b;
}

function drop(x){
  if(!canDrop||gameState!=='playing') return;
  canDrop=false;
  const b=makeFruitBody(x, DROP_Y, curTier);
  World.add(world,b); fruits.push(b); sfxDrop();
  setTimeout(()=>{if(gameState==='playing'){canDrop=true;curTier=nextTier;nextTier=randTier();}},550);
}

// ── Merge ──
Events.on(engine,'collisionStart',({pairs})=>{
  for(const {bodyA,bodyB} of pairs){
    if(bodyA.label!=='fruit'||bodyB.label!=='fruit') continue;
    if(bodyA.fruitTier!==bodyB.fruitTier) continue;
    if(bodyA.fruitTier>=FRUITS.length-1) continue;
    if(mergingIds.has(bodyA.id)||mergingIds.has(bodyB.id)) continue;
    mergingIds.add(bodyA.id); mergingIds.add(bodyB.id);
    pendingMerges.push([bodyA,bodyB]);
  }
});

function processMerges(){
  for(const [a,b] of pendingMerges){
    if(!fruits.includes(a)||!fruits.includes(b)) continue;
    const mx=(a.position.x+b.position.x)/2, my=(a.position.y+b.position.y)/2;
    const tier=a.fruitTier+1, f=FRUITS[tier];
    World.remove(world,a); World.remove(world,b);
    fruits=fruits.filter(x=>x!==a&&x!==b);
    const nb=makeFruitBody(mx,my,tier);
    Body.setVelocity(nb,{x:(a.velocity.x+b.velocity.x)*0.3,y:-2});
    World.add(world,nb); fruits.push(nb);
    score+=f.pts;
    if(score>hiScore){hiScore=score;localStorage.setItem(HS_KEY,hiScore);}
    sfxMerge(tier);
    popAnims.push({x:mx,y:my,r:f.r,col:f.ring,t:1});
    popAnims.push({x:mx,y:my,r:f.r*.55,col:f.ring,t:.8});
    for(let i=0;i<8;i++){
      const ang=(i/8)*Math.PI*2, s=.8+Math.random()*2;
      particles.push({x:mx,y:my,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s-.5,
        r:1.5+Math.random()*1.5,life:1,col:f.ring});
    }
  }
  pendingMerges=[]; mergingIds.clear();
}

function checkGameOver(){
  const now=Date.now();
  for(const b of fruits){
    if(now-b.spawnTime<1200) continue;
    const spd=Math.hypot(b.velocity.x,b.velocity.y);
    if(spd<0.4 && b.position.y-FRUITS[b.fruitTier].r<DANGER_Y){
      gameState='dead'; sfxOver(); return;
    }
  }
}

// ── Draw fruit using SVG image ──
function drawFruit(x, y, f, angle, alpha, scale){
  const sc=scale||1, r=f.r*sc;
  const tier=FRUITS.indexOf(f);
  const img=fruitImgs[tier];
  ctx.save();
  ctx.globalAlpha=alpha??1;
  ctx.translate(x,y);
  // counter-rotate so illustration stays upright
  ctx.rotate(-(angle||0));
  // subtle drop shadow
  ctx.shadowBlur=12*sc; ctx.shadowOffsetY=4*sc; ctx.shadowColor='rgba(0,0,0,0.12)';
  // clip to circle then draw
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
  if(img.complete && img.naturalWidth>0)
    ctx.drawImage(img,-r,-r,r*2,r*2);
  else{
    ctx.fillStyle=f.ring; ctx.fill();
  }
  ctx.restore();
  // draw ring border outside clip
  ctx.save();
  ctx.globalAlpha=(alpha??1)*0.7;
  ctx.strokeStyle=f.ring;
  ctx.lineWidth=Math.max(0.8,1.2*sc);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function draw(){
  // background — clean white
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(0,0,W,H);

  // danger zone
  ctx.fillStyle='rgba(200,50,50,0.025)';
  ctx.fillRect(0,0,W,DANGER_Y);
  ctx.strokeStyle='rgba(200,50,50,0.12)';
  ctx.lineWidth=0.5; ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(WALL_X0,DANGER_Y); ctx.lineTo(WALL_X1,DANGER_Y); ctx.stroke();
  ctx.setLineDash([]);

  // walls
  ctx.fillStyle='#F2F2F2';
  ctx.fillRect(0,DANGER_Y,WALL_X0,H-DANGER_Y);
  ctx.fillRect(WALL_X1,DANGER_Y,W-WALL_X1,H-DANGER_Y);
  ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);
  ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(WALL_X0,DANGER_Y); ctx.lineTo(WALL_X0,FLOOR_Y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(WALL_X1,DANGER_Y); ctx.lineTo(WALL_X1,FLOOR_Y); ctx.stroke();

  // drop guide
  if(gameState==='playing'&&canDrop){
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5; ctx.setLineDash([4,9]);
    ctx.beginPath(); ctx.moveTo(dropX,DANGER_Y); ctx.lineTo(dropX,FLOOR_Y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // pop rings
  for(const p of popAnims){
    ctx.save();
    ctx.globalAlpha=p.t*0.45;
    ctx.strokeStyle=p.col; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1.5+0.9*(1-p.t)),0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // particles
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=p.life*0.6;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // fruits
  for(const b of fruits)
    drawFruit(b.position.x,b.position.y,FRUITS[b.fruitTier],b.angle);

  // ghost preview
  if(gameState==='playing'&&canDrop){
    const cf=FRUITS[curTier];
    const gx=Math.max(WALL_X0+cf.r+2,Math.min(WALL_X1-cf.r-2,dropX));
    drawFruit(gx,DROP_Y,cf,0,0.35);
  }

  // HUD — left
  ctx.save();
  ctx.textAlign='left';
  ctx.fillStyle='rgba(30,25,20,0.32)';
  ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('SCORE', WALL_X0+6, 19);
  ctx.fillStyle='rgba(30,25,20,0.75)';
  ctx.font='400 18px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(score, WALL_X0+6, 38);
  ctx.fillStyle='rgba(30,25,20,0.20)';
  ctx.font='300 8px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('BEST '+hiScore, WALL_X0+6, 52);
  ctx.restore();

  // HUD — right: next
  const nf=FRUITS[nextTier];
  const maxR=16, ns=Math.min(1, maxR/nf.r);
  ctx.save();
  ctx.textAlign='right';
  ctx.fillStyle='rgba(30,25,20,0.25)';
  ctx.font='300 8px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('NEXT', WALL_X1-6, 19);
  ctx.restore();
  drawFruit(WALL_X1-16, 46, nf, 0, 0.85, ns);

  if(gameState==='dead') drawGameOver();
}

function drawGameOver(){
  ctx.fillStyle='rgba(255,255,255,0.90)';
  ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.textAlign='center';
  const bw=200,bh=118,bx=(W-bw)/2,by=H/2-68;
  ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=0.5;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='rgba(30,25,20,0.45)';
  ctx.font='300 10px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('G A M E   O V E R',W/2,by+26);
  ctx.fillStyle='rgba(30,25,20,0.80)';
  ctx.font='300 32px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(score,W/2,by+68);
  if(score>0&&score>=hiScore){
    ctx.fillStyle='rgba(160,110,20,0.70)';
    ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
    ctx.fillText('N E W   B E S T',W/2,by+90);
  }
  ctx.fillStyle=`rgba(30,25,20,${0.18+0.08*Math.sin(Date.now()*.004)})`;
  ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('CLICK  ·  SPACE  ·  TAP',W/2,by+138);
  ctx.restore();
}

// ── Loop ──
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-last,50); last=ts;
  if(gameState==='playing'){Engine.update(engine,dt);processMerges();checkGameOver();}
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.09;p.life-=0.038;}
  particles=particles.filter(p=>p.life>0);
  for(const p of popAnims) p.t-=0.042;
  popAnims=popAnims.filter(p=>p.t>0);
  draw();
}
requestAnimationFrame(loop);

// ── Input ──
function getX(e){const r=cv.getBoundingClientRect();return (e-r.left)*W/r.width;}
cv.addEventListener('mousemove',e=>{dropX=getX(e.clientX);});
cv.addEventListener('click',e=>{ac();if(gameState==='dead'){reset();return;}drop(getX(e.clientX));});
cv.addEventListener('touchmove',e=>{e.preventDefault();dropX=getX(e.touches[0].clientX);},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();ac();
  if(gameState==='dead'){reset();return;}
  drop(getX(e.changedTouches[0].clientX));
},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();ac();if(gameState==='dead'){reset();return;}drop(dropX);}
  if(e.code==='ArrowLeft')  dropX=Math.max(WALL_X0+FRUITS[curTier].r+2,dropX-8);
  if(e.code==='ArrowRight') dropX=Math.min(WALL_X1-FRUITS[curTier].r-2,dropX+8);
});
</script>
