<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>合成水果</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#E8E8E8;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;touch-action:none}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const W=380, H=580;
const WALL_X0=14, WALL_X1=366;
const FLOOR_Y=562;
const DANGER_Y=72;
const DROP_Y=44;

const cv=document.getElementById('c');
cv.width=W; cv.height=H;
const ctx=cv.getContext('2d');

// ── Hi-score ──
const HS_KEY='merge_hi';
let hiScore=+localStorage.getItem(HS_KEY)||0;

// ── Audio ──
let _ac;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function tone(freq,dur,type='sine',vol=0.10){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);}catch(e){}
}
function sfxDrop(){tone(360,0.05,'sine',0.07);}
function sfxMerge(tier){
  const freqs=[330,370,415,466,523,587,659,740,830,932];
  tone(freqs[tier]||660,0.22,'sine',0.13);
  setTimeout(()=>tone((freqs[tier]||660)*1.5,0.12,'sine',0.08),90);
}
function sfxOver(){[240,190,150].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sine',0.08),i*110));}

// ── Fruit defs — flat brand palette ──
// col=fill, bdr=1px border (slightly darker), fg=text color
const FRUITS=[
  {r:15,  col:'#E8607A', bdr:'#B83050', fg:'#fff', name:'樱桃', pts:10 },
  {r:22,  col:'#E02855', bdr:'#A00830', fg:'#fff', name:'草莓', pts:30 },
  {r:30,  col:'#7848B0', bdr:'#502880', fg:'#fff', name:'葡萄', pts:60 },
  {r:38,  col:'#E87020', bdr:'#A04000', fg:'#fff', name:'橘子', pts:100},
  {r:46,  col:'#D4AA10', bdr:'#907000', fg:'#fff', name:'柠檬', pts:160},
  {r:55,  col:'#B82010', bdr:'#780000', fg:'#fff', name:'苹果', pts:250},
  {r:65,  col:'#5C9020', bdr:'#345800', fg:'#fff', name:'梨',   pts:360},
  {r:77,  col:'#D86858', bdr:'#983828', fg:'#fff', name:'桃子', pts:500},
  {r:91,  col:'#B87810', bdr:'#785000', fg:'#fff', name:'菠萝', pts:660},
  {r:107, col:'#18985A', bdr:'#006030', fg:'#fff', name:'西瓜', pts:1000},
];

// ── Matter.js ──
const {Engine,Bodies,Body,World,Events,Composite}=Matter;
const engine=Engine.create({gravity:{y:2.2}});
const world=engine.world;

const STATIC=[
  Bodies.rectangle(W/2,   H+12,  W+60,  24,  {isStatic:true,label:'wall',friction:0.4}),
  Bodies.rectangle(-10,   H/2,   20,    H+60,{isStatic:true,label:'wall',friction:0.3}),
  Bodies.rectangle(W+10,  H/2,   20,    H+60,{isStatic:true,label:'wall',friction:0.3}),
];
World.add(world, STATIC);

// ── State ──
let score=0;
let fruits=[];
let pendingMerges=[];
let mergingIds=new Set();
let particles=[];
let popAnims=[];

let curTier, nextTier;
let dropX=W/2, canDrop=true;
let gameState='playing';

function randTier(){return Math.floor(Math.random()*5);}
function reset(){
  for(const b of fruits) World.remove(world,b);
  fruits=[];pendingMerges=[];mergingIds.clear();particles=[];popAnims=[];
  score=0;dropX=W/2;canDrop=true;gameState='playing';
  curTier=randTier();nextTier=randTier();
}
reset();

// ── Fruit bodies ──
function makeFruitBody(x,y,tier){
  const f=FRUITS[tier];
  const b=Bodies.circle(
    Math.max(WALL_X0+f.r, Math.min(WALL_X1-f.r, x)),
    Math.max(DROP_Y, y),
    f.r,
    {restitution:0.22, friction:0.55, frictionAir:0.008, density:0.0015, label:'fruit'}
  );
  b.fruitTier=tier;
  b.spawnTime=Date.now();
  return b;
}

function drop(x){
  if(!canDrop||gameState!=='playing') return;
  canDrop=false;
  const b=makeFruitBody(x, DROP_Y, curTier);
  World.add(world,b);
  fruits.push(b);
  sfxDrop();
  setTimeout(()=>{
    if(gameState==='playing'){canDrop=true;curTier=nextTier;nextTier=randTier();}
  }, 550);
}

// ── Merge detection ──
Events.on(engine,'collisionStart',({pairs})=>{
  for(const {bodyA,bodyB} of pairs){
    if(bodyA.label!=='fruit'||bodyB.label!=='fruit') continue;
    if(bodyA.fruitTier!==bodyB.fruitTier) continue;
    if(bodyA.fruitTier>=FRUITS.length-1) continue;
    if(mergingIds.has(bodyA.id)||mergingIds.has(bodyB.id)) continue;
    mergingIds.add(bodyA.id);
    mergingIds.add(bodyB.id);
    pendingMerges.push([bodyA,bodyB]);
  }
});

function processMerges(){
  for(const [a,b] of pendingMerges){
    if(!fruits.includes(a)||!fruits.includes(b)) continue;
    const mx=(a.position.x+b.position.x)/2;
    const my=(a.position.y+b.position.y)/2;
    const tier=a.fruitTier+1;
    const f=FRUITS[tier];

    World.remove(world,a); World.remove(world,b);
    fruits=fruits.filter(x=>x!==a&&x!==b);

    const nb=makeFruitBody(mx,my,tier);
    Body.setVelocity(nb,{x:(a.velocity.x+b.velocity.x)*0.3,y:-2});
    World.add(world,nb);
    fruits.push(nb);

    score+=f.pts;
    if(score>hiScore){hiScore=score;localStorage.setItem(HS_KEY,hiScore);}
    sfxMerge(tier);

    // two clean expanding rings
    popAnims.push({x:mx,y:my,r:f.r,col:f.col,t:1,n:1});
    popAnims.push({x:mx,y:my,r:f.r*0.55,col:f.bdr,t:0.85,n:2});

    // minimal particles
    for(let i=0;i<9;i++){
      const ang=(i/9)*Math.PI*2, s=1+Math.random()*2.2;
      particles.push({x:mx,y:my,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s-0.6,
        r:1.5+Math.random()*1.5,life:1,col:f.col});
    }
  }
  pendingMerges=[];
  mergingIds.clear();
}

function checkGameOver(){
  const now=Date.now();
  for(const b of fruits){
    if(now-b.spawnTime<1200) continue;
    const spd=Math.hypot(b.velocity.x,b.velocity.y);
    if(spd<0.4 && b.position.y-FRUITS[b.fruitTier].r < DANGER_Y){
      gameState='dead'; sfxOver(); return;
    }
  }
}

// ── Draw fruit — flat brand circle ──
function drawFruit(x, y, f, angle, alpha, scale){
  const sc = scale||1;
  const r  = f.r * sc;
  ctx.save();
  ctx.globalAlpha = alpha??1;
  ctx.translate(x, y);

  // very subtle drop shadow for depth without glossiness
  ctx.shadowBlur   = 10*sc;
  ctx.shadowOffsetY= 3*sc;
  ctx.shadowColor  = 'rgba(0,0,0,0.14)';

  // flat fill
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle = f.col;
  ctx.fill();

  // 1px border
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  ctx.strokeStyle = f.bdr;
  ctx.lineWidth = Math.max(0.8, 1.2*sc);
  ctx.stroke();

  // label — always upright, two lines for larger fruits
  ctx.rotate(-(angle||0));
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle = f.fg;

  if(r >= 38){
    // large enough: show full name (split if 2 chars or more)
    const label = f.name;
    if(label.length <= 2 || r < 50){
      const fs = Math.max(9, Math.round(r * 0.52));
      ctx.font=`500 ${fs}px "Hiragino Sans","Yu Gothic","Noto Sans SC",sans-serif`;
      ctx.fillText(label, 0, 0);
    } else {
      // two lines
      const fs = Math.max(9, Math.round(r * 0.38));
      ctx.font=`500 ${fs}px "Hiragino Sans","Yu Gothic","Noto Sans SC",sans-serif`;
      ctx.fillText(label.slice(0,2), 0, -fs*0.6);
      ctx.fillText(label.slice(2),   0,  fs*0.6);
    }
  } else {
    // small: just first character
    const fs = Math.max(8, Math.round(r * 0.72));
    ctx.font=`500 ${fs}px "Hiragino Sans","Yu Gothic","Noto Sans SC",sans-serif`;
    ctx.fillText(f.name[0], 0, 0);
  }

  ctx.restore();
}

function draw(){
  // ── Background — pure white ──
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(0,0,W,H);

  // danger zone — barely-there blush
  ctx.fillStyle='rgba(200,50,50,0.03)';
  ctx.fillRect(0,0,W,DANGER_Y);
  ctx.strokeStyle='rgba(200,50,50,0.14)';
  ctx.lineWidth=0.5;
  ctx.setLineDash([5,8]);
  ctx.beginPath(); ctx.moveTo(WALL_X0,DANGER_Y); ctx.lineTo(WALL_X1,DANGER_Y); ctx.stroke();
  ctx.setLineDash([]);

  // walls — light neutral grey, just enough contrast
  ctx.fillStyle='#F0F0F0';
  ctx.fillRect(0,       DANGER_Y, WALL_X0,   H-DANGER_Y);
  ctx.fillRect(WALL_X1, DANGER_Y, W-WALL_X1, H-DANGER_Y);
  ctx.fillRect(0,       FLOOR_Y,  W,          H-FLOOR_Y);
  // 1px inner edges
  ctx.strokeStyle='rgba(0,0,0,0.09)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(WALL_X0,DANGER_Y); ctx.lineTo(WALL_X0,FLOOR_Y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(WALL_X1,DANGER_Y); ctx.lineTo(WALL_X1,FLOOR_Y); ctx.stroke();

  // drop guide
  if(gameState==='playing'&&canDrop){
    ctx.strokeStyle='rgba(0,0,0,0.07)';
    ctx.lineWidth=0.5;
    ctx.setLineDash([3,8]);
    ctx.beginPath(); ctx.moveTo(dropX,DANGER_Y); ctx.lineTo(dropX,FLOOR_Y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // pop rings
  for(const p of popAnims){
    ctx.save();
    ctx.globalAlpha=p.t*(p.n===1?0.45:0.28);
    ctx.strokeStyle=p.col;
    ctx.lineWidth=p.n===1?1.5:1;
    const rr=p.r*(1.6+0.8*(1-p.t));
    ctx.beginPath(); ctx.arc(p.x,p.y,rr,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // particles
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=p.life*0.65;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // fruits
  for(const b of fruits)
    drawFruit(b.position.x,b.position.y,FRUITS[b.fruitTier],b.angle);

  // ghost preview
  if(gameState==='playing'&&canDrop){
    const cf=FRUITS[curTier];
    const gx=Math.max(WALL_X0+cf.r+2, Math.min(WALL_X1-cf.r-2, dropX));
    drawFruit(gx, DROP_Y, cf, 0, 0.36);
  }

  // ── HUD ──
  // left: score
  ctx.save();
  ctx.fillStyle='rgba(40,35,30,0.38)';
  ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('SCORE', WALL_X0+6, 19);
  ctx.fillStyle='rgba(40,35,30,0.80)';
  ctx.font='500 18px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(score, WALL_X0+6, 38);
  ctx.fillStyle='rgba(40,35,30,0.22)';
  ctx.font='300 8px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('BEST '+hiScore, WALL_X0+6, 52);
  ctx.restore();

  // right: next fruit
  const nf=FRUITS[nextTier];
  const maxR=16, ns=Math.min(1, maxR/nf.r);
  ctx.save();
  ctx.fillStyle='rgba(40,35,30,0.28)';
  ctx.font='300 8px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign='right';
  ctx.fillText('NEXT', WALL_X1-6, 18);
  ctx.restore();
  drawFruit(WALL_X1-14, 46, nf, 0, 0.88, ns);

  if(gameState==='dead') drawGameOver();
}

function drawGameOver(){
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.textAlign='center';

  // thin box frame
  const bw=200, bh=120, bx=(W-bw)/2, by=H/2-70;
  ctx.strokeStyle='rgba(40,35,30,0.10)';
  ctx.lineWidth=0.5;
  ctx.strokeRect(bx,by,bw,bh);

  // GAME OVER
  ctx.fillStyle='rgba(40,35,30,0.55)';
  ctx.font='300 10px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('G A M E   O V E R', W/2, by+24);

  // score
  ctx.fillStyle='rgba(40,35,30,0.85)';
  ctx.font='300 32px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(score, W/2, by+68);

  // best badge
  if(score>0&&score>=hiScore){
    ctx.fillStyle='rgba(168,120,24,0.75)';
    ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
    ctx.fillText('NEW BEST', W/2, by+90);
  }

  // retry prompt
  ctx.fillStyle=`rgba(40,35,30,${0.18+0.08*Math.sin(Date.now()*0.004)})`;
  ctx.font='300 9px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('CLICK  ·  SPACE  ·  TAP', W/2, by+140);

  ctx.restore();
}

// ── Loop ──
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-last,50); last=ts;

  if(gameState==='playing'){
    Engine.update(engine,dt);
    processMerges();
    checkGameOver();
  }

  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.09;p.life-=0.038;}
  particles=particles.filter(p=>p.life>0);
  for(const p of popAnims) p.t-=0.042;
  popAnims=popAnims.filter(p=>p.t>0);

  draw();
}
requestAnimationFrame(loop);

// ── Input ──
function getX(clientX){
  const r=cv.getBoundingClientRect();
  return (clientX-r.left)*W/r.width;
}
cv.addEventListener('mousemove',e=>{ dropX=getX(e.clientX); });
cv.addEventListener('click',e=>{
  ac();
  if(gameState==='dead'){reset();return;}
  drop(getX(e.clientX));
});
cv.addEventListener('touchmove',e=>{e.preventDefault();dropX=getX(e.touches[0].clientX);},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();ac();
  if(gameState==='dead'){reset();return;}
  drop(getX(e.changedTouches[0].clientX));
},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();ac();
    if(gameState==='dead'){reset();return;}
    drop(dropX);
  }
  if(e.code==='ArrowLeft')  dropX=Math.max(WALL_X0+FRUITS[curTier].r+2, dropX-8);
  if(e.code==='ArrowRight') dropX=Math.min(WALL_X1-FRUITS[curTier].r-2, dropX+8);
});
</script>
</body>
</html>
